<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>知识库 - 追光小牛</title>
    <link rel="stylesheet" href="/css/mobile.css">
    <style>
        .search-bar {
            background: #fff;
            padding: 12px 16px;
            border-radius: 24px;
            margin: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-bar input {
            flex: 1;
            border: none;
            font-size: 14px;
            outline: none;
        }
        .filter-section {
            padding: 0 16px;
            margin-bottom: 12px;
        }
        .filter-label {
            font-size: 12px;
            color: #9a958e;
            margin-bottom: 8px;
        }
        .filter-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }
        .filter-tag {
            padding: 6px 14px;
            background: #fff;
            border-radius: 16px;
            font-size: 13px;
            color: #6b625c;
            white-space: nowrap;
            border: 1px solid #e8e5e0;
            cursor: pointer;
        }
        .filter-tag.active {
            background: #ff6b35;
            color: #fff;
            border-color: #ff6b35;
        }
        .category-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .category-tab {
            padding: 8px 16px;
            background: #fff;
            border-radius: 20px;
            font-size: 13px;
            color: #6b625c;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid #e8e5e0;
        }
        .category-tab.active {
            background: #ff6b35;
            color: #fff;
            border-color: #ff6b35;
        }
        .sub-tabs {
            display: flex;
            padding: 0 16px;
            gap: 16px;
            margin-bottom: 16px;
        }
        .sub-tab {
            font-size: 14px;
            color: #9a958e;
            padding-bottom: 8px;
            border-bottom: 2px solid transparent;
        }
        .sub-tab.active {
            color: #ff6b35;
            border-color: #ff6b35;
        }
        .knowledge-list {
            padding: 0 16px;
        }
        .knowledge-card {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .knowledge-card:active {
            opacity: 0.9;
        }
        .knowledge-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .knowledge-cover {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: #f0f0f0;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }
        .knowledge-cover.video {
            position: relative;
        }
        .knowledge-cover.video::after {
            content: '▶';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 32px;
            height: 32px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
        }
        .knowledge-info {
            flex: 1;
            overflow: hidden;
        }
        .knowledge-title {
            font-size: 15px;
            font-weight: 600;
            color: #1f1a17;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .knowledge-summary {
            font-size: 12px;
            color: #9a958e;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .knowledge-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .tag {
            padding: 2px 8px;
            background: #f5f3f0;
            border-radius: 8px;
            font-size: 11px;
            color: #6b625c;
        }
        .tag.public {
            background: #fff3e0;
            color: #ff6b35;
        }
        .tag.filter {
            background: #e8f5e9;
            color: #4caf50;
        }
        .knowledge-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #f5f5f5;
        }
        .knowledge-meta {
            font-size: 12px;
            color: #9a958e;
        }
        .knowledge-status {
            font-size: 12px;
            color: #4caf50;
        }
        .knowledge-status.pending {
            color: #9a958e;
        }
        .search-result-header {
            padding: 16px;
            background: #fff;
            margin: -16px -16px 16px;
        }
        .search-result-keyword {
            font-size: 14px;
            color: #6b625c;
        }
        .search-result-keyword strong {
            color: #ff6b35;
        }
        .expanded-filters {
            background: #fff;
            padding: 12px 16px;
            margin: 0 16px 12px;
            border-radius: 12px;
        }
        .expanded-filter-row {
            margin-bottom: 12px;
        }
        .expanded-filter-row:last-child {
            margin-bottom: 0;
        }
        .expanded-filter-label {
            font-size: 12px;
            color: #9a958e;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <header class="header">
            <h1>知识库</h1>
            <a href="/mobile/mine.html" class="back-btn">我的</a>
        </header>

        <div class="search-bar">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="搜索动作、话术、知识..." onkeypress="handleSearch(event)">
        </div>

        <div id="categorySection">
            <div class="filter-section">
                <div class="filter-label">类型</div>
                <div class="filter-row" id="typeTabs">
                    <div class="filter-tag active" data-type="">全部</div>
                    <div class="filter-tag" data-type="action">动作库</div>
                    <div class="filter-tag" data-type="script">话术库</div>
                    <div class="filter-tag" data-type="knowledge_card">知识卡</div>
                </div>
            </div>
        </div>

        <!-- 扩展筛选器 -->
        <div class="expanded-filters" id="expandedFilters" style="display:none;">
            <!-- 科目筛选 -->
            <div class="expanded-filter-row">
                <div class="expanded-filter-label">科目</div>
                <div class="filter-row" id="subjectFilter">
                    <div class="filter-tag active" data-value="">全部</div>
                    <div class="filter-tag" data-value="fitness">体能</div>
                    <div class="filter-tag" data-value="sensory">感统</div>
                    <div class="filter-tag" data-value="skill">技能</div>
                </div>
            </div>
            <!-- 年龄段筛选 -->
            <div class="expanded-filter-row">
                <div class="expanded-filter-label">年龄段</div>
                <div class="filter-row" id="ageGroupFilter">
                    <div class="filter-tag active" data-value="">全部</div>
                    <div class="filter-tag" data-value="3-6">3-6岁</div>
                    <div class="filter-tag" data-value="7-12">7-12岁</div>
                    <div class="filter-tag" data-value="13-18">13-18岁</div>
                    <div class="filter-tag" data-value="成人">成人</div>
                </div>
            </div>
            <!-- 训练类别筛选 -->
            <div class="expanded-filter-row">
                <div class="expanded-filter-label">训练类别</div>
                <div class="filter-row" id="trainingTypeFilter">
                    <div class="filter-tag active" data-value="">全部</div>
                    <div class="filter-tag" data-value="strength">力量</div>
                    <div class="filter-tag" data-value="cardio">心肺</div>
                    <div class="filter-tag" data-value="flexibility">柔韧</div>
                    <div class="filter-tag" data-value="balance">平衡</div>
                    <div class="filter-tag" data-value="coordination">协调</div>
                </div>
            </div>
        </div>

        <div class="sub-tabs" id="subTabs" style="display:none;">
            <div class="sub-tab active" data-category="">全部</div>
        </div>

        <div class="knowledge-list" id="knowledgeList">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script src="/js/internal-auth.js"></script>
    <script>
        const API_BASE = '/api';
        let currentType = '';
        let currentCategoryId = 0;
        let currentSubject = '';
        let currentAgeGroup = '';
        let currentTrainingType = '';
        let categories = [];
        let searchMode = false;

        async function init() {
            await loadCategories();
            await loadKnowledge();
            initFilters();
        }

        async function loadCategories() {
            try {
                const res = await fetch(`${API_BASE}/knowledge/category.php`, authHeaders());
                const data = await res.json();
                if (data.code === 0) {
                    categories = data.data.flat || [];
                }
            } catch (err) {
                console.error('加载分类失败:', err);
            }
        }

        function initFilters() {
            // 类型筛选
            document.querySelectorAll('#typeTabs .filter-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    document.querySelectorAll('#typeTabs .filter-tag').forEach(t => t.classList.remove('active'));
                    tag.classList.add('active');
                    currentType = tag.dataset.type || '';
                    currentSubject = '';
                    currentAgeGroup = '';
                    currentTrainingType = '';
                    currentCategoryId = 0;
                    resetSubFilters();
                    updateExpandedFiltersVisibility();
                    loadKnowledge();
                });
            });

            // 科目筛选
            document.querySelectorAll('#subjectFilter .filter-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    document.querySelectorAll('#subjectFilter .filter-tag').forEach(t => t.classList.remove('active'));
                    tag.classList.add('active');
                    currentSubject = tag.dataset.value || '';
                    loadKnowledge();
                });
            });

            // 年龄段筛选
            document.querySelectorAll('#ageGroupFilter .filter-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    document.querySelectorAll('#ageGroupFilter .filter-tag').forEach(t => t.classList.remove('active'));
                    tag.classList.add('active');
                    currentAgeGroup = tag.dataset.value || '';
                    loadKnowledge();
                });
            });

            // 训练类别筛选
            document.querySelectorAll('#trainingTypeFilter .filter-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    document.querySelectorAll('#trainingTypeFilter .filter-tag').forEach(t => t.classList.remove('active'));
                    tag.classList.add('active');
                    currentTrainingType = tag.dataset.value || '';
                    loadKnowledge();
                });
            });
        }

        function updateExpandedFiltersVisibility() {
            const expandedFilters = document.getElementById('expandedFilters');
            // 只有选择"动作库"时显示扩展筛选器
            expandedFilters.style.display = currentType === 'action' ? 'block' : 'none';
        }

        function resetSubFilters() {
            document.querySelectorAll('#subjectFilter .filter-tag, #ageGroupFilter .filter-tag, #trainingTypeFilter .filter-tag').forEach(tag => {
                tag.classList.remove('active');
                if (!tag.dataset.value) tag.classList.add('active');
            });
        }

        async function loadKnowledge(page = 1) {
            const listEl = document.getElementById('knowledgeList');
            listEl.innerHTML = '<div class="loading">加载中...</div>';

            try {
                let url = `${API_BASE}/knowledge/list.php?page=${page}&page_size=20`;
                if (currentType) url += `&type=${currentType}`;
                if (currentCategoryId > 0) url += `&category_id=${currentCategoryId}`;
                if (currentSubject) url += `&subject=${currentSubject}`;
                if (currentAgeGroup) url += `&age_group=${currentAgeGroup}`;
                if (currentTrainingType) url += `&training_type=${currentTrainingType}`;

                const res = await fetch(url, authHeaders());
                const data = await res.json();

                if (data.code === 0) {
                    renderKnowledge(data.data.list || []);
                } else {
                    listEl.innerHTML = '<div class="empty">加载失败</div>';
                }
            } catch (err) {
                console.error('加载失败:', err);
                listEl.innerHTML = '<div class="empty">网络错误</div>';
            }
        }

        function renderKnowledge(list) {
            const listEl = document.getElementById('knowledgeList');

            if (list.length === 0) {
                listEl.innerHTML = '<div class="empty">暂无知识库内容</div>';
                return;
            }

            listEl.innerHTML = list.map(item => {
                const typeNames = {action: '动作', script: '话术', knowledge_card: '知识卡'};
                const typeName = typeNames[item.category_type] || '知识';
                const isPublic = item.is_public === 1;

                let coverHtml = '';
                if (item.media_type === 'video' || item.media_type === 'image') {
                    coverHtml = `<div class="knowledge-cover ${item.media_type === 'video' ? 'video' : ''}"
                                style="background-image: url('${item.cover_image || item.media_url || ''}')"></div>`;
                } else {
                    const icon = item.category_type === 'action' ? '💪' : item.category_type === 'script' ? '📞' : '📖';
                    coverHtml = `<div class="knowledge-cover" style="background:#fff3e0;display:flex;align-items:center;justify-content:center;font-size:24px;">${icon}</div>`;
                }

                const tags = (item.tags || []).slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('');
                const statusHtml = item.is_completed
                    ? '<span class="knowledge-status">✓ 已完成</span>'
                    : '<span class="knowledge-status pending">未学习</span>';

                // 扩展字段标签
                let extraTags = '';
                if (item.subject) {
                    const subjectNames = {fitness: '体能', sensory: '感统', skill: '技能'};
                    extraTags += `<span class="tag filter">${subjectNames[item.subject] || item.subject}</span>`;
                }
                if (item.age_group) {
                    extraTags += `<span class="tag filter">${item.age_group}岁</span>`;
                }
                if (item.training_type) {
                    const trainingNames = {strength: '力量', cardio: '心肺', flexibility: '柔韧', balance: '平衡', coordination: '协调'};
                    extraTags += `<span class="tag filter">${trainingNames[item.training_type] || item.training_type}</span>`;
                }

                return `
                    <div class="knowledge-card" onclick="goToDetail(${item.id})">
                        <div class="knowledge-header">
                            ${coverHtml}
                            <div class="knowledge-info">
                                <div class="knowledge-title">${item.title}</div>
                                <div class="knowledge-summary">${item.summary || ''}</div>
                                <div class="knowledge-tags">
                                    ${isPublic ? '<span class="tag public">公共</span>' : ''}
                                    ${tags}
                                    ${extraTags}
                                </div>
                            </div>
                        </div>
                        <div class="knowledge-footer">
                            <span class="knowledge-meta">${typeName} · ${item.difficulty || 1}级难度</span>
                            ${statusHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function handleSearch(e) {
            if (e.key === 'Enter') {
                const keyword = document.getElementById('searchInput').value.trim();
                if (keyword) {
                    searchMode = true;
                    doSearch(keyword);
                }
            }
        }

        async function doSearch(keyword) {
            const listEl = document.getElementById('knowledgeList');
            listEl.innerHTML = '<div class="loading">搜索中...</div>';

            try {
                let url = `${API_BASE}/knowledge/search.php?keyword=${encodeURIComponent(keyword)}`;
                if (currentType) url += `&type=${currentType}`;
                if (currentSubject) url += `&subject=${currentSubject}`;
                if (currentAgeGroup) url += `&age_group=${currentAgeGroup}`;
                if (currentTrainingType) url += `&training_type=${currentTrainingType}`;

                const res = await fetch(url, authHeaders());
                const data = await res.json();

                if (data.code === 0) {
                    listEl.innerHTML = `
                        <div class="search-result-header">
                            <div class="search-result-keyword">找到 <strong>${data.data.total}</strong> 个与 "<strong>${keyword}</strong>" 相关的结果</div>
                        </div>
                    ` + (data.data.list || []).map(item => {
                        return `
                            <div class="knowledge-card" onclick="goToDetail(${item.id})">
                                <div class="knowledge-header">
                                    <div class="knowledge-info">
                                        <div class="knowledge-title">${item.title}</div>
                                        <div class="knowledge-summary">${item.summary || ''}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (err) {
                listEl.innerHTML = '<div class="empty">搜索失败</div>';
            }
        }

        function goToDetail(id) {
            location.href = `/mobile/knowledge-detail.html?id=${id}`;
        }

        init();
    </script>
</body>
</html>
