  </div>
  <script>
    (function() {
      var target = '/mobile/mine.html';
      try {
        var params = new URLSearchParams(window.location.search || '');
        if (params.toString()) {
          target += '?' + params.toString();
        }
      } catch (err) {}
      var link = document.getElementById('targetLink');
      if (link) link.href = target;
      window.location.replace(target);
    })();
  </script>
</body>
</html>

<!-- Change Password Modal -->
<div class="modal-overlay" id="pwdModal">
  <div class="modal">
    <h3>修改密码</h3>
    <label>旧密码</label>
    <input type="password" id="oldPwd" placeholder="请输入旧密码">
    <label>新密码</label>
    <input type="password" id="newPwd" placeholder="至少6位">
    <label>确认新密码</label>
    <input type="password" id="confirmPwd" placeholder="再次输入新密码">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closePwdModal()">取消</button>
      <button class="btn-primary" onclick="doChangePassword()">确认修改</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-item" onclick="switchTab('policies')"><span class="nav-icon">📋</span><span>制度</span></button>
  <button class="nav-item" onclick="switchTab('learning')"><span class="nav-icon">🎓</span><span>学习</span></button>
  <button class="nav-item" onclick="switchTab('notifications')"><span class="nav-icon">🔔</span><span>通知</span></button>
  <button class="nav-item active" onclick="switchTab('mine')"><span class="nav-icon">📖</span><span>我的</span></button>
</nav>

<script>
const API_BASE = '/api/policy';
let forcePasswordChange = false;
document.addEventListener('DOMContentLoaded', () => { checkLogin(); });

(function normalizeMineUrl() {
  try {
    const url = new URL(window.location.href);
    if (url.searchParams.has('doc')) {
      url.searchParams.delete('doc');
      window.history.replaceState({}, '', url.pathname + url.search);
    }
  } catch (err) {}
})();

async function checkLogin() {
  try {
    const res = await fetch('/api/auth/me.php', authHeaders());
    const data = await res.json();
    if (data.code === 0) {
      showUserInfo(data.data);
      forcePasswordChange = !!(data.data.must_change_password || new URLSearchParams(window.location.search).get('force_change_password') === '1');
      if (forcePasswordChange) {
        setTimeout(() => { showChangePassword(true); }, 500);
      }
    } else {
      showLoginTip();
    }
  } catch(e) { showLoginTip(); }
}

function showUserInfo(user) {
  document.getElementById('userCard').style.display = 'flex';
  var name = (user.staff && user.staff.name) ? user.staff.name : (user.display_name || user.username || '员工');
  const role = String(user.role || '').toLowerCase();
  const canShowAdmin = !!user.is_hq || !!user.is_admin || ['admin','ceo','operation','finance'].includes(role);
  const canAccessCampaign = canShowAdmin || ['manager','sales','coach','consultant'].includes(role);
  document.getElementById('userName').textContent = name;
  var roleLabels = {admin:'管理员',ceo:'总经理',operation:'总部运营',finance:'财务',manager:'店长',coach:'教练',sales:'顾问',consultant:'顾问',newbie:'新员工'};
  document.getElementById('userRole').textContent = roleLabels[user.role] || user.role || '员工';
  document.getElementById('loginBtn').textContent = '已登录';
  document.getElementById('loginBtn').onclick = '';
  document.getElementById('userContent').style.display = 'block';
  document.getElementById('loginTip').style.display = 'none';
  if (canShowAdmin) {
    document.getElementById('adminMenuItem').style.display = 'flex';
  }
  if (canAccessCampaign) {
    document.getElementById('campaignMenuItem').style.display = 'flex';
  }
}

function showLoginTip() {
  document.getElementById('userCard').style.display = 'none';
  document.getElementById('loginBtn').textContent = '登录';
  document.getElementById('userContent').style.display = 'none';
  document.getElementById('loginTip').style.display = 'block';
}

function showChangePassword(isForce) {
  document.getElementById('pwdModal').classList.add('show');
  if (isForce) {
    document.querySelector('#pwdModal h3').textContent = '首次登录，请修改密码';
  }
}
function closePwdModal() {
  if (forcePasswordChange) {
    alert('首次登录必须先修改密码');
    return;
  }
  document.getElementById('pwdModal').classList.remove('show');
}

async function doChangePassword() {
  var oldPwd = document.getElementById('oldPwd').value.trim();
  var newPwd = document.getElementById('newPwd').value.trim();
  var confirmPwd = document.getElementById('confirmPwd').value.trim();
  if (!oldPwd) { alert('请输入旧密码'); return; }
  if (!newPwd || newPwd.length < 6) { alert('新密码至少6位'); return; }
  if (newPwd !== confirmPwd) { alert('两次输入的新密码不一致'); return; }
  try {
    const res = await fetch('/api/auth-change-password.php', authHeaders({
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ old_password: oldPwd, new_password: newPwd })
    }));
    const data = await res.json();
    if (data.code === 0) {
      await refreshLoginAfterPasswordChange(newPwd);
      alert('密码修改成功');
      forcePasswordChange = false;
      var target = new URLSearchParams(window.location.search).get('redirect') || '/internal.html';
      if (window.history && window.history.replaceState) {
        const url = new URL(window.location.href);
        url.searchParams.delete('force_change_password');
        url.searchParams.delete('redirect');
        window.history.replaceState({}, '', url.pathname + url.search);
      }
      closePwdModal();
      window.location.href = target;
    } else {
      alert(data.message);
    }
  } catch(e) { alert('网络错误'); }
}

async function refreshLoginAfterPasswordChange(newPwd) {
  var username = localStorage.getItem('last_login_username') || '';
  try {
    var user = JSON.parse(localStorage.getItem('user_info') || '{}');
    username = username || user.username || '';
  } catch (err) {}
  if (!username) return;
  var formData = new FormData();
  formData.append('username', username);
  formData.append('password', newPwd);
  var res = await fetch('/api/auth-jwt.php', { method: 'POST', body: formData });
  var json = await res.json();
  if (json.code === 0 && json.data && json.data.token) {
    localStorage.setItem('jwt_token', json.data.token);
    localStorage.setItem('user_info', JSON.stringify(json.data.user || {}));
  }
}

function goLogin() { window.location.href = '/mobile/login.html?redirect=' + encodeURIComponent(window.location.pathname); }
function goWorkbench() { window.location.href = '/internal.html'; }
function goAdmin() { window.location.href = '/admin/dashboard.html'; }
function goWorkload() { window.location.href = '/mobile/workload-v2.html?v=20260515d'; }
function goCampaignBoard() { window.location.href = '/周年庆数据看板-V5.html?v=20260509b'; }
function showReadHistory() { window.location.href = '/mobile/history.html'; }
function showSubscription() { window.location.href = '/mobile/subscription.html'; }
function goToPoints() { window.location.href = '/mobile/points.html'; }
function logout() {
  if (confirm('确定要退出登录吗？')) {
    localStorage.removeItem('jwt_token');
    localStorage.removeItem('user_info');
    window.location.reload();
  }
}
function switchTab(tab) {
  if (tab === 'policies') window.location.href = '/mobile/policy.html';
  else if (tab === 'learning') window.location.href = '/mobile/learning.html';
  else if (tab === 'notifications') window.location.href = '/mobile/notifications.html';
}
</script>
</body>
