<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8" />
<title>H2 培训系统 · 追光小牛</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300..900;1,300..900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8;
  --cream-light: #FAF7F2;
  --cream-dark: #EBE3D5;
  --cream-darker: #D9CFBD;
  --ink: #191919;
  --ink-90: rgba(25,25,25,0.90);
  --ink-70: rgba(25,25,25,0.70);
  --ink-50: rgba(25,25,25,0.50);
  --ink-30: rgba(25,25,25,0.30);
  --ink-10: rgba(25,25,25,0.08);
  --ink-05: rgba(25,25,25,0.04);
  --accent: #D97757;
  --accent-light: #E8A890;
  --accent-bg: rgba(217,119,87,0.10);
  --accent-bg-hover: rgba(217,119,87,0.18);
  --positive: #4A9C6D;
  --positive-bg: rgba(74,156,109,0.10);
  --warning: #C4953E;
  --warning-bg: rgba(196,149,62,0.10);
  --danger: #C4544A;
  --danger-bg: rgba(196,84,74,0.08);
  --serif: "Fraunces", "Noto Serif SC", "Source Han Serif SC", Georgia, serif;
  --sans: "Inter", -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  --mono: "JetBrains Mono", "SF Mono", ui-monospace, monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
}

#app {
  max-width: 720px;
  margin: 0 auto;
  padding: 48px 24px 96px;
}

/* ===== Typography ===== */
h1, h2, h3, h4 { font-family: var(--serif); font-weight: 400; line-height: 1.2; }
h1 { font-size: 2.6rem; letter-spacing: -0.02em; margin-bottom: 0.4em; }
h2 { font-size: 2rem; letter-spacing: -0.01em; margin-bottom: 0.6em; }
h3 { font-size: 1.3rem; margin-bottom: 0.5em; }
h4 { font-size: 1.05rem; font-weight: 500; margin-bottom: 0.3em; }

p { margin-bottom: 1em; color: var(--ink-90); }
p:last-child { margin-bottom: 0; }
strong { font-weight: 600; color: var(--ink); }

/* ===== View switching ===== */
.view { display: none; }
.view.active { display: block; }

/* ===== Home ===== */
#home { text-align: center; padding-top: 80px; }
#home .brand { font-family: var(--mono); font-size: 12px; letter-spacing: 0.3em; color: var(--ink-50); text-transform: uppercase; margin-bottom: 40px; }
#home h1 { font-size: 3rem; margin-bottom: 0.15em; }
#home .subtitle { font-family: var(--serif); font-style: italic; font-size: 1.3rem; color: var(--accent); margin-bottom: 56px; }
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.mode-card {
  background: var(--cream-light);
  border: 1px solid var(--ink-10);
  border-radius: 12px;
  padding: 32px 28px;
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: left;
}
.mode-card:hover { border-color: var(--accent-light); background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
.mode-card .icon { font-size: 2rem; margin-bottom: 12px; }
.mode-card .title { font-family: var(--serif); font-size: 1.3rem; font-weight: 500; margin-bottom: 6px; }
.mode-card .desc { font-size: 0.88rem; color: var(--ink-50); line-height: 1.5; }

/* ===== Common nav ===== */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 20px; margin-bottom: 36px;
  border-bottom: 1px solid var(--ink-10);
}
.back-btn {
  background: none; border: none; color: var(--ink-50);
  font-family: var(--sans); font-size: 0.88rem; cursor: pointer;
  padding: 6px 0; transition: color 0.15s;
}
.back-btn:hover { color: var(--accent); }
.progress-bar-wrap { flex: 1; margin: 0 24px; }
.progress-bar-outer {
  height: 4px; background: var(--ink-10); border-radius: 2px; overflow: hidden;
}
.progress-bar-inner {
  height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease;
}
.progress-text { font-family: var(--mono); font-size: 11px; color: var(--ink-50); white-space: nowrap; min-width: 50px; text-align: right; }

/* ===== Role selection ===== */
.role-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.role-card {
  background: var(--cream-light); border: 1px solid var(--ink-10); border-radius: 10px;
  padding: 24px 18px; cursor: pointer; transition: all 0.2s;
}
.role-card:hover { border-color: var(--accent-light); background: #fff; }
.role-card .role-icon { font-size: 1.6rem; margin-bottom: 8px; }
.role-card .role-name { font-family: var(--serif); font-size: 1.1rem; font-weight: 500; }
.role-card .role-meta { font-size: 0.8rem; color: var(--ink-50); margin-top: 4px; }

/* ===== Module list ===== */
.module-list { display: flex; flex-direction: column; gap: 10px; }
.module-item {
  display: flex; align-items: center; gap: 16px;
  background: var(--cream-light); border: 1px solid var(--ink-10); border-radius: 10px;
  padding: 16px 20px; cursor: pointer; transition: all 0.15s;
}
.module-item:hover { border-color: var(--accent-light); }
.module-item.locked { opacity: 0.45; cursor: not-allowed; }
.module-item.locked:hover { border-color: var(--ink-10); }
.module-item.done { border-color: var(--positive); background: var(--positive-bg); }
.module-num {
  font-family: var(--mono); font-size: 13px; color: var(--ink-30);
  min-width: 28px; text-align: center;
}
.module-item.done .module-num { color: var(--positive); }
.module-title { flex: 1; font-weight: 500; }
.module-badge { font-size: 0.78rem; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
.module-badge.done { background: var(--positive-bg); color: var(--positive); }
.module-badge.locked { background: var(--ink-05); color: var(--ink-30); }
.module-badge.score { background: var(--accent-bg); color: var(--accent); }

/* ===== Content view ===== */
.content-section {
  background: var(--cream-light); border: 1px solid var(--ink-10); border-radius: 12px;
  padding: 36px 40px; margin-bottom: 24px;
}
.content-section h3 { border-bottom: 1px solid var(--ink-10); padding-bottom: 14px; margin-bottom: 20px; }
.content-section ul, .content-section ol { margin-bottom: 1em; padding-left: 1.5em; }
.content-section li { margin-bottom: 0.5em; color: var(--ink-90); }
.content-section blockquote {
  border-left: 3px solid var(--accent-light); padding: 12px 18px; margin: 20px 0;
  background: var(--accent-bg); border-radius: 0 8px 8px 0; font-style: italic; color: var(--ink-70);
}
.content-section .highlight-box {
  background: var(--accent-bg); border: 1px solid rgba(217,119,87,0.2); border-radius: 10px;
  padding: 20px 24px; margin: 20px 0;
}
.content-section .highlight-box .label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
.table-wrap { overflow-x: auto; margin: 16px 0; }
table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--ink-10); }
th { font-weight: 600; color: var(--ink-50); font-size: 0.8rem; letter-spacing: 0.05em; }

.content-actions { display: flex; gap: 12px; margin-top: 28px; }
.btn {
  padding: 10px 24px; border: none; border-radius: 8px; font-family: var(--sans);
  font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-deep); }
.btn-secondary { background: var(--ink-05); color: var(--ink); }
.btn-secondary:hover { background: var(--ink-10); }
.btn-outline { background: transparent; border: 1px solid var(--ink-30); color: var(--ink-70); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }

/* ===== Quiz ===== */
.quiz-card {
  background: var(--cream-light); border: 1px solid var(--ink-10); border-radius: 12px;
  padding: 28px 32px; margin-bottom: 20px;
}
.quiz-card .q-num { font-family: var(--mono); font-size: 11px; color: var(--ink-30); letter-spacing: 0.08em; margin-bottom: 8px; }
.quiz-card .q-type { font-size: 0.78rem; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 12px; }
.quiz-card .q-type.choice { background: var(--accent-bg); color: var(--accent); }
.quiz-card .q-type.scenario { background: var(--warning-bg); color: var(--warning); }
.quiz-card .q-text { font-weight: 500; margin-bottom: 16px; font-size: 1.02rem; }
.option-list { display: flex; flex-direction: column; gap: 8px; }
.option {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border: 1px solid var(--ink-10); border-radius: 8px;
  cursor: pointer; transition: all 0.12s; background: #fff;
}
.option:hover { border-color: var(--accent-light); }
.option.selected { border-color: var(--accent); background: var(--accent-bg); }
.option.correct { border-color: var(--positive); background: var(--positive-bg); }
.option.wrong { border-color: var(--danger); background: var(--danger-bg); }
.option .letter { font-family: var(--mono); font-size: 12px; color: var(--ink-30); min-width: 18px; }
.quiz-result {
  text-align: center; padding: 48px 24px;
}
.quiz-result .big-score { font-family: var(--serif); font-size: 5rem; font-weight: 300; line-height: 1; }
.quiz-result .pass-label { font-size: 1.1rem; margin: 8px 0 24px; }

/* ===== Briefing ===== */
#brief-slides { max-width: none; padding: 0; margin: 0; min-height: 100vh; background: var(--cream); }
.slide-container {
  width: 100%; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 80px; position: relative;
}
.slide-tag {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; color: var(--ink-30);
  text-transform: uppercase; text-align: center; margin-bottom: 16px;
}
.slide-headline {
  font-family: var(--serif); font-size: clamp(2.2rem, 5vw, 3.6rem); font-weight: 400;
  line-height: 1.15; text-align: center; max-width: 800px; margin-bottom: 16px;
  letter-spacing: -0.015em;
}
.slide-subhead {
  font-family: var(--serif); font-style: italic; font-size: 1.3rem; color: var(--accent);
  text-align: center; margin-bottom: 40px;
}
.slide-body {
  max-width: 640px; font-size: 1.05rem; line-height: 1.8; text-align: left;
}
.slide-body p { margin-bottom: 1.2em; }
.slide-big-num {
  font-family: var(--serif); font-size: clamp(4rem, 8vw, 7rem); font-weight: 300;
  line-height: 1; text-align: center; color: var(--accent); margin-bottom: 8px;
}
.slide-big-label {
  text-align: center; font-size: 1.1rem; color: var(--ink-50); margin-bottom: 32px;
}
.slide-nav {
  position: fixed; bottom: 32px; left: 0; right: 0; display: flex;
  align-items: center; justify-content: center; gap: 32px;
  z-index: 100; pointer-events: none;
}
.slide-nav button { pointer-events: auto; }
.slide-nav .nav-btn {
  width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--ink-30);
  background: rgba(245,240,232,0.9); cursor: pointer; display: flex;
  align-items: center; justify-content: center; font-size: 1.2rem;
  color: var(--ink-70); transition: all 0.15s;
}
.slide-nav .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.slide-counter { font-family: var(--mono); font-size: 12px; color: var(--ink-30); min-width: 60px; text-align: center; }
.slide-audience {
  position: fixed; top: 24px; right: 32px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em;
  color: var(--ink-30); background: var(--cream-light);
  padding: 4px 12px; border-radius: 4px; border: 1px solid var(--ink-10);
  z-index: 100;
}
.slide-exit {
  position: fixed; top: 20px; left: 24px; z-index: 100;
  font-size: 0.88rem; color: var(--ink-50); cursor: pointer; border: none; background: none;
}
.slide-exit:hover { color: var(--accent); }

/* ===== Topic cards ===== */
.topic-grid { display: flex; flex-direction: column; gap: 12px; }
.topic-card {
  display: flex; align-items: center; gap: 20px;
  background: var(--cream-light); border: 1px solid var(--ink-10); border-radius: 10px;
  padding: 20px 24px; cursor: pointer; transition: all 0.15s;
}
.topic-card:hover { border-color: var(--accent-light); background: #fff; }
.topic-num {
  font-family: var(--serif); font-size: 2rem; font-weight: 300; color: var(--accent);
  min-width: 48px; text-align: center;
}
.topic-info { flex: 1; }
.topic-info .topic-title { font-weight: 600; margin-bottom: 2px; }
.topic-info .topic-meta { font-size: 0.82rem; color: var(--ink-50); }
.topic-pages { font-family: var(--mono); font-size: 12px; color: var(--ink-30); }

/* ===== Responsive ===== */
@media (max-width: 680px) {
  #app { padding: 32px 16px 64px; }
  .mode-grid, .role-grid { grid-template-columns: 1fr; }
  h1 { font-size: 2rem; }
  #home h1 { font-size: 2.2rem; }
  #home { padding-top: 40px; }
  .content-section { padding: 24px 20px; }
  .slide-container { padding: 40px 24px; }
}

/* ===== Animations ===== */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.view.active { animation: fadeIn 0.3s ease; }

/* ===== Start quiz button ===== */
.start-quiz-wrap { text-align: center; margin: 32px 0; }
.btn-start-quiz {
  padding: 14px 48px; background: var(--accent); color: #fff; border: none;
  border-radius: 10px; font-family: var(--sans); font-size: 1rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.btn-start-quiz:hover { background: var(--accent-deep); transform: translateY(-1px); }

/* ===== Module content special blocks ===== */
.formula {
  font-family: var(--serif); font-size: 1.2rem; text-align: center; padding: 16px;
  background: var(--ink-05); border-radius: 8px; margin: 16px 0; color: var(--accent);
}
.step-list { counter-reset: step; list-style: none; padding-left: 0; }
.step-list li { counter-increment: step; padding-left: 40px; position: relative; margin-bottom: 12px; }
.step-list li::before {
  content: counter(step);
  position: absolute; left: 0; top: 0;
  font-family: var(--mono); font-size: 12px; color: var(--accent);
  border: 1px solid var(--accent); width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.emoji-bullet { margin-right: 8px; }
</style>
</head>
<body>
<div id="app">

<!-- ============ HOME ============ -->
<section id="home" class="view active">
  <div class="brand">Zhuiguang Xiaoniu</div>
  <h1>H2 培训系统</h1>
  <p class="subtitle">学透体系，执行到位</p>
  <div class="mode-grid">
    <div class="mode-card" onclick="enterMode('train')">
      <div class="icon">📖</div>
      <div class="title">自学培训</div>
      <div class="desc">按角色分路径学习，逐模块解锁，通过测验巩固</div>
    </div>
    <div class="mode-card" onclick="enterMode('brief')">
      <div class="icon">📺</div>
      <div class="title">宣讲演示</div>
      <div class="desc">按主题投屏讲解，适合团队会议和集中培训</div>
    </div>
  </div>
</section>

<!-- ============ TRAIN: ROLE SELECT ============ -->
<section id="train-roles" class="view">
  <div class="top-bar">
    <button class="back-btn" onclick="goHome()">← 返回首页</button>
  </div>
  <h2>选择你的岗位</h2>
  <p style="color:var(--ink-50);margin-bottom:28px">每个岗位有专属的学习路径，选择后开始学习</p>
  <div class="role-grid"></div>
</section>

<!-- ============ TRAIN: MODULE LIST ============ -->
<section id="train-modules" class="view">
  <div class="top-bar">
    <button class="back-btn" onclick="showView('train-roles')">← 选择岗位</button>
    <div class="progress-bar-wrap">
      <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar" style="width:0%"></div></div>
    </div>
    <span class="progress-text" id="progress-text">0/0</span>
  </div>
  <h2 id="modules-role-title"></h2>
  <p style="color:var(--ink-50);margin-bottom:24px" id="modules-role-desc"></p>
  <div class="module-list" id="module-list"></div>
</section>

<!-- ============ TRAIN: MODULE CONTENT ============ -->
<section id="train-content" class="view"></section>

<!-- ============ TRAIN: QUIZ ============ -->
<section id="train-quiz" class="view"></section>

<!-- ============ BRIEF: TOPIC SELECT ============ -->
<section id="brief-topics" class="view">
  <div class="top-bar">
    <button class="back-btn" onclick="goHome()">← 返回首页</button>
  </div>
  <h2>宣讲演示</h2>
  <p style="color:var(--ink-50);margin-bottom:28px">选择宣讲主题，投屏讲解（键盘 ← → 翻页，Esc 退出）</p>
  <div class="topic-grid" id="topic-grid"></div>
</section>

<!-- ============ BRIEF: SLIDES ============ -->
<section id="brief-slides" class="view">
  <button class="slide-exit" onclick="exitBrief()">← 退出</button>
  <span class="slide-audience" id="slide-audience"></span>
  <div class="slide-container" id="slide-container"></div>
  <div class="slide-nav">
    <button class="nav-btn" onclick="prevSlide()">←</button>
    <span class="slide-counter" id="slide-counter">1/1</span>
    <button class="nav-btn" onclick="nextSlide()">→</button>
  </div>
</section>

</div><!-- /#app -->

<script>
// ============ DATA ============

const ROLES = [
  { id:'coach',    name:'教练',     desc:'7 个模块 · 续费角色变化、教案、课后反馈、薪酬星级', icon:'🏋' },
  { id:'sales',    name:'销售',     desc:'6 个模块 · 新签漏斗、续费关门、五条线拓资源、薪酬考核', icon:'📞' },
  { id:'manager',  name:'店长',     desc:'8 个模块 · 日控周控月核、续费全链条、教案检查、团队管理', icon:'🏪' },
  { id:'edu_dir',  name:'教学主管', desc:'6 个模块 · 教案终审、课堂抽查、ACE培训、星级评定教学维度', icon:'📚' },
  { id:'supervisor',name:'督导',    desc:'5 个模块 · 数据巡检巡店、续费检查、新媒体运营、休眠激活', icon:'🔍' },
  { id:'founder',  name:'创始人/总经理', desc:'6 个模块 · 战略全景、四大引擎、7-12月作战节奏、薪酬驱动', icon:'🧭' },
];

const COURSES = {
  coach: {
    name: '教练', subtitle: 'H2 教练岗位学习路径',
    modules: [
      {
        id:1, title:'H2 与我有什么关系',
        content:`<p>H2 体系落地后，教练从"只管上课"转变为续费链条的<strong>核心纽带</strong>。过去续费主要由销售负责，现在教练正式进入续费流程，承担信任传递的关键角色。</p>
<div class="highlight-box"><div class="label">收入公式</div><p style="margin:0">月收入 = 底薪 + 星级津贴 + 课时费 + 出勤系数加权 + 续费业绩 × 2%激励</p></div>
<p>出勤系数直接与月度消课挂钩——出勤率越高，系数越大，课时费越高。这意味着教练不仅要教得好，还要把课上完、把学生留住。</p>
<p>五星评级体系引入后，<strong>月收入差距可达 2000+ 元</strong>。升星不仅有硬性续费门槛，还需要教学质量的综合评分。简单说：<strong>课上好、费续了、星升上——收入自然涨</strong>。</p>`,
        quiz:[
          { type:'choice', q:'教练在 H2 体系中新增的最核心角色是什么？', opts:['新签获客','续费信任传递','新媒体运营','教案终审'], ans:1 },
          { type:'choice', q:'出勤系数与什么直接相关？', opts:['月度消课','新签数量','转介绍人数','抖音播放量'], ans:0 },
          { type:'choice', q:'续费业绩的激励比例是？', opts:['1%','2%','3%','5%'], ans:1 },

      {
        id:2, title:'怎么写教案',
        content:`<p>教案不再只是"写个流程交差"，而是<strong>课前准备的标准动作</strong>。所有课程必须提前提交教案，经教学主管初审 / 终审才能上课。</p>

<li>家长主动好评时 — 截图/口头表扬时顺势提出</li>
<li>活动 / 赛事后 — 集体活动后家长热情最高</li>
</ol>
<div class="highlight-box"><div class="label">激励方案</div><ul><li>转介绍成功 1 人：奖励 100 元 + 被介绍学生首次课 8 折</li><li>转介绍成功 3 人：奖励 400 元 + 介绍人子女课时 9 折</li><li>累计 5 人以上：额外季度奖励</li></ul></div>
<p>目标：每个销售月均转介绍 ≥ 2 人。</p>`,
        quiz:[
          { type:'choice', q:'转介绍有几个标准触发点？', opts:['3 个','4 个','5 个','6 个'], ans:2 },
          { type:'scenario', q:'家长在群聊里说"教练太用心了，孩子进步明显"，销售最佳做法？', opts:['点赞','私聊感谢 + 顺势问"有朋友也想体验吗"','发红包','不理，跟业绩无关'], ans:1 },
          { type:'choice', q:'转介绍成功 3 人的奖励是？', opts:['300 元','400 元','500 元','1000 元'], ans:1 },
        ]
      },
      {
        id:5, title:'五条线拉资源',
        content:`<p>H2 目标 450+ 线索，不能只等自然到店。必须<strong>五条线并行</strong>主动拓资源。</p>
<h4>五条线 + 目标拆解</h4>

<tr><td>转介绍</td><td>80 条</td><td>5 触发点话术 + 激励方案落地</td></tr>
<tr><td>异业合作</td><td>70 条</td><td>周边幼儿园/母婴店/社区合作</td></tr>

<p>每月复盘各渠道线索量和转化率，动态调整投入比例。</p>`,

          { type:'scenario', q:'销售小吴的抖音线索量连续 2 周不达标，但转介绍超了目标。店长复盘时应该？', opts:['批评抖音做得不行','肯定转介绍、同时帮小吴分析抖音问题并调整','直接把他调去做转介绍','不管，总量够了就行'], ans:1 },
        ]
      },
      {
        id:6, title:'薪酬考核与我',
        content:`<p>销售薪酬以业绩为导向，但 H2 加入了<strong>过程指标</strong>，不再"只看结果"。</p>
<h4>销售 KPI 六项</h4>

          { type:'scenario', q:'销售小赵本月新签超目标 120%，但续费成交率仅 40%（标准 60%）。他的综合绩效会？', opts:['很高，新签弥补了','会被续费成交率拉低','跟只做新签一样','无所谓'], ans:1 },

  manager: {
    name: '店长', subtitle: 'H2 店长岗位学习路径',
    modules: [
      {
        id:1, title:'H2 店长角色变化',
        content:`<p>店长在 H2 中从"守店+看数据"升级为<strong>主动经营管理者</strong>。核心变化包括：从等线索到主动拓资源、教案检查新增为日常职责、续费全链条管理、团队 1 对 1 沟通标准化。</p>
<div class="highlight-box"><div class="label">店长新职责清单</div><ul><li>每日日控 6 勾（数据核查 + 执行确认）</li><li>每周周控 5 查（续费排查、资源复盘等）</li><li>每月月核 4 报（消课奖核算等）</li><li>教案初步检查 + 课堂随堂巡检</li><li>教练 1 对 1 沟通（每周至少 1 次）</li><li>续费全链条管理（分配→检查→升级→移交→跟进）</li></ul></div>
<p>店长不再只是"看店的"，而是<strong>门店经营结果的第一责任人</strong>。</p>`,
        quiz:[
          { type:'choice', q:'H2 店长新增的核心日常职责不包括哪项？', opts:['日控 6 勾','教案检查','直接上课教学','续费全链条管理'], ans:2 },
          { type:'choice', q:'教练 1 对 1 沟通的频率要求是？', opts:['每天','每周至少 1 次','每月 1 次','有需要才沟通'], ans:1 },
          { type:'scenario', q:'店长老王以前只管看报表，现在他每天上班第一件事应该做什么？', opts:['开门','打开 GYMG0 做日控 6 勾','泡茶','先跟销售开会'], ans:1 },
          { type:'choice', q:'月核 4 报包含几项？', opts:['2 项','3 项','4 项','5 项'], ans:2 },
        ]
      },
      {
        id:2, title:'日控 6 勾详解',
        content:`<p>日控 6 勾是店长<strong>每天必做</strong>的 6 项核查，确保门店当日运营不跑偏。</p>
<h4>日控 6 勾清单</h4>
<ol class="step-list">
<li><strong>出勤核查</strong>：当日各学员出勤情况，未出勤原因登记</li>
<li><strong>教练排课核查</strong>：当日课程是否按排课表执行，有无临时调课</li>
<li><strong>教案检查</strong>：当日上课教练是否已提交教案，抽查 1-2 份</li>
<li><strong>课后反馈核查</strong>：教练是否在 60 分钟内完成反馈双发</li>
<li><strong>销售日报核查</strong>：当日有效沟通数、邀约数、到店数</li>
<li><strong>异常标记</strong>：客诉、设备故障、未到店线索等异常记录</li>
</ol>
<div class="highlight-box"><div class="label">怎么记、怎么跟</div><p style="margin:0">使用日控表（纸质或 GYMG0 系统），逐项打勾，异常标红。发现异常不拖延，当天处理或记录待办，次日晨会通报。</p></div>
<p>日控不是在"管人"，而是在<strong>管流程</strong>——流程对了，结果自然对。</p>`,
        quiz:[
          { type:'choice', q:'日控 6 勾中教案检查的范围是？', opts:['全部检查','抽查 1-2 份','仅检查新教练','不需要检查'], ans:1 },
          { type:'scenario', q:'店长下午 4 点核查时发现教练小李 2 点的课后反馈还没发。应该？', opts:['明天再说','记一笔等月底算账','立即提醒小李 60 分钟内补发并记录异常','直接替他发了'], ans:2 },
          { type:'choice', q:'日控第 6 勾"异常标记"不包括哪项？', opts:['客诉','设备故障','销售业绩','未到店线索'], ans:2 },
        ]
      },
      {
        id:3, title:'周控 5 查详解',
        content:`<p>周控 5 查是店长<strong>每周至少 1 次</strong>的深度排查，防止问题积累。</p>
<h4>周控 5 查清单</h4>
<ol class="step-list">
<li><strong>续费排查</strong>：本周到期学员名单、续费推进状态、延期/流失原因</li>
<li><strong>资源复盘</strong>：本周各渠道线索量、到店率、成交率 vs 目标</li>
<li><strong>转介绍执行</strong>：各销售转介绍发起次数、成交数、差距分析</li>
<li><strong>教案汇总</strong>：本周教案提交率、一次通过率、D 级教案数量</li>
<li><strong>消课出勤</strong>：本周消课数、出勤率 vs 月目标、缺口预警</li>
</ol>
<p>周控的核心是<strong>"不积累问题"</strong>——本周的坑本周填，不给下周留。</p>`,
        quiz:[
          { type:'choice', q:'周控 5 查的频次是？', opts:['每天','每周至少 1 次','每两周 1 次','每月 1 次'], ans:1 },
          { type:'scenario', q:'周控排查发现本周续费推进进度仅完成 40%（标准应为 70%+），店长应该？', opts:['等下周自然改善','立即召集销售 + 教练逐一盘点剩余名单、制定下周推进计划','自己把续费单全接了','算到绩效考核里扣分'], ans:1 },
        ]
      },
      {
        id:4, title:'月核 4 报详解',
        content:`<p>月核 4 报是店长<strong>月度经营闭环</strong>，数据直接关联薪酬核算。</p>
<h4>月核 4 报清单</h4>
<ol class="step-list">
<li><strong>消课奖核算</strong>：教练出勤系数 × 课时费，确认无误后提交</li>
<li><strong>出勤系数汇总</strong>：门店平均出勤率、各教练出勤率排名</li>
<li><strong>教案汇总报告</strong>：月度教案总量、一次通过率、D 级占比</li>
<li><strong>经营复盘报告</strong>：月度业绩达成 vs 目标、问题分析、下月计划</li>
</ol>
<div class="highlight-box"><div class="label">时间节点</div><p style="margin:0">每月 3 日前完成上月月核 4 报提交，延迟提交影响门店薪酬发放。<br/>经营复盘报告需同步抄送督导和教学主管。</p></div>`,
        quiz:[
          { type:'choice', q:'月核 4 报的提交截止日是？', opts:['每月 1 日','每月 3 日','每月 5 日','每月 10 日'], ans:1 },
          { type:'choice', q:'经营复盘报告需抄送给？', opts:['仅自己存档','督导和教学主管','创始人','不做抄送'], ans:1 },
        ]
      },
      {
        id:5, title:'续费管理全链条',
        content:`<p>店长是续费的<strong>指挥官</strong>，不是执行者。要把整个续费流程管起来，确保不丢单。</p>
<h4>续费全链条六步</h4>
<ol class="step-list">
<li><strong>分配</strong>：续费到期名单按教练分配，标注学员信息</li>
<li><strong>检查</strong>：每周核查各教练续费推进进度（体测/面谈/意向）</li>
<li><strong>升级</strong>：长期不回复的家长升级至店长亲自沟通</li>
<li><strong>移交</strong>：教练面谈后有意向的，移交销售关门</li>
<li><strong>跟进</strong>：追踪销售关门进度，确保 72 小时内推动</li>
<li><strong>归档</strong>：成交/流失记录归档，纳入绩效考核</li>
</ol>
<p>店长的续费管理不是"自己去续"，而是<strong>确保流程中的每个人都在做自己该做的</strong>。</p>`,
        quiz:[
          { type:'choice', q:'续费管理中，店长的角色是？', opts:['亲自去续每个家长','流程指挥官','只分配不做检查','仅负责数据汇报'], ans:1 },
          { type:'scenario', q:'店长发现某教练名下 5 名续费学员推进极慢，2 周无进展。应该？', opts:['不管，等他自己推动','把他名下的续费全部转给销售','1 对 1 沟通了解原因，协助制定推进计划','扣他绩效'], ans:2 },
        ]
      },
      {
        id:6, title:'教案检查与课堂巡检',
        content:`<p>教案检查和课堂巡检是店长 H2 新增的核心职责。店长不终审教案（那是教学主管的事），但要做<strong>初步把关和安全审核</strong>。</p>
<h4>教案检查要点</h4><ul><li>当天所有上课教练是否已提交教案</li><li>教案格式是否符合 ACE 模板</li><li>抽查 1-2 份：教学目标和内容是否合理</li><li>安全风险点是否标注（高危动作、器材检查等）</li></ul>
<h4>课堂巡检要点</h4><ul><li>每月至少随堂听课 2 次</li><li>观察：课堂纪律、教练状态、学生参与度</li><li>记录巡检表，发现问题当天反馈给教练 + 教学主管</li></ul>
<p>课堂巡检不是"抓错"，是<strong>帮教练越教越好</strong>。</p>`,
        quiz:[
          { type:'choice', q:'课堂巡检每月最少几次？', opts:['1 次','2 次','3 次','4 次'], ans:1 },
          { type:'choice', q:'教案安全风险点审核属于哪一级职责？', opts:['店长初步审核','教学主管终审','教练自查','不需要审核'], ans:0 },
        ]
      },
      {
        id:7, title:'团队管理',
        content:`<p>店长要管的不只是流程，还有<strong>人</strong>。教练团队的稳定和成长直接决定门店教学质量。</p>
<h4>1 对 1 沟通标准</h4><ul><li>频率：每周至少 1 次（每位教练 15-20 分钟）</li><li>内容：本周工作复盘、问题支持、下周目标确认</li><li>记录：沟通纪要存入教练成长档案</li></ul>
<h4>工作量核查</h4><ul><li>教练课时是否合理，有无超负荷 / 负荷不足</li><li>排课是否平衡各教练收入机会</li><li>临时调课 / 代课是否记录在案</li></ul>
<h4>排课逻辑</h4><ul><li>优先排试听课 + 体验课（新线索转化）</li><li>老生排课按固定时段、保证连续性</li><li>高峰时段合理分配，避免部分教练空等</li></ul>`,
        quiz:[
          { type:'choice', q:'1 对 1 沟通的标准时长是？', opts:['5-10 分钟','15-20 分钟','30 分钟以上','不需要固定时长'], ans:1 },
          { type:'scenario', q:'店长发现一位新教练连续 3 周排课偏少，月收入很低造成焦虑。店长应该？', opts:['不管，能者多劳','在排课时适当平衡，增加其试听课/体验课排课','让他自己去找学生','降低其排课优先权'], ans:1 },
        ]
      },
      {
        id:8, title:'店长 KPI 与考核',
        content:`<p>店长是门店经营结果的第一责任人，KPI 直接挂钩门店业绩。</p>
<h4>店长 10 项 KPI</h4>
<table><thead><tr><th>指标</th><th>权重</th><th>说明</th></tr></thead>
<tbody>
<tr><td>门店总业绩达成率</td><td>20%</td><td>本店新签+续费总业绩/目标</td></tr>
<tr><td>消课出勤率</td><td>15%</td><td>门店平均出勤率≥88%</td></tr>
<tr><td>续费率</td><td>15%</td><td>到期续费数/到期总数</td></tr>
<tr><td>教案一次通过率</td><td>10%</td><td>教练团队平均通过率</td></tr>
<tr><td>新签成交率</td><td>10%</td><td>门店综合成交率</td></tr>
<tr><td>客诉处理</td><td>5%</td><td>客诉响应时效+满意度</td></tr>
<tr><td>日控周控完成度</td><td>10%</td><td>按时填报率</td></tr>
<tr><td>月核4报准时率</td><td>5%</td><td>每月3日前提交</td></tr>
<tr><td>教练流失率</td><td>5%</td><td>年度≤15%</td></tr>
<tr><td>安全检查</td><td>5%</td><td>零安全事故</td></tr></tbody></table>
<p><strong>不达标处理</strong>：连续 2 个月 KPI 总分 < 70 分 → 整改计划；连续 3 个月 < 70 分 → 岗位调整。</p>`,
        quiz:[
          { type:'choice', q:'店长 KPI 中权重最高的三项是？', opts:['业绩+出勤+续费','消课+教案+新签','客诉+日控+安全','业绩+教案+教练流失'], ans:0 },
          { type:'scenario', q:'店长老周连续 2 个月总分 65 分，第三个月如果他努力改善到 72 分，还需要岗位调整吗？', opts:['需要，历史上太低','不需要，超过 70 分就达标','要看创始人决定','连续 3 个月低分才调整'], ans:1 },
        ]
      },
    ]
  },

  edu_dir: {
    name: '教学主管', subtitle: 'H2 教学主管学习路径',
    modules: [
      {
        id:1, title:'H2 教学主管定位',
        content:`<p>教学主管是 H2 新增岗位，与督导<strong>平级分工</strong>——督导管店长执行，教学主管管教练质量。两条线并行运作。</p>

<tr><td>管什么</td><td>教学质量、教案、ACE培训</td><td>数据执行、续费流程、新媒体</td></tr>

      { t:'442 万目标拆解', body:'<table><thead><tr><th>引擎</th><th>贡献占比</th><th>目标金额</th></tr></thead><tbody><tr><td>续费引擎</td><td>40%</td><td>约 177 万</td></tr><tr><td>新签引擎</td><td>35%</td><td>约 155 万</td></tr><tr><td>交付引擎（消课）</td><td>15%</td><td>约 66 万</td></tr><tr><td>运营引擎（新增项目）</td><td>10%</td><td>约 44 万</td></tr></tbody></table>' },
      { t:'四大引擎闭合逻辑', body:'<div class="formula">交付好 → 续费高 → 运营稳 → 销售增 → 交付更好</div><p>每个引擎既是独立的系统，又是前后承接的环节。任何一个引擎断裂，整个飞轮就停转。</p>' },
      { t:'7-12 月作战地图', body:'<table><thead><tr><th>月份</th><th>关键词</th><th>核心任务</th></tr></thead><tbody><tr><td>7 月</td><td>培训+落地</td><td>全员通关、制度落地、暑假蓄水</td></tr><tr><td>8 月</td><td>实战检验</td><td>首月考核、经营复盘</td></tr><tr><td>9 月</td><td>100 万战役</td><td>秋季转化高潮、星级评定</td></tr><tr><td>10 月</td><td>稳节奏</td><td>巩固转化、持续蓄水</td></tr><tr><td>11 月</td><td>92 万战役</td><td>年度第二波高潮</td></tr><tr><td>12 月</td><td>收官</td><td>星级评定、年度总结</td></tr></tbody></table>' },
    ]
  },
  {
    id:10, title:'7-12 月作战地图', audience:'全员',
    slides:[
      { t:'7-12 月作战地图', body:'<p>6 个月、3 个阶段、2 场硬仗。<strong>9 月 100 万 × 11 月 92 万</strong>是全年最关键的两场战役。</p>' },
      { t:'月度业绩节奏', body:'<table><thead><tr><th>月</th><th>目标</th><th>关键动作</th></tr></thead><tbody><tr><td>7</td><td>50 万</td><td>培训+暑假班蓄水</td></tr><tr><td>8</td><td>60 万</td><td>暑假班转化+新线索积累</td></tr><tr><td>9</td><td>100 万</td><td>秋季开学转化+星级评定</td></tr><tr><td>10</td><td>70 万</td><td>维持节奏+蓄水</td></tr><tr><td>11</td><td>92 万</td><td>年末冲刺+双11营销</td></tr><tr><td>12</td><td>70 万</td><td>收官+星级评定</td></tr></tbody></table>' },
      { t:'9 月 100 万战役', body:'<p>9 月是整个 H2 的<strong>最大战役</strong>。暑假班转化 + 秋季开学报名 + 第一个星级评定窗口同时爆发。各店需提前 2 周做好准备：线索蓄水、教练排课饱和、续费名单清零。</p>' },
      { t:'11 月 92 万战役', body:'<p>11 月是<strong>年末最后冲刺窗口</strong>。结合双 11 营销活动，推动剩余续费 + 新签。此战结束后进入 12 月收官盘点。11 月成功 = H2 全年目标基本锁定。</p>' },
      { t:'蓄水逻辑', body:'<p>大仗不是当月才开始准备的——<strong>蓄水在前 2 个月</strong>。9 月 100 万靠 7-8 月的暑假蓄水。11 月 92 万靠 9-10 月的秋季蓄水。蓄水 = 积累线索 + 建立意向 + 提前锁定优惠。</p>' },
    ]
  },
];
</script>
<script>
// ============ STATE ============

let currentView = 'home';
let currentRole = null;
let currentModuleIdx = null;
let currentQuiz = null;
let currentQuizAnswers = [];
let currentBriefId = null;
let currentSlideIdx = 0;

function LS() {
  try {
    const k = currentRole ? `h2-train-${currentRole}` : null;
    if (!k) return {};
    return JSON.parse(localStorage.getItem(k) || '{}');
  } catch { return {}; }
}
function saveLS(data) {
  if (!currentRole) return;
  try { localStorage.setItem(`h2-train-${currentRole}`, JSON.stringify(data)); } catch {}
}

// ============ VIEW SWITCHING ============

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) { el.classList.add('active'); currentView = id; }
  window.scrollTo(0, 0);
}

function goHome() {
  currentRole = null; currentModuleIdx = null; currentQuiz = null;
  showView('home');
}

function enterMode(mode) {
  if (mode === 'train') { showView('train-roles'); renderRoles(); }
  else { showView('brief-topics'); renderTopics(); }
}

// ============ ROLES ============

function renderRoles() {
  const grid = document.querySelector('#train-roles .role-grid');
  grid.innerHTML = ROLES.map(r => `
    <div class="role-card" onclick="selectRole('${r.id}')">
      <div class="role-icon">${r.icon}</div>
      <div class="role-name">${r.name}</div>
      <div class="role-meta">${r.desc}</div>
    </div>
  `).join('');
}

function selectRole(id) {
  currentRole = id;
  showView('train-modules');
  renderModules();
}

// ============ MODULES ============

function renderModules() {
  const course = COURSES[currentRole];
  if (!course) return;
  document.getElementById('modules-role-title').textContent = course.name + '学习路径';
  document.getElementById('modules-role-desc').textContent = course.subtitle;

  const data = LS();
  const completed = data.completed || [];
  const scores = data.scores || {};
  const total = course.modules.length;
  const done = completed.length;

  document.getElementById('progress-bar').style.width = (done / total * 100) + '%';
  document.getElementById('progress-text').textContent = done + '/' + total;

  const list = document.getElementById('module-list');
  list.innerHTML = course.modules.map((m, i) => {
    const isDone = completed.includes(i);
    const isLocked = i > 0 && !completed.includes(i - 1) && !isDone;
    const cls = isDone ? 'done' : (isLocked ? 'locked' : '');
    let badge = '';
    if (isDone && scores[i] !== undefined) {
      badge = '<span class="module-badge score">' + scores[i] + '分</span>';
    } else if (isDone) {
      badge = '<span class="module-badge done">通过</span>';
    } else if (isLocked) {
      badge = '<span class="module-badge locked">锁定</span>';
    }
    return `
      <div class="module-item ${cls}" onclick="${isLocked ? '' : `openModule(${i})`}">
        <span class="module-num">${isDone ? '✓' : ('0' + (i + 1)).slice(-2)}</span>
        <span class="module-title">${m.title}</span>
        ${badge}
      </div>
    `;
  }).join('');
}

function openModule(idx) {
  currentModuleIdx = idx;
  showView('train-content');
  renderContent(idx);
}

function renderContent(idx) {
  const m = COURSES[currentRole].modules[idx];
  const isLast = idx === COURSES[currentRole].modules.length - 1;
  const data = LS();
  const alreadyPassed = (data.completed || []).includes(idx);

  document.getElementById('train-content').innerHTML = `
    <div class="top-bar">
      <button class="back-btn" onclick="showView('train-modules');renderModules()">← 返回模块列表</button>
    </div>
    <div class="content-section">
      <h3>${m.title}</h3>
      ${m.content}
    </div>
    ${alreadyPassed ? `<p style="text-align:center;color:var(--positive);margin:20px 0">已通过（${(data.scores||{})[idx] || '通过'}）</p>` : `
    <div class="start-quiz-wrap">
      <button class="btn-start-quiz" onclick="startQuiz(${idx})">开始测验（${m.quiz.length} 题）</button>
    </div>`}
  `;
}

// ============ QUIZ ============

function startQuiz(idx) {
  currentModuleIdx = idx;
  currentQuiz = COURSES[currentRole].modules[idx].quiz;
  currentQuizAnswers = new Array(currentQuiz.length).fill(-1);
  showView('train-quiz');
  renderQuiz();
}

function renderQuiz() {
  const html = currentQuiz.map((q, i) => `
    <div class="quiz-card" id="quiz-${i}">
      <div class="q-num">第 ${i + 1} 题 / 共 ${currentQuiz.length} 题</div>
      <span class="q-type ${q.type}">${q.type === 'choice' ? '单选题' : '情景判断'}</span>
      <div class="q-text">${q.q}</div>
      <div class="option-list">
        ${q.opts.map((o, oi) => `
          <div class="option ${currentQuizAnswers[i] === oi ? 'selected' : ''}" onclick="selectAnswer(${i}, ${oi})" id="opt-${i}-${oi}">
            <span class="letter">${String.fromCharCode(65 + oi)}</span>
            <span>${o}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  document.getElementById('train-quiz').innerHTML = `
    <div class="top-bar">
      <button class="back-btn" onclick="showView('train-content');renderContent(${currentModuleIdx})">← 返回学习</button>
    </div>
    <h3>测验</h3>
    ${html}
    <div style="text-align:center;margin:32px 0">
      <button class="btn-primary btn" onclick="submitQuiz()" id="btn-submit">提交</button>
    </div>
  `;
}

function selectAnswer(qi, oi) {
  if (currentQuizAnswers[qi] === oi) {
    currentQuizAnswers[qi] = -1;
    document.querySelectorAll(`#quiz-${qi} .option`).forEach(el => el.classList.remove('selected'));
  } else {
    currentQuizAnswers[qi] = oi;
    document.querySelectorAll(`#quiz-${qi} .option`).forEach(el => el.classList.remove('selected'));
    document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  }
}

function submitQuiz() {
  const unanswered = currentQuizAnswers.findIndex(a => a === -1);
  if (unanswered >= 0) {
    alert('请先完成所有题目（第 ' + (unanswered + 1) + ' 题未答）');
    return;
  }

  let correct = 0;
  currentQuiz.forEach((q, i) => {
    const opt = document.getElementById(`opt-${i}-${currentQuizAnswers[i]}`);
    if (currentQuizAnswers[i] === q.ans) {
      correct++;
      opt.classList.add('correct');
    } else {
      opt.classList.add('wrong');
      document.getElementById(`opt-${i}-${q.ans}`).classList.add('correct');
    }
    document.querySelectorAll(`#quiz-${i} .option`).forEach(el => el.style.pointerEvents = 'none');
  });

  document.getElementById('btn-submit').style.display = 'none';

  const total = currentQuiz.length;
  const pct = Math.round(correct / total * 100);
  const passed = pct >= 80;

  const resultEl = document.createElement('div');
  resultEl.className = 'quiz-result';
  resultEl.innerHTML = `
    <div class="big-score" style="color:${passed ? 'var(--positive)' : 'var(--danger)'}">${pct}</div>
    <div class="pass-label">${passed ? '通过！' : '未通过（需 ≥ 80 分）'}</div>
    <p style="color:var(--ink-50)">${correct} / ${total} 题正确</p>
    <div style="margin-top:24px;display:flex;justify-content:center;gap:12px">
      ${!passed ? '<button class="btn btn-outline" onclick="startQuiz(' + currentModuleIdx + ')">重新测验</button>' : ''}
      <button class="btn btn-primary" onclick="finishQuiz(' + passed + ', ' + pct + ')">${passed ? '完成，返回模块' : '返回学习内容'}</button>
    </div>
  `;
  document.getElementById('train-quiz').appendChild(resultEl);
  resultEl.scrollIntoView({ behavior: 'smooth' });
}

function finishQuiz(passed, pct) {
  if (passed) {
    const data = LS();
    if (!data.completed) data.completed = [];
    if (!data.scores) data.scores = {};
    if (!data.completed.includes(currentModuleIdx)) data.completed.push(currentModuleIdx);
    data.scores[currentModuleIdx] = pct;
    saveLS(data);
  }
  showView('train-modules');
  renderModules();
}

// ============ BRIEFING ============

function renderTopics() {
  document.getElementById('topic-grid').innerHTML = BRIEFINGS.map(b => `
    <div class="topic-card" onclick="startBrief(${b.id})">
      <span class="topic-num">${String(b.id).padStart(2, '0')}</span>
      <div class="topic-info">
        <div class="topic-title">${b.title}</div>
        <div class="topic-meta">${b.audience}</div>
      </div>
      <span class="topic-pages">${b.slides.length} 页</span>
    </div>
  `).join('');
}

function startBrief(id) {
  currentBriefId = id;
  currentSlideIdx = 0;
  showView('brief-slides');
  renderSlide();
  document.addEventListener('keydown', briefKeyHandler);
}

function renderSlide() {
  const b = BRIEFINGS.find(x => x.id === currentBriefId);
  if (!b) return;
  const s = b.slides[currentSlideIdx];
  document.getElementById('slide-audience').textContent = b.audience;
  document.getElementById('slide-counter').textContent = (currentSlideIdx + 1) + '/' + b.slides.length;

  const container = document.getElementById('slide-container');
  let html = '<div class="slide-tag">' + b.title + '</div>';
  html += '<div class="slide-headline">' + s.t + '</div>';
  if (s.s) html += '<div class="slide-subhead">' + s.s + '</div>';
  html += '<div class="slide-body">' + (s.body || '') + '</div>';
  container.innerHTML = html;
}

function nextSlide() {
  const b = BRIEFINGS.find(x => x.id === currentBriefId);
  if (!b) return;
  if (currentSlideIdx < b.slides.length - 1) { currentSlideIdx++; renderSlide(); }
}

function prevSlide() {
  if (currentSlideIdx > 0) { currentSlideIdx--; renderSlide(); }
}

function briefKeyHandler(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevSlide(); }
  if (e.key === 'Escape') { e.preventDefault(); exitBrief(); }
  if (e.key === 'Home') { e.preventDefault(); currentSlideIdx = 0; renderSlide(); }
  if (e.key === 'End') {
    const b = BRIEFINGS.find(x => x.id === currentBriefId);
    if (b) { e.preventDefault(); currentSlideIdx = b.slides.length - 1; renderSlide(); }
  }
}

function exitBrief() {
  document.removeEventListener('keydown', briefKeyHandler);
  currentBriefId = null;
  showView('brief-topics');
  renderTopics();
}

// ============ INIT ============
showView('home');
</script>
</body>
</html>
