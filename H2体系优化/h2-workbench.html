<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8" />
<title>追光小牛 H2 工作台</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#D97757" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="H2工作台" />
<link rel="manifest" href="/manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8;
  --cream-light: #FAF7F2;
  --cream-dark: #EBE3D5;
  --ink: #191919;
  --ink-80: rgba(25,25,25,0.80);
  --ink-60: rgba(25,25,25,0.60);
  --ink-40: rgba(25,25,25,0.40);
  --ink-10: rgba(25,25,25,0.08);
  --accent: #D97757;
  --accent-light: #E8A890;
  --accent-bg: rgba(217,119,87,0.08);
  --accent-border: rgba(217,119,87,0.2);
  --positive: #4A9C6D;
  --warning: #C4953E;
  --danger: #C4544A;
  --blue: #5B8DEE;
  --serif: "Fraunces", "Noto Serif SC", serif;
  --sans: "Inter", -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 15px; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
/* Topbar */
.topbar {
  background: var(--cream-light); border-bottom: 1px solid var(--ink-10);
  padding: 10px 28px; display: flex; align-items: center; gap: 16px;
  flex-wrap: wrap; position: sticky; top: 0; z-index: 200; min-height: 54px;
}
.topbar h1 { font-family: var(--serif); font-size: 1.15rem; font-weight: 500; white-space: nowrap; }
.role-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.role-tab {
  padding: 5px 12px; border-radius: 8px; border: 1px solid var(--ink-10);
  background: transparent; color: var(--ink-60); cursor: pointer;
  font-size: 12px; font-family: var(--sans); transition: all .15s; white-space: nowrap;
}
.role-tab:hover { background: var(--cream-dark); color: var(--ink); }
.role-tab.active { background: var(--accent-bg); border-color: var(--accent-light); color: var(--accent); font-weight: 600; }
.tool-btns { margin-left: auto; display: flex; gap: 6px; align-items: center; }
.tool-btn {
  background: transparent; border: 1px solid var(--ink-10); border-radius: 8px;
  padding: 5px 10px; cursor: pointer; font-size: 12px; color: var(--ink-40);
  transition: all .15s; white-space: nowrap; display: flex; align-items: center; gap: 4px;
}
.tool-btn:hover { background: var(--cream-dark); color: var(--ink); }
.tool-btn.active { color: var(--accent); border-color: var(--accent-light); }
.tool-btn .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
/* Today Banner */
.today-banner {
  margin: 16px 28px 0; max-width: 1400px;
  background: linear-gradient(135deg, #fff 0%, var(--cream-light) 100%);
  border: 1px solid var(--accent-border); border-radius: 14px; padding: 20px 24px;
  display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;
}
.today-date { flex-shrink: 0; text-align: center; padding-right: 20px; border-right: 1px solid var(--ink-10); }
.today-date .dow { font-size: 12px; color: var(--ink-40); text-transform: uppercase; letter-spacing: .06em; }
.today-date .day { font-family: var(--serif); font-size: 2.4rem; font-weight: 600; line-height: 1; color: var(--accent); }
.today-date .mon { font-size: 12px; color: var(--ink-60); margin-top: 2px; }
.today-info { flex: 1; min-width: 0; }
.today-info h2 { font-family: var(--serif); font-size: 1.05rem; font-weight: 500; margin-bottom: 8px; }
.today-tasks { display: flex; flex-wrap: wrap; gap: 8px; }
.today-task {
  display: flex; align-items: center; gap: 6px; font-size: 12px;
  padding: 6px 12px; border-radius: 8px; background: #fff; border: 1px solid var(--ink-10);
  cursor: pointer; transition: all .12s;
}
.today-task:hover { border-color: var(--accent-light); }
.today-task.done { background: rgba(74,156,109,0.06); border-color: rgba(74,156,109,0.15); opacity: 0.6; }
.today-task.done .tt-label { text-decoration: line-through; }
.today-task.urgent { border-color: rgba(196,84,74,0.3); background: rgba(196,84,74,0.04); }
.today-task .tt-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.today-task .tt-dot.normal { background: var(--accent-light); }
.today-task .tt-dot.urgent { background: var(--danger); }
.today-task .tt-dot.done { background: var(--positive); }
.today-task .tt-label { font-weight: 450; }
.today-task .tt-freq { font-size: 10px; color: var(--ink-40); margin-left: auto; }
.today-right { flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.today-right .greeting { font-size: 14px; color: var(--ink-40); }
.today-right .notif-status { font-size: 11px; color: var(--ink-40); display: flex; align-items: center; gap: 4px; }
.today-right .notif-status.on { color: var(--positive); }
.today-right .notif-status.off { color: var(--ink-40); }
/* Reminder Bar */
.reminder-bar {
  background: rgba(196,149,62,0.06); border: 1px solid rgba(196,149,62,0.15);
  border-radius: 10px; padding: 12px 20px; margin: 12px 28px; font-size: 12px;
  color: #7A5A20; max-width: 1400px; display: flex; align-items: center; gap: 8px;
}
.reminder-bar .r-close { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--ink-40); font-size: 16px; padding: 0 4px; }
/* Main Grid */
.main-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;
  padding: 0 28px 40px; max-width: 1400px; margin: 0 auto;
}
.panel {
  background: var(--cream-light); border: 1px solid var(--ink-10);
  border-radius: 12px; overflow: hidden;
}
.panel.full-width { grid-column: 1 / -1; }
.panel-header {
  padding: 14px 20px; border-bottom: 1px solid var(--ink-10);
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(0,0,0,0.01);
}
.panel-header h3 { font-size: 14px; font-weight: 600; color: var(--ink); }
.panel-body { padding: 16px 20px; max-height: 520px; overflow-y: auto; }
.tab-row { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--ink-10); }
.tab-btn {
  padding: 8px 18px; background: transparent; border: none;
  color: var(--ink-40); cursor: pointer; font-size: 13px; font-family: var(--sans);
  border-bottom: 2px solid transparent; transition: all .15s;
}
.tab-btn:hover { color: var(--ink-60); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.check-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--ink-10);
  cursor: pointer; transition: background .1s;
}
.check-item:hover { background: rgba(0,0,0,0.01); }
.check-item input[type="checkbox"] { margin-top: 3px; accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
.check-item .task { flex: 1; pointer-events: none; }
.check-item .task .label { font-size: 13px; font-weight: 500; color: var(--ink); }
.check-item .task .detail { font-size: 12px; color: var(--ink-40); margin-top: 2px; }
.check-item.checked .task .label { color: var(--ink-40); text-decoration: line-through; }
.check-item.checked .task .detail { color: var(--ink-10); }
.check-item .freq-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 4px;
  background: var(--accent-bg); color: var(--accent); white-space: nowrap; flex-shrink: 0; font-weight: 500;
}
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.kpi-card {
  background: #fff; border: 1px solid var(--ink-10); border-radius: 10px;
  padding: 16px; text-align: center;
}
.kpi-card .kpi-value { font-family: var(--serif); font-size: 1.5rem; font-weight: 500; margin-bottom: 4px; }
.kpi-card .kpi-label { font-size: 11px; color: var(--ink-40); }
.doc-link {
  display: flex; align-items: center; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid var(--ink-10); color: var(--ink-60);
  cursor: pointer; text-decoration: none; font-size: 13px; transition: all .12s;
}
.doc-link:last-child { border-bottom: none; }
.doc-link:hover { color: var(--accent); padding-left: 4px; }
.doc-group { margin-bottom: 4px; }
.doc-group-hd {
  font-size: 12px; font-weight: 600; color: var(--accent); letter-spacing: .04em;
  padding: 10px 0 6px; cursor: pointer; user-select: none;
  display: flex; align-items: center; gap: 6px;
  border-bottom: 1px solid var(--ink-10);
}
.doc-group-hd:hover { opacity: 0.7; }
.doc-group-arrow { font-size: 10px; transition: transform .15s; display: inline-block; }
.doc-group.collapsed .doc-group-arrow { transform: rotate(-90deg); }
.doc-group.collapsed .doc-group-body { display: none; }
.doc-group-cnt { font-weight: 400; color: var(--ink-40); font-size: 11px; margin-left: auto; }
.doc-group-body .doc-link { padding-left: 12px; }
.doc-search:focus { border-color: var(--accent) !important; }
.timeline-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
.timeline-card {
  background: #fff; border: 1px solid var(--ink-10); border-radius: 10px;
  padding: 14px; text-align: center;
}
.timeline-card .t-month { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.timeline-card .t-target { font-family: var(--serif); font-size: 1.3rem; font-weight: 500; margin: 4px 0; }
.timeline-card .t-key { font-size: 11px; color: var(--ink-40); }
.timeline-card.key .t-target { color: var(--danger); }
.timeline-card .t-badge {
  display: inline-block; margin-top: 4px; font-size: 10px; padding: 2px 8px;
  border-radius: 4px; font-weight: 500;
}
.t-badge.hot { background: rgba(196,84,74,0.1); color: var(--danger); }
.t-badge.warm { background: rgba(196,149,62,0.1); color: var(--warning); }
/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(25,25,25,0.5);
  z-index: 500; align-items: center; justify-content: center; padding: 40px;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--cream-light); border-radius: 14px; max-width: 640px;
  width: 100%; max-height: 80vh; overflow-y: auto; padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.modal-close {
  float: right; background: none; border: none; font-size: 1.4rem; cursor: pointer;
  color: var(--ink-40); padding: 0 0 8px 12px; line-height: 1;
}
.modal-close:hover { color: var(--ink); }
.modal-body { clear: both; font-size: 14px; line-height: 1.8; }
.modal-body h1, .modal-body h2, .modal-body h3 { font-family: var(--serif); margin: 1em 0 .5em; font-weight: 500; }
.modal-body h1 { font-size: 1.4rem; }
.modal-body h2 { font-size: 1.15rem; }
.modal-body h3 { font-size: 1rem; }
.modal-body ul, .modal-body ol { padding-left: 1.5em; margin: .5em 0; }
.modal-body li { margin-bottom: .3em; }
.modal-body code { background: var(--cream-dark); padding: 2px 6px; border-radius: 4px; font-size: .88em; }
.modal-body table { width: 100%; border-collapse: collapse; margin: .8em 0; font-size: .9em; }
.modal-body th, .modal-body td { border: 1px solid var(--ink-10); padding: 8px 12px; text-align: left; }
.modal-body th { background: rgba(0,0,0,0.02); font-weight: 600; }
.modal-body blockquote { border-left: 3px solid var(--accent-light); padding: 8px 16px; margin: .8em 0; background: var(--accent-bg); border-radius: 0 6px 6px 0; color: var(--ink-60); }
.modal-body hr { border: none; border-top: 1px solid var(--ink-10); margin: 1em 0; }
.modal-body pre { background: var(--cream-dark); padding: 12px 16px; border-radius: 8px; overflow-x: auto; font-size: .85em; margin: .8em 0; }
.modal-body pre code { background: transparent; padding: 0; }
/* Settings */
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--ink-10); }
.settings-row .s-label { font-size: 13px; font-weight: 500; }
.settings-row .s-desc { font-size: 11px; color: var(--ink-40); }
.settings-row select, .settings-row input { font-family: var(--sans); padding: 4px 8px; border: 1px solid var(--ink-10); border-radius: 6px; font-size: 13px; background: #fff; }
.empty-state { color: var(--ink-40); text-align: center; padding: 40px 20px; font-size: 14px; }
/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 10px;
  font-size: 13px; z-index: 900; opacity: 0; pointer-events: none; transition: opacity .3s;
}
.toast.show { opacity: 1; }
@media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }
@media (max-width: 768px) {
  .topbar { flex-direction: column; align-items: flex-start; }
  .tool-btns { margin-left: 0; }
  .timeline-grid { grid-template-columns: repeat(3, 1fr); }
  .today-banner { flex-direction: column; }
  .today-date { border-right: none; border-bottom: 1px solid var(--ink-10); padding-right: 0; padding-bottom: 12px; }
}
</style>
</head>
<body>

<div class="topbar">
  <h1>追光小牛 &middot; H2 工作台</h1>
  <div class="role-tabs" id="roleTabs"></div>
  <div class="tool-btns">
    <span style="font-size:11px;color:var(--ink-40);margin-right:6px" id="liveClock">--:--</span>
    <button class="tool-btn" id="btnFullscreen" title="全屏模式 (F11)" onclick="toggleFullscreen()">&#9974;</button>
    <button class="tool-btn" id="btnInstall" title="安装到桌面" onclick="installPWA()" style="display:none">&#9737; 安装</button>
    <button class="tool-btn" id="btnNotif" title="通知提醒" onclick="toggleNotif()">&#9733;</button>
    <button class="tool-btn" title="提醒设置" onclick="openSettings()">&#9881;</button>
  </div>
</div>

<div class="today-banner" id="todayBanner">
  <div class="today-date" id="todayDate"></div>
  <div class="today-info">
    <h2 id="todayGreeting"></h2>
    <div class="today-tasks" id="todayTasks"></div>
  </div>
  <div class="today-right">
    <span class="notif-status" id="notifStatus"></span>
    <span style="font-size:11px;color:var(--ink-40)">已坚持 <strong id="streakDays">0</strong> 天</span>
  </div>
</div>

<div class="reminder-bar" id="reminderBar" style="display:none">
  <span>&#9733;</span> <span id="reminderText"></span>
  <button class="r-close" onclick="dismissReminder()">&times;</button>
</div>

<div class="main-grid" id="mainGrid"></div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modalBox"></div>
</div>

<div class="toast" id="toast"></div>

function getCheckKey(role, freq, idx){ return role + '-' + freq + '-' + idx; }

function toggleCheck(role, freq, idx){
  var k = getCheckKey(role,freq,idx);
  checks[k] = !checks[k];
  if (!checks[k]) delete checks[k];

function updateStreak(){
  var today = new Date();
  var ds = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  var s = loadStreak();
  if (s.date === ds) return;
  var yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
  var yd = yesterday.getFullYear()+'-'+String(yesterday.getMonth()+1).padStart(2,'0')+'-'+String(yesterday.getDate()).padStart(2,'0');
  var hasDone = false;
  var cl = CHECKLISTS[state.role];
  if (cl && cl.daily) {
    for (var i=0;i<cl.daily.length;i++) {
      if (isChecked(state.role,'daily',i)) { hasDone = true; break; }
    }
  }
  if (hasDone) {
    if (s.date === yd) { s.count++; s.date = ds; }
    else if (s.date !== ds) { s.count = 1; s.date = ds; }
    saveStreak(s);
  }
  document.getElementById('streakDays').textContent = s.date === ds ? s.count : 0;
}

}

// Markdown parser
function inlineMD(t) {
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/___(.+?)___/g, '<code>$1</code>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return t.replace(/&amp;(lt|gt|amp);/g,'&$1;');
}

function renderTable(rows) {
  if (rows.length < 2) return '';
  rows = rows.filter(function(r){ return r.match(/\|/); });
  if (rows.length < 2) rows.push('');
  var html = '<table>';
  var skipAlign = rows.length > 1 && rows[1].replace(/\|/g,'').replace(/[\s\-:]/g,'') === '';
  for (var i = 0; i < rows.length; i++) {
    if (i === 1 && skipAlign) continue;
    var cells = rows[i].split('|');
    cells = cells.slice(1, -1);
    var tag = (i === 0 && skipAlign) || (i === 0 && !skipAlign) ? 'th' : 'td';
    html += '<tr>' + cells.map(function(c){ return '<' + tag + '>' + inlineMD(c.trim()) + '</' + tag + '>'; }).join('') + '</tr>';
    if (i > 0) skipAlign = false;
  }
  html += '</table>';
  return html;
}

function parseMD(t) {
  var lines = t.split(/\r?\n/);
  var out = [];
  var i = 0;
  var inBlock = false, buf = [];
  while (i < lines.length) {
    var l = lines[i];
    if (!inBlock && l.match(/^```/)) { inBlock = true; i++; continue; }
    if (inBlock) {
      if (l.match(/^```/)) { out.push('<pre><code>' + buf.join('\n') + '</code></pre>'); buf = []; inBlock = false; i++; continue; }
      buf.push(l); i++; continue;
    }
    if (l.match(/^#{1,4}\s/)) { var m = l.match(/^(#{1,4})\s(.+)/); var lvl = m[1].length; out.push('<h'+lvl+'>' + inlineMD(m[2]) + '</h'+lvl+'>'); i++; continue; }
    if (l.match(/^>\s?/)) { out.push('<blockquote>' + inlineMD(l.replace(/^>\s?/,'')) + '</blockquote>'); i++; continue; }
    if (l.match(/^\|\s/) && i+1 < lines.length && lines[i+1].match(/^\|[\s\-:|]+/)) {
      var tRows = [l]; i++;
      while (i < lines.length && lines[i].match(/^\|/)) { tRows.push(lines[i]); i++; }
      out.push(renderTable(tRows)); continue;
    }
    if (l.match(/^(\*|\-|\+)\s/)) {
      var items = []; var cEnd = false;
      while (i < lines.length) {
        var cl = lines[i];
        if (cl.match(/^(\*|\-|\+)\s/)) { items.push('<li>' + inlineMD(cl.replace(/^(\*|\-|\+)\s/,'')) + '</li>'); i++; }
        else if (cl.trim() === '') { i++; cEnd = true; break; }
        else break;
      }
      out.push('<ul>' + items.join('') + '</ul>'); continue;
    }
    if (l.match(/^\d+\.\s/)) {
      var oitems = [];
      while (i < lines.length) {
        var ol = lines[i];
        if (ol.match(/^\d+\.\s/)) { oitems.push('<li>' + inlineMD(ol.replace(/^\d+\.\s/,'')) + '</li>'); i++; }
        else if (ol.trim() === '') { i++; break; }
        else break;
      }
      out.push('<ol>' + oitems.join('') + '</ol>'); continue;
    }
    if (l.match(/^---+$/)) { out.push('<hr>'); i++; continue; }
    if (l.trim()) { out.push('<p>' + inlineMD(l) + '</p>'); }
    i++;
  }
  return out.join('\n');
}

function openDoc(filename, label){
  var m = document.getElementById('modalOverlay');
  var box = document.getElementById('modalBox');
  box.innerHTML = '<button class="modal-close" onclick="closeModal()">&times;</button><div class="modal-body" style="text-align:center;color:var(--ink-40);padding:40px">加载中...</div>';
  m.classList.add('show');
  fetch('/' + filename).then(function(r){
    if (!r.ok) throw new Error('加载失败');
    return r.text();
  }).then(function(txt){
    var html = parseMD(txt);
    box.innerHTML = '<button class="modal-close" onclick="closeModal()">&times;</button><h2 style="font-family:var(--serif);font-weight:500;margin-bottom:16px">' + label + '</h2><div class="modal-body">' + html + '</div>';
  }).catch(function(err){
    box.innerHTML = '<button class="modal-close" onclick="closeModal()">&times;</button><div class="modal-body" style="text-align:center;color:var(--danger);padding:40px">' + err.message + '</div>';
  });
}

function closeModal(){ document.getElementById('modalOverlay').classList.remove('show'); }

// Notification System
function requestNotifPermission(cb){
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') { cb && cb(true); return; }
  if (Notification.permission === 'denied') { cb && cb(false); return; }
  Notification.requestPermission().then(function(p){ cb && cb(p === 'granted'); });
}

function sendNotif(title, body){
  if (!notifCfg.enabled) return;
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;
  new Notification(title, { body: body, icon: '/manifest.json', tag: 'h2-reminder', requireInteraction: true });
}

function toggleNotif(){
  notifCfg.enabled = !notifCfg.enabled;
  saveNotif();
  if (notifCfg.enabled) {
    requestNotifPermission(function(granted){
      if (!granted) { notifCfg.enabled = false; saveNotif(); showToast('需要允许通知权限才能开启提醒'); }
    });
  }
  renderTodayBanner();
  showToast(notifCfg.enabled ? '每日提醒已开启' : '每日提醒已关闭');
}

function checkReminders(){
  if (!notifCfg.enabled) return;
  var d = new Date();
  var now = String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  var times = [notifCfg.morning, notifCfg.midday, notifCfg.afternoon, notifCfg.evening];
  var labels = ['上午提醒','午间提醒','下午提醒','晚间提醒'];
  for (var i=0;i<times.length;i++){
    if (now === times[i]){
      var undone = getUndoneDailyCount();
      if (undone > 0) {
        sendNotif(labels[i], '还有 ' + undone + ' 项今日任务待完成，打开工作台查看');
      }
      break;
    }
  }
}

function openSettings(){
  var m = document.getElementById('modalOverlay');
  var box = document.getElementById('modalBox');
  box.innerHTML = '<button class="modal-close" onclick="closeModal()">&times;</button>' +
    '<h2 style="font-family:var(--serif);font-weight:500;margin-bottom:16px">提醒设置</h2>' +
    '<div class="settings-row"><div><div class="s-label">每日提醒</div><div class="s-desc">在设定时间弹出桌面通知</div></div><input type="checkbox" '+(notifCfg.enabled?'checked':'')+' onchange="notifCfg.enabled=this.checked;saveNotif();renderTodayBanner()" style="accent-color:var(--accent)"></div>' +
    '<div class="settings-row"><div><div class="s-label">上午提醒</div></div><input type="time" value="'+notifCfg.morning+'" onchange="notifCfg.morning=this.value;saveNotif()"></div>' +
    '<div class="settings-row"><div><div class="s-label">午间提醒</div></div><input type="time" value="'+notifCfg.midday+'" onchange="notifCfg.midday=this.value;saveNotif()"></div>' +
    '<div class="settings-row"><div><div class="s-label">下午提醒</div></div><input type="time" value="'+notifCfg.afternoon+'" onchange="notifCfg.afternoon=this.value;saveNotif()"></div>' +
    '<div class="settings-row"><div><div class="s-label">晚间提醒</div></div><input type="time" value="'+notifCfg.evening+'" onchange="notifCfg.evening=this.value;saveNotif()"></div>' +
    '<div class="settings-row"><div><div class="s-label">安装到桌面</div><div class="s-desc">浏览器菜单 &gt; 添加到主屏幕，像桌面应用一样使用</div></div><button class="tool-btn" onclick="installPWA()" style="padding:6px 14px">&#9737; 安装</button></div>' +
    '<div class="settings-row"><div><div class="s-label">快捷键</div><div class="s-desc">F11 全屏 &middot; 1-6 切换角色</div></div><span style="font-size:11px;color:var(--ink-40)">已启用</span></div>';
  m.classList.add('show');
}

function toggleFullscreen(){
  if (document.fullscreenElement) document.exitFullscreen();
  else document.documentElement.requestFullscreen();
}

function installPWA(){
  if (installPrompt) {
    installPrompt.prompt();
    installPrompt.userChoice.then(function(r){ if (r.outcome === 'accepted') { showToast('安装成功！可从桌面打开'); document.getElementById('btnInstall').style.display = 'none'; } });
    installPrompt = null;
  } else {
    showToast('请使用浏览器菜单中选择"添加到主屏幕"安装');
  }
}

function showToast(msg){
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

// Keyboard shortcuts
document.addEventListener('keydown', function(e){
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  var keys = Object.keys(ROLE_DATA);
  for (var i=0;i<keys.length;i++){
    if (e.key === String(i+1)) { switchRole(keys[i]); return; }
  }
  if (e.key === 'Escape') closeModal();
});

// PWA install prompt
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  installPrompt = e;
  document.getElementById('btnInstall').style.display = '';
});

// Init
renderAll();
updateStreak();

// Ask notification permission on load
requestNotifPermission(function(granted){
  if (!granted) { notifCfg.enabled = false; saveNotif(); renderTodayBanner(); }
});

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(function(){});
}

// Clock update every second
setInterval(updateClock, 1000);

// Reminder check every 30 seconds
setInterval(checkReminders, 30000);
</script>
