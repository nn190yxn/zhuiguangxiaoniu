<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数据统计中心 - 追光小牛</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/internal-auth.js?v=7" defer></script>
    <style>
        :root {
            --brand-orange: #ff6b35;
            --brand-ink: #1f1a17;
            --brand-muted: #6b625c;
            --bg: #f5f3f0;
            --card: #ffffff;
            --success: #27ae60;
            --error: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--brand-ink);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .header {
            background: linear-gradient(135deg, var(--brand-orange) 0%, #ff8c5a 100%);
            color: white;
            padding: 24px 16px;
            border-radius: 0 0 24px 24px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .refresh-btn {
            float: right;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            margin-top: -40px;
        }

        .refresh-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .stats-container {
            padding: 16px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--brand-orange);
            border-radius: 2px;
        }

        /* 统计卡片网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .stat-card {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: all 0.2s;
        }

        .stat-card:hover {
            background: #f0f0f0;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--brand-orange);
        }

        .stat-value.success { color: var(--success); }
        .stat-value.info { color: var(--info); }
        .stat-value.warning { color: var(--warning); }

        .stat-label {
            font-size: 12px;
            color: var(--brand-muted);
            margin-top: 4px;
        }

        /* 进度条 */
        .progress-bar {
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: var(--brand-orange);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .progress-fill.success { background: var(--success); }

        /* 模块进度表格 */
        .module-table {
            width: 100%;
            border-collapse: collapse;
        }

        .module-table th,
        .module-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        .module-table th {
            background: #f8f8f8;
            font-size: 12px;
            font-weight: 600;
            color: var(--brand-muted);
            text-transform: uppercase;
        }

        .module-table td {
            font-size: 14px;
        }

        .module-name {
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-beginner { background: #e8f5e9; color: var(--success); }
        .badge-intermediate { background: #fff3e0; color: var(--warning); }
        .badge-advanced { background: #fce4ec; color: #e91e63; }

        /* 环形图 */
        .chart-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }

        .donut-chart {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .donut-chart svg {
            transform: rotate(-90deg);
        }

        .donut-chart circle {
            fill: none;
            stroke-width: 12;
        }

        .donut-bg { stroke: #f0f0f0; }
        .donut-fill { stroke: var(--brand-orange); stroke-linecap: round; }

        .donut-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .donut-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--brand-ink);
        }

        .donut-label {
            font-size: 11px;
            color: var(--brand-muted);
        }

        /* 卡片类型分布 */
        .type-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        .type-item {
            text-align: center;
            padding: 16px;
            background: #f8f8f8;
            border-radius: 12px;
        }

        .type-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin: 0 auto 8px;
        }

        .type-icon.K { background: #e3f2fd; color: #1976d2; }
        .type-icon.S { background: #f3e5f5; color: #7b1fa2; }
        .type-icon.D { background: #fff8e1; color: #f57f17; }
        .type-icon.C { background: #e8f5e9; color: #388e3c; }

        .type-count {
            font-size: 20px;
            font-weight: 700;
            color: var(--brand-ink);
        }

        .type-name {
            font-size: 12px;
            color: var(--brand-muted);
            margin-top: 2px;
        }

        /* 状态标签 */
        .status-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status-dot.green { background: var(--success); }
        .status-dot.orange { background: var(--brand-orange); }
        .status-dot.red { background: var(--error); }
        .status-dot.gray { background: #ccc; }

        /* 响应式 */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .type-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .module-table {
                font-size: 12px;
            }
            .module-table th,
            .module-table td {
                padding: 8px 10px;
            }
        }

        /* 加载动画 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--brand-muted);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #f0f0f0;
            border-top-color: var(--brand-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 更新时间 */
        .update-time {
            font-size: 12px;
            color: var(--brand-muted);
            text-align: right;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>数据统计中心</h1>
        <p>实时同步小程序与内网数据</p>
        <button class="refresh-btn" onclick="loadStats()">刷新数据</button>
    </div>

    <div class="stats-container" id="statsContainer">
        <div class="loading">
            <div class="spinner"></div>
            加载中...
        </div>
    </div>

    <script>
        function getToken() {
            return localStorage.getItem('jwt_token') || localStorage.getItem('token') || '';
        }

        function authHeaders(extraHeaders = {}) {
            const token = getToken();
            return token ? { ...extraHeaders, Authorization: `Bearer ${token}` } : { ...extraHeaders };
        }

        function canAccessAdmin(user) {
            if (!user) return false;
            const role = String(user.role || '').toLowerCase();
            return !!user.is_hq || !!user.is_admin || ['admin', 'ceo', 'operation', 'finance'].includes(role);
        }

        async function ensureStatsAccess() {
            const res = await fetch('/api/auth/me.php', { headers: authHeaders(), cache: 'no-store' });
            const json = await res.json();
            if (!res.ok || !json || json.code !== 0 || !json.data || !canAccessAdmin(json.data)) {
                window.location.href = '/internal.html';
                return false;
            }
            localStorage.setItem('user_info', JSON.stringify(json.data));
            return true;
        }

        let statsData = null;

        async function loadStats() {
            const container = document.getElementById('statsContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';

            try {
                const res = await fetch('/api/admin/stats.php', { headers: authHeaders(), cache: 'no-store' });
                const result = await res.json();

                if (result.code === 0) {
                    statsData = result.data;
                    renderStats(statsData);
                } else {
                    container.innerHTML = '<div class="loading">加载失败: ' + result.message + '</div>';
                }
            } catch (err) {
                container.innerHTML = '<div class="loading">网络错误，请稍后重试</div>';
            }
        }

        function renderStats(data) {
            const container = document.getElementById('statsContainer');
            const timestamp = new Date(data.timestamp).toLocaleString('zh-CN');

            let html = '';

            // ==================== 话术知识库 ====================
            html += `
            <div class="section-card">
                <div class="section-title">话术知识库</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${data.script_knowledge.total}</div>
                        <div class="stat-label">总条目</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value info">${data.script_knowledge.dimensions.qa?.count || 0}</div>
                        <div class="stat-label">问答话术</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value info">${data.script_knowledge.dimensions.knowledge?.count || 0}</div>
                        <div class="stat-label">专业知识</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value success">${data.script_knowledge.dimensions.feedback?.count || 0}</div>
                        <div class="stat-label">课后点评</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value warning">${data.script_knowledge.dimensions.deal?.count || 0}</div>
                        <div class="stat-label">独立谈单</div>
                    </div>
                </div>
                <div class="update-time">数据更新时间: ${timestamp}</div>
            </div>
            `;

            // ==================== 培训模块 ====================
            html += `
            <div class="section-card">
                <div class="section-title">培训模块</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${data.training.module_count}</div>
                        <div class="stat-label">模块总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${data.training.total_cards}</div>
                        <div class="stat-label">卡片总数</div>
                    </div>
                </div>

                <h4 style="font-size:13px;color:var(--brand-muted);margin:20px 0 12px;">卡片类型分布</h4>
                <div class="type-grid">
                    <div class="type-item">
                        <div class="type-icon K">K</div>
                        <div class="type-count">${data.training.card_types.K || 0}</div>
                        <div class="type-name">知识点</div>
                    </div>
                    <div class="type-item">
                        <div class="type-icon S">S</div>
                        <div class="type-count">${data.training.card_types.S || 0}</div>
                        <div class="type-name">话术卡</div>
                    </div>
                    <div class="type-item">
                        <div class="type-icon D">D</div>
                        <div class="type-count">${data.training.card_types.D || 0}</div>
                        <div class="type-name">演练卡</div>
                    </div>
                    <div class="type-item">
                        <div class="type-icon C">C</div>
                        <div class="type-count">${data.training.card_types.C || 0}</div>
                        <div class="type-name">通关卡</div>
                    </div>
                </div>
            </div>
            `;

            // ==================== 用户统计 ====================
            html += `
            <div class="section-card">
                <div class="section-title">用户统计</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${data.users.total}</div>
                        <div class="stat-label">总用户数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value success">${data.users.new_today}</div>
                        <div class="stat-label">今日新增</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value info">${data.users.new_this_week}</div>
                        <div class="stat-label">本周新增</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value warning">${data.users.new_this_month}</div>
                        <div class="stat-label">本月新增</div>
                    </div>
                </div>
            </div>
            `;

            // ==================== 学习进度 ====================
            const progressPercent = data.users.total > 0
                ? Math.round((data.progress.total_records / data.users.total) * 100)
                : 0;

            html += `
            <div class="section-card">
                <div class="section-title">学习进度</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${data.progress.total_records}</div>
                        <div class="stat-label">总学习记录</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value success">${data.progress.completed}</div>
                        <div class="stat-label">已完成</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value info">${data.progress.passed}</div>
                        <div class="stat-label">已通过</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value warning">${data.progress.in_progress}</div>
                        <div class="stat-label">进行中</div>
                    </div>
                </div>
                <div class="progress-bar" style="margin-top:16px;">
                    <div class="progress-fill" style="width:${progressPercent}%"></div>
                </div>
                <div style="font-size:12px;color:var(--brand-muted);margin-top:8px;">完成率: ${progressPercent}%</div>
            </div>
            `;

            // ==================== 考试记录 ====================
            const examPassRate = data.exams.pass_rate || 0;

            html += `
            <div class="section-card">
                <div class="section-title">考试记录</div>
                <div class="chart-container">
                    <div class="donut-chart">
                        <svg width="120" height="120" viewBox="0 0 120 120">
                            <circle class="donut-bg" cx="60" cy="60" r="48"></circle>
                            <circle class="donut-fill" cx="60" cy="60" r="48"
                                stroke-dasharray="${examPassRate * 3.02} 302"></circle>
                        </svg>
                        <div class="donut-center">
                            <div class="donut-value">${examPassRate}%</div>
                            <div class="donut-label">通过率</div>
                        </div>
                    </div>
                    <div class="stats-grid" style="flex:1;max-width:400px;">
                        <div class="stat-card">
                            <div class="stat-value">${data.exams.total}</div>
                            <div class="stat-label">总考试次数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value success">${data.exams.passed}</div>
                            <div class="stat-label">通过</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value error">${data.exams.failed}</div>
                            <div class="stat-label">未通过</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value info">${data.exams.avg_score}</div>
                            <div class="stat-label">平均分数</div>
                        </div>
                    </div>
                </div>
            </div>
            `;

            // ==================== 练习记录 ====================
            html += `
            <div class="section-card">
                <div class="section-title">练习记录</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${data.practice.total}</div>
                        <div class="stat-label">总练习次数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value success">${data.practice.completed}</div>
                        <div class="stat-label">已完成</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value warning">${data.practice.processing}</div>
                        <div class="stat-label">处理中</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value info">${data.practice.pending}</div>
                        <div class="stat-label">等待中</div>
                    </div>
                </div>
            </div>
            `;

            // ==================== 模块学习进度 ====================
            if (data.module_progress && data.module_progress.length > 0) {
                html += `
                <div class="section-card">
                    <div class="section-title">各模块学习进度</div>
                    <table class="module-table">
                        <thead>
                            <tr>
                                <th>模块名称</th>
                                <th>难度</th>
                                <th>学习记录</th>
                                <th>完成</th>
                                <th>通过</th>
                                <th>平均分</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                data.module_progress.forEach(m => {
                    const levelBadge = m.name.includes('初阶') || m.name.includes('基础')
                        ? '<span class="badge badge-beginner">初阶</span>'
                        : m.name.includes('进阶')
                        ? '<span class="badge badge-intermediate">进阶</span>'
                        : '<span class="badge badge-advanced">高阶</span>';

                    html += `
                            <tr>
                                <td class="module-name">${m.name}</td>
                                <td>${levelBadge}</td>
                                <td>${m.records}</td>
                                <td>${m.completed}</td>
                                <td>${m.passed}</td>
                                <td>${m.avg_score || '-'}</td>
                            </tr>
                    `;
                });

                html += `
                        </tbody>
                    </table>
                </div>
                `;
            }

            // ==================== 话术分析 ====================
            html += `
            <div class="section-card">
                <div class="section-title">话术分析</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${data.script_analysis.total}</div>
                        <div class="stat-label">总分析次数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value success">${data.script_analysis.completed}</div>
                        <div class="stat-label">已完成</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value warning">${data.script_analysis.pending}</div>
                        <div class="stat-label">等待中</div>
                    </div>
                </div>
            </div>
            `;

            // ==================== 数据同步状态 ====================
            html += `
            <div class="section-card">
                <div class="section-title">数据同步状态</div>
                <div class="status-row">
                    <div class="status-item">
                        <span class="status-dot green"></span>
                        <span>话术知识库: ${data.summary.script_knowledge_total}条</span>
                    </div>
                    <div class="status-item">
                        <span class="status-dot green"></span>
                        <span>培训卡片: ${data.summary.training_cards_total}张</span>
                    </div>
                    <div class="status-item">
                        <span class="status-dot green"></span>
                        <span>培训模块: ${data.summary.modules_total}个</span>
                    </div>
                    <div class="status-item">
                        <span class="status-dot green"></span>
                        <span>员工用户: ${data.summary.users_total}人</span>
                    </div>
                </div>
                <div class="status-row" style="margin-top:12px;">
                    <div class="status-item">
                        <span class="status-dot green"></span>
                        <span>考试记录: ${data.summary.exams_total}次</span>
                    </div>
                    <div class="status-item">
                        <span class="status-dot green"></span>
                        <span>练习记录: ${data.summary.practice_total}次</span>
                    </div>
                </div>
                <div class="update-time">
                    与小程序数据同步完成 | 最后更新: ${timestamp}
                </div>
            </div>
            `;

            container.innerHTML = html;
        }

        if (window.requirePageAuth) {
            window.requirePageAuth({ onAuthed: async function(user) {
                if (!canAccessAdmin(user)) {
                    window.location.replace('/internal.html');
                    return;
                }
                localStorage.setItem('user_info', JSON.stringify(user || {}));
                loadStats();
            } });
        } else {
            document.addEventListener('DOMContentLoaded', async function() {
                const ok = await ensureStatsAccess();
                if (!ok) {
                    return;
                }
                loadStats();
            });
        }
    </script>
</body>
</html>
