<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学习中心</title>
    <link rel="stylesheet" href="/css/mobile.css">
    <style>
        .quick-entry {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px;
            background: white;
            margin: 16px;
            border-radius: 16px;
        }
        .quick-entry-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: #f9f7f4;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-entry-item:active {
            transform: scale(0.98);
            background: #f0ebe5;
        }
        .quick-entry-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .quick-entry-icon.policy {
            background: linear-gradient(135deg, #ff6b35, #ff8f65);
            color: white;
        }
        .quick-entry-icon.knowledge {
            background: linear-gradient(135deg, #4caf50, #66bb6a);
            color: white;
        }
        .quick-entry-icon.exam {
            background: linear-gradient(135deg, #2196f3, #42a5f5);
            color: white;
        }
        .quick-entry-icon.drill {
            background: linear-gradient(135deg, #9c27b0, #ba68c8);
            color: white;
        }
        .quick-entry-icon.pass {
            background: linear-gradient(135deg, #2196f3, #42a5f5);
            color: white;
        }
        .quick-entry-text {
            flex: 1;
        }
        .quick-entry-title {
            font-size: 14px;
            font-weight: 600;
            color: #1f1a17;
            margin-bottom: 2px;
        }
        .quick-entry-desc {
            font-size: 11px;
            color: #9a958e;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 16px 12px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #1f1a17;
        }
        .section-more {
            font-size: 13px;
            color: #9a958e;
            cursor: pointer;
        }
        .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 16px;
        }
        .knowledge-card {
            background: white;
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
        }
        .knowledge-card:active {
            opacity: 0.9;
        }
        .knowledge-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #1f1a17;
            margin-bottom: 6px;
        }
        .knowledge-card-desc {
            font-size: 11px;
            color: #9a958e;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .knowledge-card-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .knowledge-card-tag {
            padding: 2px 8px;
            background: #fff3e0;
            color: #ff6b35;
            border-radius: 8px;
            font-size: 10px;
        }
        .category-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 0 16px 16px;
            -webkit-overflow-scrolling: touch;
        }
        .pass-summary-card {
            margin: 0 16px 16px;
            padding: 16px;
            background: linear-gradient(135deg, #fff8f3 0%, #ffffff 100%);
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            cursor: pointer;
        }
        .pass-summary-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .pass-role {
            font-size: 16px;
            font-weight: 600;
            color: #1f1a17;
        }
        .pass-stats {
            margin-top: 4px;
            font-size: 12px;
            color: #9a958e;
        }
        .pass-certs {
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255,107,53,0.1);
            color: #ff6b35;
            font-size: 12px;
            font-weight: 600;
        }
        .pass-current {
            margin-top: 14px;
            padding: 14px;
            border-radius: 12px;
            background: #ffffff;
        }
        .pass-current-label {
            font-size: 11px;
            color: #9a958e;
        }
        .pass-current-name {
            margin-top: 4px;
            font-size: 15px;
            font-weight: 600;
            color: #1f1a17;
        }
        .pass-current-meta {
            margin-top: 6px;
            font-size: 12px;
            color: #6b625c;
        }
        .pass-stage-list {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .pass-stage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border-radius: 12px;
            background: #ffffff;
        }
        .pass-stage-item.completed {
            border-left: 4px solid #4caf50;
        }
        .pass-stage-item.active {
            border-left: 4px solid #ff9800;
        }
        .pass-stage-item.locked {
            border-left: 4px solid #d7d1cb;
        }
        .pass-stage-name {
            font-size: 14px;
            font-weight: 600;
            color: #1f1a17;
        }
        .pass-stage-status {
            font-size: 12px;
            color: #9a958e;
        }
        .tab-item {
            padding: 8px 16px;
            background: white;
            border-radius: 20px;
            font-size: 13px;
            color: #6b625c;
            white-space: nowrap;
            cursor: pointer;
            flex-shrink: 0;
        }
        .tab-item.active {
            background: #ff6b35;
            color: white;
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <header class="header">
            <h1>学习中心</h1>
            <a href="/mobile/mine.html" class="back-btn">我的</a>
        </header>

        <div class="points-banner" id="pointsBanner">
            <div class="points-info">
                <span class="points-label">我的积分</span>
                <span class="points-value" id="totalPoints">0</span>
            </div>
            <div class="checkin-btn" id="checkinBtn" onclick="doCheckin()">
                <span class="checkin-icon">签到</span>
                <span class="checkin-status" id="checkinStatus">+5</span>
            </div>
        </div>

        <!-- 快捷入口 -->
        <div class="quick-entry">
            <div class="quick-entry-item" onclick="goToPolicy()">
                <div class="quick-entry-icon policy">📋</div>
                <div class="quick-entry-text">
                    <div class="quick-entry-title">制度学习</div>
                    <div class="quick-entry-desc">查看公司制度</div>
                </div>
            </div>
            <div class="quick-entry-item" onclick="goToKnowledge()">
                <div class="quick-entry-icon knowledge">🧠</div>
                <div class="quick-entry-text">
                    <div class="quick-entry-title">通用知识</div>
                    <div class="quick-entry-desc">体测/感统/工作标准</div>
                </div>
            </div>
            <div class="quick-entry-item" onclick="goToPassMap()">
                <div class="quick-entry-icon pass">🎯</div>
                <div class="quick-entry-text">
                    <div class="quick-entry-title">通关地图</div>
                    <div class="quick-entry-desc">查看阶段进度与证书</div>
                </div>
            </div>
        </div>

        <div class="section-header">
            <span class="section-title">通关进度</span>
            <span class="section-more" onclick="goToPassMap()">查看全部 →</span>
        </div>
        <div id="passSummary">
            <div class="loading" style="padding:20px;text-align:center;color:#9a958e;">加载中...</div>
        </div>

        <!-- 通用知识专区 -->
        <div class="section-header">
            <span class="section-title">通用知识</span>
            <span class="section-more" onclick="goToKnowledge()">查看全部 →</span>
        </div>
        <div class="knowledge-grid" id="commonKnowledge">
            <div class="loading" style="padding:20px;text-align:center;color:#9a958e;">加载中...</div>
        </div>

        <!-- 课程分类 -->
        <div class="section-header" style="padding-top:8px;">
            <span class="section-title">课程学习</span>
        </div>
        <nav class="category-tabs" id="categoryTabs">
            <div class="tab-item active" data-id="0">全部</div>
        </nav>

        <div class="course-list" id="courseList">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script src="/js/app-auth.js"></script>
    <script src="/internal-auth.js?v=7"></script>
    <script>
        const API_BASE = '/api';
        let categories = [];
        let selectedCategoryId = 0;

        async function init() {
            await loadCategories();
            await loadCommonKnowledge();
            await loadPassSummary();
            await loadCourses();
            await loadPoints();
        }

        async function loadPassSummary() {
            const container = document.getElementById('passSummary');
            try {
                const res = await fetch(`${API_BASE}/pass/map.php`, authHeaders());
                const data = await res.json();
                if (data.code === 0) {
                    renderPassSummary(data.data || {});
                    return;
                }
                container.innerHTML = '<div style="padding:20px;text-align:center;color:#9a958e;">通关进度加载失败</div>';
            } catch (err) {
                console.error('加载通关摘要失败:', err);
                container.innerHTML = '<div style="padding:20px;text-align:center;color:#9a958e;">暂无通关数据</div>';
            }
        }

        function renderPassSummary(data) {
            const container = document.getElementById('passSummary');
            const stages = (data.stages || []).map(stage => ({
                ...stage,
                status_text: ({ locked: '未解锁', active: '进行中', completed: '已通关' })[stage.status] || '未解锁'
            }));
            const completedCount = stages.filter(stage => stage.status === 'completed').length;
            const certificates = stages.filter(stage => !!stage.certificate).length;
            const activeStage = stages.find(stage => stage.status === 'active') || stages.find(stage => stage.status !== 'completed') || null;
            const stageList = stages.slice(0, 3).map(stage => `
                <div class="pass-stage-item ${stage.status}" onclick="goToPassMap()">
                    <div class="pass-stage-name">${escapeHtml(stage.name)}</div>
                    <div class="pass-stage-status">${escapeHtml(stage.status_text)}</div>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="pass-summary-card" onclick="goToPassMap()">
                    <div class="pass-summary-top">
                        <div>
                            <div class="pass-role">岗位通关路径</div>
                            <div class="pass-stats">已通关 ${completedCount} / ${stages.length} 阶段</div>
                        </div>
                        <div class="pass-certs">证书 ${certificates}</div>
                    </div>
                    ${activeStage ? `
                        <div class="pass-current">
                            <div class="pass-current-label">当前阶段</div>
                            <div class="pass-current-name">${escapeHtml(activeStage.name)}</div>
                            <div class="pass-current-meta">${activeStage.completed_count}/${activeStage.tasks_count} 任务 · ${activeStage.progress_percent}%</div>
                        </div>
                    ` : ''}
                    <div class="pass-stage-list">${stageList}</div>
                </div>
            `;
        }

        // 加载通用知识
        async function loadCommonKnowledge() {
            try {
                const res = await fetch(`${API_BASE}/knowledge/list.php?type=knowledge_card&page=1&page_size=4`, authHeaders());
                const data = await res.json();
                if (data.code === 0) {
                    renderCommonKnowledge(data.data.list || []);
                }
            } catch (err) {
                console.error('加载通用知识失败:', err);
                document.getElementById('commonKnowledge').innerHTML = '<div style="padding:20px;text-align:center;color:#9a958e;">暂无数据</div>';
            }
        }

        function renderCommonKnowledge(list) {
            const container = document.getElementById('commonKnowledge');
            if (list.length === 0) {
                container.innerHTML = '<div style="padding:20px;text-align:center;color:#9a958e;">暂无通用知识</div>';
                return;
            }

            const knowledgeCards = list.map(item => {
                return `
                    <div class="knowledge-card" onclick="goToKnowledgeDetail(${item.id})">
                        <div class="knowledge-card-title">${item.title}</div>
                        <div class="knowledge-card-desc">${item.summary || '暂无描述'}</div>
                        <div class="knowledge-card-tags">
                            <span class="knowledge-card-tag">公共</span>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = knowledgeCards;
        }

        // 跳转到制度查询
        function goToPolicy() {
            location.href = '/mobile/policy-search.html';
        }

        // 跳转到知识库
        function goToKnowledge() {
            location.href = '/mobile/knowledge.html';
        }

        function goToPassMap() {
            location.href = '/mobile/pass-map.html';
        }

        // 跳转到知识详情
        function goToKnowledgeDetail(id) {
            location.href = `/mobile/knowledge-detail.html?id=${id}`;
        }

        async function loadCategories() {
            try {
                const res = await fetch(`${API_BASE}/learning/category.php`, authHeaders());
                const data = await res.json();
                if (data.code === 0) {
                    categories = data.data.list || [];
                    renderCategories();
                }
            } catch (err) {
                console.error('加载分类失败:', err);
            }
        }

        function renderCategories() {
            const tabs = document.getElementById('categoryTabs');
            let html = '<div class="tab-item active" data-id="0">全部</div>';
            categories.forEach(cat => {
                html += `<div class="tab-item" data-id="${cat.id}">${cat.name}</div>`;
            });
            tabs.innerHTML = html;

            tabs.querySelectorAll('.tab-item').forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    selectedCategoryId = parseInt(tab.dataset.id);
                    loadCourses();
                });
            });
        }

        async function loadCourses() {
            const listEl = document.getElementById('courseList');
            listEl.innerHTML = '<div class="loading">加载中...</div>';

            try {
                let url = `${API_BASE}/learning/list.php?page=1&page_size=20`;
                if (selectedCategoryId > 0) {
                    url += `&category_id=${selectedCategoryId}`;
                }
                const res = await fetch(url, authHeaders());
                const data = await res.json();

                if (data.code === 0) {
                    renderCourses(data.data.list || []);
                } else {
                    listEl.innerHTML = '<div class="empty">加载失败</div>';
                }
            } catch (err) {
                console.error('加载课程失败:', err);
                listEl.innerHTML = '<div class="empty">网络错误</div>';
            }
        }

        function renderCourses(courses) {
            const listEl = document.getElementById('courseList');
            if (courses.length === 0) {
                listEl.innerHTML = '<div class="empty">暂无课程</div>';
                return;
            }

            let html = '';
            courses.forEach(course => {
                const statusClass = course.is_completed ? 'completed' : (course.is_started ? 'learning' : '');
                const statusText = course.is_completed ? '已完成' : (course.is_started ? '学习中' : '未开始');
                const progressHtml = course.is_started && !course.is_completed ?
                    `<div class="course-progress"><div class="progress-bar" style="width: ${course.user_progress || 0}%"></div></div>` : '';

                html += `
                    <div class="course-card ${statusClass}" onclick="goToCourse(${course.id})">
                        <div class="course-cover" style="background-image: url('${course.cover_image || '/images/course-default.png'}')">
                            ${course.is_required ? '<span class="required-tag">必修</span>' : ''}
                            <span class="status-tag ${statusClass}">${statusText}</span>
                        </div>
                        <div class="course-info">
                            <h3 class="course-title">${course.title}</h3>
                            <div class="course-meta">
                                <span class="category">${course.category_name}</span>
                                <span class="duration">${course.duration}分钟</span>
                            </div>
                            <div class="course-footer">
                                <span class="points-reward">奖励${course.points_reward}积分</span>
                                <span class="difficulty difficulty-${course.difficulty}">
                                    ${['', '初级', '中级', '高级'][course.difficulty]}
                                </span>
                            </div>
                            ${progressHtml}
                        </div>
                    </div>
                `;
            });
            listEl.innerHTML = html;
        }

        async function loadPoints() {
            try {
                const res = await fetch(`${API_BASE}/points/index.php`, authHeaders());
                const data = await res.json();
                if (data.code === 0) {
                    document.getElementById('totalPoints').textContent = data.data.total_points;
                    const checkinBtn = document.getElementById('checkinBtn');
                    const checkinStatus = document.getElementById('checkinStatus');
                    if (data.data.today_checked) {
                        checkinBtn.classList.add('checked');
                        checkinStatus.textContent = '已签到';
                    } else {
                        checkinStatus.textContent = '+5';
                    }
                }
            } catch (err) {
                console.error('加载积分失败:', err);
            }
        }

        async function doCheckin() {
            const checkinBtn = document.getElementById('checkinBtn');
            if (checkinBtn.classList.contains('checked')) {
                showToast('今日已签到');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/points/checkin.php`, {
                    ...authHeaders(),
                    method: 'POST'
                });
                const data = await res.json();
                if (data.code === 0) {
                    checkinBtn.classList.add('checked');
                    document.getElementById('checkinStatus').textContent = '已签到';
                    document.getElementById('totalPoints').textContent = data.data.balance;
                    showToast(`签到成功！+${data.data.points}积分`);
                } else {
                    showToast(data.message);
                }
            } catch (err) {
                showToast('签到失败');
            }
        }

        function goToCourse(courseId) {
            location.href = `/mobile/course.html?id=${courseId}`;
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        requirePageAuth({ onAuthed: init });
    </script>
</body>
</html>
