<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>登录 - 追光小牛</title>
<link rel="stylesheet" href="/styles.css">
<style>
:root {
  --brand-orange: #ff6b35;
  --brand-ink: #1f1a17;
  --brand-muted: #6b625c;
  --bg: #f5f3f0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  color: var(--brand-ink);
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.logo-section {
  padding: 60px 20px 40px;
  text-align: center;
}

.logo {
  width: 80px;
  height: 80px;
  margin: 0 auto 16px;
}

.logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.app-name {
  font-size: 24px;
  font-weight: 800;
  color: var(--brand-ink);
}

.app-desc {
  font-size: 14px;
  color: var(--brand-muted);
  margin-top: 4px;
}

.login-form {
  flex: 1;
  padding: 20px;
}

.form-card {
  background: white;
  border-radius: 24px;
  padding: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}

.form-title {
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 24px;
}

.input-group {
  margin-bottom: 16px;
}

.input-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--brand-muted);
  margin-bottom: 8px;
}

.input-field {
  width: 100%;
  height: 48px;
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 12px;
  padding: 0 16px;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}

.input-field:focus {
  border-color: var(--brand-orange);
}

.input-field::placeholder {
  color: #ccc;
}

.login-btn {
  width: 100%;
  height: 50px;
  border-radius: 25px;
  background: var(--brand-orange);
  color: white;
  font-size: 16px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.2s;
}

.login-btn:active {
  opacity: 0.9;
}

.login-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.hint {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--brand-muted);
  line-height: 1.6;
}

.hint a {
  color: var(--brand-orange);
  text-decoration: none;
}

.error-msg {
  background: #fef2f2;
  color: #dc2626;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}

.loading {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  border-top-color: white;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="logo-section">
  <div class="logo">
    <img src="/玻璃贴-14.png" alt="追光小牛" onerror="this.style.display='none'">
  </div>
  <div class="app-name">追光小牛</div>
  <div class="app-desc">员工内网工作台</div>
</div>

<div class="login-form">
  <div class="form-card">
  <div class="form-title">手机号登录</div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="input-group">
      <label class="input-label">手机号</label>
      <input type="text" class="input-field" id="username" placeholder="请输入登录手机号" autocomplete="username">
    </div>

    <div class="input-group">
      <label class="input-label">密码</label>
      <input type="password" class="input-field" id="password" placeholder="请输入密码" autocomplete="current-password">
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">登录</button>

    <div class="hint">
      使用员工手机号和密码登录<br>
      如无法登录，请联系管理员重置密码
    </div>
  </div>
</div>

<script>
const API_BASE = '/api';

document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('username').focus();

  document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      doLogin();
    }
  });

  const token = localStorage.getItem('jwt_token');
  if (!token) return;

  const isValid = await hasValidSession(token);
  if (!isValid) {
    localStorage.removeItem('jwt_token');
    localStorage.removeItem('user_info');
    return;
  }

  const redirect = getQueryParam('redirect') || '/internal.html';
  window.location.href = redirect;
});
async function hasValidSession(token) {
  try {
    const res = await fetch('/api/auth/me.php', {
      headers: {
        'Authorization': 'Bearer ' + token
      },
      cache: 'no-store'
    });
    const json = await res.json();
    return json.code === 0;
  } catch (err) {
    return false;
  }
}

function getQueryParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

async function resolvePostLoginRedirect(defaultRedirect) {
  try {
    const res = await fetch('/api/auth/me.php', {
      headers: {
        'Authorization': 'Bearer ' + (localStorage.getItem('jwt_token') || '')
      }
    });
    const json = await res.json();
    if (json.code === 0 && json.data && json.data.must_change_password) {
      return '/mobile/mine.html?force_change_password=1';
    }
  } catch (err) {
    console.warn('Post-login password check failed:', err);
  }
  return defaultRedirect || '/internal.html';
}

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  const loginBtn = document.getElementById('loginBtn');

  if (!username || !password) {
    errorMsg.textContent = '请输入用户名和密码';
    errorMsg.style.display = 'block';
    return;
  }

  errorMsg.style.display = 'none';
  loginBtn.disabled = true;
  loginBtn.innerHTML = '<span class="loading"></span>';

  try {
    const formData = new FormData();
    formData.append('username', username);
    formData.append('password', password);

    const res = await fetch(`${API_BASE}/auth-jwt.php`, {
      method: 'POST',
      body: formData
    });

    const json = await res.json();

    if (json.code === 0) {
      // 保存token和用户信息
      localStorage.setItem('jwt_token', json.data.token);
      localStorage.setItem('user_info', JSON.stringify(json.data.user));
      localStorage.setItem('last_login_username', username);

      const redirect = getQueryParam('redirect') || '/internal.html';
      window.location.href = await resolvePostLoginRedirect(redirect);
    } else {
      errorMsg.textContent = json.message || '登录失败，请检查账号密码';
      errorMsg.style.display = 'block';
      loginBtn.disabled = false;
      loginBtn.textContent = '登录';
    }
  } catch (err) {
    console.error('登录请求失败:', err);
    errorMsg.textContent = '网络错误，请检查网络连接';
    errorMsg.style.display = 'block';
    loginBtn.disabled = false;
    loginBtn.textContent = '登录';
  }
}
</script>

</body>
</html>
