<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-store">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>正在进入工作量日报 - 追光小牛</title>
<style>
:root{--brand-orange:#ff6b35;--brand-ink:#1f1a17;--brand-muted:#6b625c;--bg:#f5f3f0;--card:#fff;--line:rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);color:var(--brand-ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
.card{width:min(100%,360px);padding:24px;border:1px solid var(--line);border-radius:22px;background:var(--card);box-shadow:0 12px 30px rgba(0,0,0,.06);text-align:center}
.mark{width:52px;height:52px;margin:0 auto 14px;border-radius:18px;background:linear-gradient(135deg,#ff6b35,#ff9a5f)}
h1{font-size:20px;margin-bottom:8px}
p{font-size:13px;line-height:1.7;color:var(--brand-muted)}
a{display:inline-block;margin-top:16px;color:var(--brand-orange);font-size:13px;font-weight:800;text-decoration:none}
</style>
</head>
<body>
<main class="card">
  <div class="mark"></div>
  <h1>正在进入工作量日报</h1>
  <p>系统正在打开新版 H5 页面，请稍候。</p>
  <a id="fallbackLink" href="/mobile/workload-v2.html?v=20260609socialvideo">手动进入</a>
</main>
<script>
(function(){
  var target='/mobile/workload-v2.html?v=20260609socialvideo';
  var query=window.location.search||'';
  var hash=window.location.hash||'';
  if(query){
    target += '&legacy=1' + query.replace(/^\?/, '&');
  }
  target += hash;
  document.getElementById('fallbackLink').href=target;
  window.location.replace(target);
})();
</script>
</body>
</html>
