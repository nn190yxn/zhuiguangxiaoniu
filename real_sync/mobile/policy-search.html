<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>制度查询 - 追光小牛</title>
<style>
:root {
  --brand-orange: #ff6b35;
  --brand-ink: #1f1a17;
  --brand-muted: #6b625c;
  --bg: #f5f3f0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  color: var(--brand-ink);
  background: var(--bg);
  min-height: 100vh;
  padding-bottom: 20px;
}

a { color: inherit; text-decoration: none; }

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.back-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255,107,53,0.1);
  color: var(--brand-orange);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.header-title {
  flex: 1;
  font-size: 17px;
  font-weight: 700;
}

/* Search Section */
.search-section {
  background: white;
  padding: 16px;
}

.search-input-wrapper {
  display: flex;
  gap: 10px;
}

.search-input {
  flex: 1;
  height: 44px;
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 22px;
  padding: 0 16px;
  font-size: 15px;
  outline: none;
}

.search-input:focus {
  border-color: var(--brand-orange);
}

.search-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--brand-orange);
  color: white;
  border: none;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Filter Section */
.filter-section {
  padding: 12px 16px;
  background: white;
  border-bottom: 1px solid rgba(0,0,0,0.04);
}

.filter-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.filter-row::-webkit-scrollbar { display: none; }

.filter-tag {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 16px;
  font-size: 13px;
  background: #f5f3f0;
  color: var(--brand-muted);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
}

.filter-tag.active {
  background: var(--brand-orange);
  color: white;
}

.filter-label {
  font-size: 12px;
  color: var(--brand-muted);
  margin-bottom: 8px;
}

/* Results */
.results-section {
  padding: 16px;
}

.result-count {
  font-size: 13px;
  color: var(--brand-muted);
  margin-bottom: 12px;
}

.result-count strong {
  color: var(--brand-orange);
}

.policy-card {
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid rgba(0,0,0,0.06);
}

.policy-card:active {
  transform: scale(0.99);
  background: #fafafa;
}

.policy-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}

.policy-title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.4;
  flex: 1;
}

.policy-badge {
  flex-shrink: 0;
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 11px;
  background: rgba(255,107,53,0.1);
  color: var(--brand-orange);
}

.policy-badge.required {
  background: #fff3e0;
}

.policy-summary {
  font-size: 13px;
  color: var(--brand-muted);
  line-height: 1.5;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.policy-meta {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: #9a958e;
  margin-bottom: 12px;
}

.policy-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 12px;
  border-top: 1px solid rgba(0,0,0,0.04);
}

.policy-action {
  padding: 8px 20px;
  border-radius: 20px;
  background: var(--brand-orange);
  color: white;
  font-size: 13px;
  font-weight: 600;
  border: none;
  cursor: pointer;
}

.policy-action.viewed {
  background: #27ae60;
}

/* Empty */
.empty {
  text-align: center;
  padding: 60px 20px;
}

.empty-icon {
  font-size: 64px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.empty-text {
  font-size: 15px;
  color: var(--brand-muted);
}

/* Loading */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--brand-muted);
}

/* Quick Links */
.quick-links {
  padding: 12px 16px;
}

.quick-links-title {
  font-size: 13px;
  color: var(--brand-muted);
  margin-bottom: 10px;
}

.quick-links-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.quick-link {
  background: white;
  border-radius: 12px;
  padding: 14px 8px;
  text-align: center;
  border: 1px solid rgba(0,0,0,0.06);
}

.quick-link-icon {
  font-size: 24px;
  margin-bottom: 6px;
}

.quick-link-text {
  font-size: 12px;
  color: var(--brand-ink);
}
</style>
</head>
<body>

<header class="header">
  <a href="/mobile/mine.html" class="back-btn">←</a>
  <div class="header-title">制度查询</div>
</header>

<section class="search-section">
  <div class="search-input-wrapper">
    <input type="search" class="search-input" id="searchInput" placeholder="输入关键词搜索制度..." />
    <button class="search-btn" onclick="doSearch()">🔍</button>
  </div>
</section>

<section class="filter-section">
  <div class="filter-label">角色分类</div>
  <div class="filter-row" id="categoryFilter">
    <span class="filter-tag active" data-value="">全部</span>
    <span class="filter-tag" data-value="通用">通用</span>
    <span class="filter-tag" data-value="店长">店长</span>
    <span class="filter-tag" data-value="教练">教练</span>
    <span class="filter-tag" data-value="顾问">顾问</span>
  </div>
</section>

<section class="filter-section">
  <div class="filter-label">工作流程</div>
  <div class="filter-row" id="workflowFilter">
    <span class="filter-tag active" data-value="">全部</span>
    <span class="filter-tag" data-value="入职">入职流程</span>
    <span class="filter-tag" data-value="离职">离职流程</span>
    <span class="filter-tag" data-value="考勤">考勤制度</span>
    <span class="filter-tag" data-value="绩效">绩效考核</span>
    <span class="filter-tag" data-value="培训">培训管理</span>
  </div>
</section>

<div id="quickLinks" class="quick-links">
  <div class="quick-links-title">常用制度</div>
  <div class="quick-links-grid">
    <div class="quick-link" onclick="quickSearch('员工手册')">
      <div class="quick-link-icon">📖</div>
      <div class="quick-link-text">员工手册</div>
    </div>
    <div class="quick-link" onclick="quickSearch('考勤制度')">
      <div class="quick-link-icon">⏰</div>
      <div class="quick-link-text">考勤制度</div>
    </div>
    <div class="quick-link" onclick="quickSearch('绩效考核')">
      <div class="quick-link-icon">📊</div>
      <div class="quick-link-text">绩效考核</div>
    </div>
    <div class="quick-link" onclick="quickSearch('培训管理')">
      <div class="quick-link-icon">🎓</div>
      <div class="quick-link-text">培训管理</div>
    </div>
  </div>
</div>

<section class="results-section" id="resultsSection" style="display:none;">
  <div class="result-count" id="resultCount"></div>
  <div id="policyList"></div>
</section>

<div id="emptyState" class="empty">
  <div class="empty-icon">📋</div>
  <div class="empty-text">输入关键词搜索制度</div>
</div>

    <script src="/js/app-auth.js"></script>
<script src="/internal-auth.js?v=7"></script>
<script>
const API_BASE = '/api/policy';
let currentCategory = '';
let currentWorkflow = '';
let currentKeyword = '';
let searchPerformed = false;

function init() {
  initFilters();
  
  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') doSearch();
  });
}

function initFilters() {
  document.querySelectorAll('#categoryFilter .filter-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      document.querySelectorAll('#categoryFilter .filter-tag').forEach(t => t.classList.remove('active'));
      tag.classList.add('active');
      currentCategory = tag.dataset.value;
      if (searchPerformed) doSearch();
    });
  });

  document.querySelectorAll('#workflowFilter .filter-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      document.querySelectorAll('#workflowFilter .filter-tag').forEach(t => t.classList.remove('active'));
      tag.classList.add('active');
      currentWorkflow = tag.dataset.value;
      if (searchPerformed) doSearch();
    });
  });
}

function quickSearch(keyword) {
  document.getElementById('searchInput').value = keyword;
  doSearch();
}

async function doSearch() {
  const keyword = document.getElementById('searchInput').value.trim();
  
  if (!keyword && !currentCategory && !currentWorkflow) {
    showToast('请输入搜索关键词');
    return;
  }

  searchPerformed = true;
  currentKeyword = keyword;

  const resultsSection = document.getElementById('resultsSection');
  const emptyState = document.getElementById('emptyState');
  const quickLinks = document.getElementById('quickLinks');
  
  resultsSection.style.display = 'block';
  emptyState.style.display = 'none';
  quickLinks.style.display = 'none';

  document.getElementById('policyList').innerHTML = '<div class="loading">搜索中...</div>';

  try {
    const params = new URLSearchParams();
    if (keyword) params.set('keyword', keyword);
    if (currentCategory) params.set('category', currentCategory);
    if (currentWorkflow) params.set('workflow', currentWorkflow);
    params.set('page', 1);
    params.set('page_size', 50);

    const res = await fetch(`${API_BASE}/search.php?${params}`, authHeaders());
    const data = await res.json();

    if (data.code === 0) {
      const total = data.data.pagination?.total || data.data.list?.length || 0;
      document.getElementById('resultCount').innerHTML = 
        `找到 <strong>${total}</strong> 个匹配的制度`;
      renderPolicies(data.data.list || []);
    } else {
      document.getElementById('policyList').innerHTML = '<div class="empty"><div class="empty-text">搜索失败</div></div>';
    }
  } catch (err) {
    console.error('搜索失败:', err);
    document.getElementById('policyList').innerHTML = '<div class="empty"><div class="empty-text">网络错误</div></div>';
  }
}

function renderPolicies(policies) {
  const list = document.getElementById('policyList');

  if (policies.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">未找到匹配的制度</div></div>';
    return;
  }

  list.innerHTML = policies.map(policy => `
    <div class="policy-card" onclick="openPolicy(${policy.id})">
      <div class="policy-header">
        <div class="policy-title">${escapeHtml(policy.title)}</div>
        ${policy.is_need_confirm ? '<span class="policy-badge required">需确认</span>' : ''}
      </div>
      <div class="policy-meta">
        <span>${escapeHtml(policy.category || '')}</span>
        <span>${escapeHtml(policy.workflow || '')}</span>
        <span>v${policy.version || '1.0'}</span>
      </div>
      <div class="policy-footer">
        <span style="font-size:12px;color:#9a958e">更新: ${policy.updated_at || ''}</span>
        <button class="policy-action" onclick="event.stopPropagation(); viewPolicy(${policy.id})">
          ${policy.is_need_confirm ? '阅读并确认' : '查看详情'}
        </button>
      </div>
    </div>
  `).join('');
}

function openPolicy(id) {
  window.location.href = `/mobile/policy-detail.html?id=${id}`;
}

async function viewPolicy(id) {
  window.location.href = `/mobile/policy-detail.html?id=${id}`;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:white;padding:10px 20px;border-radius:20px;font-size:14px;z-index:1000;';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

requirePageAuth({ onAuthed: init });
</script>

</body>
</html>
