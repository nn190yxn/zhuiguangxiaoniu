<meta charset="UTF-8">

<style>
:root { --brand-orange: #ff6b35; --brand-ink: #1f1a17; --brand-muted: #6b625c; --bg: #f5f3f0; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; color: var(--brand-ink); background: var(--bg); min-height: 100vh; }
a { color: inherit; text-decoration: none; }
.shell { width: min(calc(100% - 32px), 1200px); margin: 0 auto; }

/* Header */
.site-header { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.95); backdrop-filter: blur(18px); border-bottom: 1px solid rgba(0,0,0,0.06); }
.topbar { min-height: 56px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
.brand { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; }
.brand img { width: 32px; height: 32px; object-fit: contain; }
.nav { display: flex; gap: 4px; }
.nav a { padding: 8px 14px; border-radius: 10px; font-size: 13px; color: var(--brand-muted); font-weight: 500; }
.nav a:hover, .nav a.current { background: rgba(255,107,53,0.1); color: var(--brand-orange); }
.staff-link { background: rgba(255,107,53,0.1); color: var(--brand-orange) !important; font-weight: 600; }

/* Hero */
.hero-section { padding: 24px 0 8px; }
.hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.hero-card { background: white; border-radius: 16px; padding: 24px; border: 1px solid rgba(0,0,0,0.06); }
.hero-card h1 { font-size: 24px; font-weight: 700; margin: 8px 0 6px; }
.hero-card .lead { font-size: 14px; color: var(--brand-muted); line-height: 1.6; }
.eyebrow { font-size: 12px; font-weight: 700; color: #9e9289; letter-spacing: 0.1em; text-transform: uppercase; }
.hero-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.btn { display: inline-flex; align-items: center; justify-content: center; min-height: 38px; padding: 0 18px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; }
.btn-primary { background: var(--brand-orange); color: white; }
.btn-primary:hover { opacity: 0.9; }
.btn-secondary { background: rgba(0,0,0,0.04); color: var(--brand-muted); }
.btn-secondary:hover { background: rgba(0,0,0,0.08); }

/* Layout */
.viewer-grid { display: grid; grid-template-columns: 260px 1fr; gap: 20px; padding: 16px 0 32px; align-items: start; }

/* Sidebar */
.sidebar { position: sticky; top: 76px; display: flex; flex-direction: column; gap: 14px; }
.sidebar-card { background: white; border-radius: 16px; padding: 20px; border: 1px solid rgba(0,0,0,0.06); }
.sidebar-title { font-size: 12px; font-weight: 700; color: #9e9289; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px; }
.doc-tag { display: inline-flex; align-items: center; min-height: 28px; padding: 0 12px; border-radius: 999px; background: rgba(255,107,53,0.1); color: var(--brand-orange); font-size: 12px; font-weight: 700; margin-bottom: 12px; }
.doc-summary { font-size: 13px; color: var(--brand-muted); line-height: 1.7; margin-bottom: 16px; }
.doc-outline { display: flex; flex-direction: column; gap: 4px; }
.doc-outline a { color: var(--brand-muted); font-size: 13px; padding: 6px 10px; border-radius: 8px; transition: all 0.15s; }
.doc-outline a:hover { background: rgba(255,107,53,0.08); color: var(--brand-orange); }
.doc-status { color: var(--brand-muted); font-size: 13px; }

/* Content */
.content-card { background: white; border-radius: 16px; padding: 36px 40px; border: 1px solid rgba(0,0,0,0.06); min-height: calc(100vh - 140px); }

/* === Document Content Styles === */
.doc-content h1 { font-size: 30px; font-weight: 700; margin: 0 0 12px; letter-spacing: -0.02em; line-height: 1.3; color: var(--brand-ink); }
.doc-content h2 { font-size: 20px; font-weight: 700; margin: 32px 0 14px; padding-bottom: 8px; border-bottom: 2px solid rgba(255,107,53,0.12); letter-spacing: -0.01em; color: var(--brand-ink); }
.doc-content h3 { font-size: 16px; font-weight: 700; margin: 24px 0 10px; color: var(--brand-ink); }
.doc-content h4 { font-size: 14px; font-weight: 700; margin: 16px 0 8px; color: var(--brand-muted); text-transform: uppercase; letter-spacing: 0.02em; }

.doc-content p { color: var(--brand-muted); line-height: 1.85; margin: 10px 0; font-size: 14px; }
.doc-content p + p { margin-top: 10px; }

.doc-content ul, .doc-content ol { margin: 12px 0; padding-left: 22px; color: var(--brand-muted); }
.doc-content li { margin: 6px 0; line-height: 1.75; font-size: 13.5px; }
.doc-content li::marker { color: var(--brand-orange); }

/* Blockquote - meta info styling */
.doc-content blockquote { margin: 16px 0; padding: 14px 18px; border-left: 3px solid var(--brand-orange); background: linear-gradient(135deg, #fff8f3 0%, #fff 100%); border-radius: 0 12px 12px 0; font-size: 13.5px; color: var(--brand-muted); line-height: 1.7; }
.doc-content blockquote p { margin: 4px 0; font-size: 13px; }
.doc-content blockquote strong { color: var(--brand-ink); }

/* Meta block (version/date/owner) */
.doc-meta { background: linear-gradient(135deg, #fff8f3 0%, #fff 100%); border: 1px solid rgba(255,107,53,0.1); border-radius: 14px; padding: 16px 20px; margin: 16px 0; }
.doc-meta p { margin: 4px 0; font-size: 13px; }

/* Code */
.doc-content pre { margin: 14px 0; padding: 14px; border-radius: 10px; overflow-x: auto; background: #1f2937; color: #f8fafc; font-size: 12.5px; line-height: 1.6; }
.doc-content code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 0.92em; }
.doc-content :not(pre) > code { background: #fff3eb; color: #c2410c; padding: 2px 5px; border-radius: 5px; font-size: 0.88em; }

/* HR */
.doc-content hr { border: 0; border-top: 1px solid rgba(0,0,0,0.06); margin: 24px 0; }

/* === Tables === */
.table-wrap { overflow-x: auto; margin: 16px 0; border-radius: 12px; border: 1px solid rgba(0,0,0,0.06); background: white; }
.doc-content table { width: 100%; border-collapse: collapse; font-size: 13px; }
.doc-content thead { background: #faf9f7; }
.doc-content th { padding: 10px 14px; text-align: left; font-weight: 700; color: var(--brand-ink); border-bottom: 2px solid rgba(0,0,0,0.06); font-size: 12.5px; white-space: nowrap; }
.doc-content td { padding: 8px 14px; border-bottom: 1px solid rgba(0,0,0,0.03); color: var(--brand-muted); line-height: 1.6; vertical-align: top; }
.doc-content tbody tr:hover { background: rgba(255,107,53,0.02); }
.doc-content tbody tr:last-child td { border-bottom: none; }

/* Responsive */
@media (max-width: 900px) {
  .hero-grid { grid-template-columns: 1fr; }
  .viewer-grid { grid-template-columns: 1fr; }
  .sidebar { position: static; }
  .content-card { padding: 24px; }
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function slugify(text) {
  return text.toLowerCase().replace(/[^\w\u4e00-\u9fa5]+/g, '-').replace(/^-+|-+$/g, '') || 'section';
}

function renderInline(text) {
  return escapeHtml(text).replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
}

function renderMarkdown(markdown) {
  const blocks = markdown.replace(/\r\n/g, '\n').split(/```/);
  const html = [];
  const outline = [];

  for (let i = 0; i < blocks.length; i++) {
    if (i % 2 === 1) {
      html.push('<pre><code>' + escapeHtml(blocks[i].trim()) + '</code></pre>');
      continue;
    }

    const lines = blocks[i].split('\n');
    let paragraph = [];
    let listType = null;
    let listItems = [];
    let inTable = false;
    let tableRows = [];

    const flushParagraph = () => {
      if (!paragraph.length) return;
      html.push('<p>' + renderInline(paragraph.join(' ')) + '</p>');
      paragraph = [];
    };

    const flushList = () => {
      if (!listItems.length || !listType) return;
      html.push('<' + listType + '>' + listItems.map(item => '<li>' + renderInline(item) + '</li>').join('') + '</' + listType + '>');
      listItems = [];
      listType = null;
    };

    const flushTable = () => {
      if (!tableRows.length) return;
      const thead = tableRows[0];
      const tbody = tableRows.slice(2);
      let t = '<div class="table-wrap"><table><thead><tr>';
      thead.forEach(c => t += '<th>' + renderInline(c) + '</th>');
      t += '</tr></thead>';
      if (tbody.length) {
        t += '<tbody>';
        tbody.forEach(row => {
          t += '<tr>';
          row.forEach(c => t += '<td>' + renderInline(c) + '</td>');
          t += '</tr>';
        });
        t += '</tbody>';
      }
      t += '</table></div>';
      html.push(t);
      tableRows = [];
      inTable = false;
    };

    for (let li = 0; li < lines.length; li++) {
      const rawLine = lines[li];
      const line = rawLine.trim();

      if (inTable) {
        if (line.includes('|')) {
          const cells = line.split('|').map(c => c.trim()).filter(c => c !== '');
          if (cells.length) tableRows.push(cells);
          continue;
        } else {
          flushTable();
        }
      }

      if (!line) {
        flushParagraph();
        flushList();
        continue;
      }

      const headingMatch = line.match(/^(#{1,4})\s+(.*)$/);
      if (headingMatch) {
        flushParagraph();
        flushList();
        const level = headingMatch[1].length;
        const text = headingMatch[2].trim();
        const id = slugify(text);
        if (level <= 3) outline.push({ id, text, level });
        html.push('<h' + level + ' id="' + id + '">' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      if (/^(-{3,}|\*{3,})$/.test(line)) {
        flushParagraph();
        flushList();
        html.push('<hr>');
        continue;
      }

      if (line.startsWith('> ')) {
        flushParagraph();
        flushList();
        const quoteText = line.slice(2);
        // Check if it's a meta block
        if (/版本|日期|主责|督导定位/.test(quoteText)) {
          html.push('<div class="doc-meta"><div class="meta-line">' + renderInline(quoteText) + '</div></div>');
        } else {
          html.push('<blockquote><p>' + renderInline(quoteText) + '</p></blockquote>');
        }
        continue;
      }

      // Table detection
      if (line.includes('|') && li + 1 < lines.length && lines[li + 1].includes('|') && lines[li + 1].includes('---')) {
        flushParagraph();
        flushList();
        inTable = true;
        const cells = line.split('|').map(c => c.trim()).filter(c => c !== '');
        if (cells.length) tableRows.push(cells);
        continue;
      }

      const orderedMatch = line.match(/^\d+\.\s+(.*)$/);
      if (orderedMatch) {
        flushParagraph();
        if (listType && listType !== 'ol') flushList();
        listType = 'ol';
        listItems.push(orderedMatch[1]);
        continue;
      }

      const unorderedMatch = line.match(/^[-*]\s+(.*)$/);
      if (unorderedMatch) {
        flushParagraph();
        if (listType && listType !== 'ul') flushList();
        listType = 'ul';
        listItems.push(unorderedMatch[1]);
        continue;
      }

      flushList();
      paragraph.push(line);
    }

    flushParagraph();
    flushList();
    if (inTable) flushTable();
  }

  return { html: html.join(''), outline };
}

async function loadDocument() {
  const params = new URLSearchParams(window.location.search);
  const docId = params.get('doc');
  const doc = DOCS[docId];
  const contentEl = document.getElementById('docContent');
  const outlineEl = document.getElementById('docOutline');

  if (!doc) {
    document.getElementById('docTitle').textContent = '未找到对应文档';
    document.getElementById('docSummary').textContent = '当前链接无效，请返回上一级页面重新进入。';
    document.getElementById('metaTag').textContent = '未识别';
    document.getElementById('metaHint').textContent = '未找到对应文档配置。';
    contentEl.innerHTML = '<p class="doc-status">未找到对应文档配置，请从上一级页面重新进入。</p>';
    outlineEl.innerHTML = '<span class="doc-status">暂无目录。</span>';
    return;
  }

  document.title = doc.title + ' | 追光小牛内网';
  document.getElementById('docTitle').textContent = doc.title;
  document.getElementById('docSummary').textContent = doc.summary;
  document.getElementById('metaTag').textContent = doc.tag;

  // Smart back button: detect referrer to return to the correct center
  const referrer = document.referrer || '';
  let backPath = doc.centerPath;
  let backTitle = doc.centerTitle;
  if (referrer.includes('/制度标准/')) {
    backPath = '/制度标准/';
    backTitle = '制度中心';
  } else if (referrer.includes('/新员工学习/') || referrer.includes('/learning')) {
    backPath = '/新员工学习/';
    backTitle = '学习中心';
  } else if (referrer.includes('/知识库/')) {
    backPath = '/知识库/';
    backTitle = '知识库';
  }
  document.getElementById('metaHint').textContent = '当前正文来自 ' + backTitle + '，请在站内继续完成阅读与跳转。';
  document.getElementById('backToCenter').href = backPath;
  document.getElementById('backToCenter').textContent = '返回' + backTitle;
  document.getElementById('backToCenter2').href = backPath;
  document.getElementById('backToCenter2').textContent = '返回' + backTitle;

  try {
    const response = await fetch('/doc-content.php?doc=' + encodeURIComponent(docId), {
      credentials: 'same-origin',
      headers: window.authHeaders ? window.authHeaders() : {}
    });
    if (response.status === 401) throw new Error('请先登录后阅读文档');
    if (!response.ok) throw new Error('HTTP ' + response.status);

    const markdown = await response.text();
    const rendered = renderMarkdown(markdown);
    contentEl.innerHTML = rendered.html || '<p class="doc-status">文档为空。</p>';

    if (!rendered.outline.length) {
      outlineEl.innerHTML = '<span class="doc-status">当前文档没有可提取的章节标题。</span>';
      return;
    }

    outlineEl.innerHTML = rendered.outline.map(item =>
      '<a href="#' + item.id + '" style="padding-left:' + ((item.level - 1) * 12) + 'px;">' + escapeHtml(item.text) + '</a>'
    ).join('');
  } catch (error) {
    contentEl.innerHTML = '<p class="doc-status">文档读取失败：' + escapeHtml(error.message) + '</p>';
    outlineEl.innerHTML = '<span class="doc-status">读取失败，无法生成目录。</span>';
  }
}

document.addEventListener('DOMContentLoaded', function() {
  if (window.requirePageAuth) {
    window.requirePageAuth({ onAuthed: async function() { await loadDocument(); } });
    return;
  }
  loadDocument();
});
</script>
