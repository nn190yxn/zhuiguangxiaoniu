<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>追光小牛智能运动规划</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/internal-auth.js?v=5" defer></script>
  </head>
  <body class="internal-body">
    <header class="site-header internal-header">
      <div class="shell topbar">
        <a class="brand" href="/internal.html">
          <img src="/玻璃贴-14.png" alt="追光小牛 logo" />
          <span>智能运动规划</span>
        </a>
        <nav class="nav">
          <a class="staff-link" href="/internal.html">回到首页</a>
        </nav>
      </div>
    </header>

    <main class="section-tight">
      <section class="shell hero-grid">
        <div class="hero-panel">
          <span class="eyebrow">AI 工具</span>
          <h1>智能运动规划</h1>
          <p class="lead">体测工具</p>
          <div class="actions">
            <a class="btn btn-primary" href="/fitness-assessment-app.html">进入智能运动规划</a>
            <a class="btn btn-secondary" href="/表格中心/">查看体测相关表格</a>
          </div>
        </div>
      </section>

      <section class="shell section-tight tool-grid" id="workflow">
        <div>
          <div class="page-card">
            <span class="eyebrow">使用方式</span>
            <h2>开始前先确认资料</h2>
            <p>准备好体测图片或基础信息后，再从上方主入口进入完整工作页。</p>
            <div class="tag-row">
              <span class="micro-tag">拍照上传</span>
              <span class="micro-tag">手动录入</span>
              <span class="micro-tag">自动生成</span>
            </div>
            <div class="footnote-box">
              主入口只保留上方一个，进入后可直接录入、生成和查看报告。
            </div>
          </div>
        </div>

        <div class="output-card">
          <div class="page-card">
            <span class="eyebrow">记录</span>
            <h2>运动规划记录</h2>
            <p>自动保存</p>
            <div class="tag-row">
              <span class="micro-tag">累计报告</span>
              <span class="micro-tag">今日报告</span>
              <span class="micro-tag">教练统计</span>
              <span class="micro-tag">门店统计</span>
            </div>
            <div class="actions" style="margin-top: 18px;">
              <a class="btn btn-primary" href="/fitness-assessment-app.html">查看记录</a>
            </div>
            <div class="footnote-box">
              进入完整工作页后可查看记录。
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
