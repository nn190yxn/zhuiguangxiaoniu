<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跳转中 - 讲师带训</title>
  <meta http-equiv="refresh" content="0; url=/training-center/trainer-playbook.html">
  <link rel="stylesheet" href="/styles.css">
  <style>
    :root { --brand-orange: #ff6b35; --brand-ink: #1f1a17; --brand-muted: #6b625c; --bg: #f5f3f0; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: var(--bg); color: var(--brand-ink); font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .card { width: min(100%, 460px); padding: 28px 24px; border-radius: 20px; background: #fff; border: 1px solid rgba(0,0,0,0.06); box-shadow: 0 12px 30px rgba(31, 26, 23, 0.08); text-align: center; }
    h1 { margin: 0 0 12px; font-size: 20px; }
    p { margin: 0; color: var(--brand-muted); line-height: 1.7; font-size: 14px; }
    .actions { display: flex; justify-content: center; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    a { display: inline-flex; align-items: center; justify-content: center; min-height: 40px; padding: 0 16px; border-radius: 999px; text-decoration: none; font-size: 14px; font-weight: 600; }
    .primary { background: var(--brand-orange); color: #fff; }
    .secondary { background: rgba(255,107,53,0.08); color: var(--brand-orange); }
  </style>
</head>
<body>
  <div class="card">
    <h1>正在前往讲师带训</h1>
    <p>旧根目录培训资料副本已收敛为兼容入口，系统将跳转到正式培训资料页面。</p>
    <div class="actions">
      <a class="primary" href="/training-center/trainer-playbook.html">进入正式页面</a>
      <a class="secondary" href="/training-center/">返回培训资料库</a>
    </div>
  </div>
  <script>
    (function() {
      var target = '/training-center/trainer-playbook.html';
      var query = window.location.search || '';
      if (query) target += query;
      window.location.replace(target);
    })();
  </script>
</body>
</html>
