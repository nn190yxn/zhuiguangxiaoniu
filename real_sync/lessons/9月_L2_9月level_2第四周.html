<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>9月 L2 第周教案 · 追光小牛</title>
  <style>
    :root { --brand-orange: #ff6b35; --brand-ink: #1f1a17; --brand-muted: #6b625c; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; color: var(--brand-ink); background: #f5f3f0; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    .shell { width: min(calc(100% - 32px), 800px); margin: 0 auto; padding: 20px 0; }

    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--brand-muted); font-size: 14px; margin-bottom: 16px; }
    .back-link:hover { color: var(--brand-orange); }

    .lesson-header { background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.06); }
    .lesson-meta { display: flex; gap: 8px; margin-bottom: 12px; }
    .level-badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; }
    .level-badge.L1 { background: #e8f4fd; color: #2f80ed; }
    .level-badge.L2 { background: #eafaf1; color: #27ae60; }
    .level-badge.L3 { background: #fff4ec; color: #e67e22; }
    .level-badge.L4 { background: #f5eef8; color: #9b59b6; }
    .month-badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; background: #f0eeeb; color: var(--brand-muted); }
    .lesson-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .lesson-theme { font-size: 15px; color: var(--brand-muted); }
    .lesson-theme strong { color: var(--brand-orange); }

    .section { background: white; border-radius: 14px; padding: 20px; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.06); }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .section-type { padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; background: rgba(255,107,53,0.1); color: var(--brand-orange); }
    .section-duration { font-size: 12px; color: #9e9289; }
    .section-name { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .section-activity { font-size: 14px; color: var(--brand-muted); line-height: 1.6; }
    .activities-list { display: flex; flex-direction: column; gap: 6px; }
    .activity-item { font-size: 14px; padding: 8px 12px; background: #f5f3f0; border-radius: 8px; }
    .activity-type { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; background: var(--brand-orange); color: white; margin-right: 8px; }

    .equipment { background: white; border-radius: 14px; padding: 16px 20px; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.06); font-size: 14px; color: var(--brand-muted); }
    .pdf-link { display: inline-block; padding: 10px 20px; background: var(--brand-orange); color: white; border-radius: 10px; font-size: 14px; font-weight: 600; margin-top: 8px; }
    .pdf-link:hover { background: #e55a2b; }

    @media (max-width: 600px) {
      .shell { padding: 12px; }
      .lesson-header { padding: 16px; }
      .section { padding: 14px; }
    }
  </style>
</head>
