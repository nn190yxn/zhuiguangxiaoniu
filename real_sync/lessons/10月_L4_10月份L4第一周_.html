<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <title>10 月份 Level 4 贝体学院运动健康管理方案（第一周） · 追光小牛教案</title>
  <style>
    :root { --brand-orange: #ff6b35; --brand-ink: #1f1a17; --brand-muted: #6b625c; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; color: var(--brand-ink); background: #f5f3f0; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    .shell { width: min(calc(100% - 32px), 900px); margin: 0 auto; }

    /* Header */
    .site-header { background: rgba(255,255,255,0.95); backdrop-filter: blur(18px); border-bottom: 1px solid rgba(0,0,0,0.06); }
    .topbar { min-height: 56px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .brand { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; }
    .brand img { width: 32px; height: 32px; object-fit: contain; }
    .nav { display: flex; gap: 4px; }
    .nav a { padding: 8px 14px; border-radius: 10px; font-size: 13px; color: var(--brand-muted); font-weight: 500; }
    .nav a:hover { background: rgba(255,107,53,0.08); color: var(--brand-orange); }

    /* Lesson Header */
    .lesson-header { padding: 28px 0 16px; }
    .lesson-header h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .lesson-meta { display: flex; gap: 12px; flex-wrap: wrap; }
    .meta-tag { padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 500; }
    .meta-tag.month { background: rgba(255,107,53,0.1); color: var(--brand-orange); }
    .meta-tag.level { background: #e8f4fd; color: #2f80ed; }
    .meta-tag.theme { background: #eafaf1; color: #27ae60; }
    .meta-tag.week { background: #f5eef8; color: #9b59b6; }

    /* Section Cards */
    .section-card { background: white; border-radius: 16px; border: 1px solid rgba(0,0,0,0.06); padding: 20px 24px; margin-bottom: 12px; }
    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .section-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .section-title { font-size: 15px; font-weight: 700; flex: 1; }
    .section-duration { font-size: 12px; color: #9e9289; background: #f5f3f0; padding: 3px 10px; border-radius: 100px; }

    .activity-list { display: flex; flex-direction: column; gap: 10px; }
    .activity-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; background: #faf9f7; border-radius: 10px; }
    .activity-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--brand-orange); margin-top: 7px; flex-shrink: 0; }
    .activity-content { flex: 1; }
    .activity-name { font-size: 14px; font-weight: 600; }
    .activity-detail { font-size: 12px; color: var(--brand-muted); margin-top: 2px; }

    .single-activity { font-size: 14px; font-weight: 500; color: var(--brand-muted); padding: 4px 0; }

    .equipment-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .equip-tag { padding: 3px 10px; border-radius: 6px; background: #f0eeeb; font-size: 12px; color: #6b625c; }

    /* PDF Link */
    .pdf-bar { background: white; border-radius: 12px; border: 1px solid rgba(0,0,0,0.06); padding: 14px 20px; display: flex; align-items: center; gap: 12px; margin-top: 16px; }
    .pdf-bar .icon { font-size: 20px; }
    .pdf-bar .info { flex: 1; }
    .pdf-bar .name { font-size: 13px; font-weight: 600; }
    .pdf-bar .desc { font-size: 12px; color: #9e9289; }
    .pdf-bar .btn { padding: 6px 16px; border-radius: 8px; background: var(--brand-orange); color: white; font-size: 12px; font-weight: 600; }

    /* Timeline */
    .timeline { display: flex; gap: 8px; margin: 16px 0; overflow-x: auto; padding-bottom: 4px; }
    .timeline-item { text-align: center; min-width: 80px; }
    .timeline-bar { height: 4px; border-radius: 2px; background: #e0ddd8; margin-bottom: 6px; }
    .timeline-bar.active { background: var(--brand-orange); }
    .timeline-label { font-size: 11px; color: #9e9289; }
    .timeline-time { font-size: 12px; font-weight: 600; }

    @media (max-width: 600px) {
      .lesson-header h1 { font-size: 18px; }
    }
  </style>
</head>
