<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI智能分析 - 追光小牛</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/internal-auth.js?v=7"></script>
    <style>
        :root {
            --brand-orange: #ff6b35;
            --brand-ink: #1f1a17;
            --brand-muted: #6b625c;
            --bg: #f5f3f0;
            --card: #ffffff;
            --success: #27ae60;
            --error: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--brand-ink);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .header {
            background: linear-gradient(135deg, var(--brand-orange) 0%, #ff8c5a 100%);
            color: white;
            padding: 24px 16px;
            border-radius: 0 0 24px 24px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .container {
            padding: 16px;
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--brand-orange);
            border-radius: 2px;
        }

        .upload-zone {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 16px;
        }

        .upload-zone:hover {
            border-color: var(--brand-orange);
            background: rgba(255,107,53,0.05);
        }

        .upload-zone.dragover {
            border-color: var(--brand-orange);
            background: rgba(255,107,53,0.1);
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 16px;
            color: var(--brand-muted);
        }

        .upload-text {
            font-size: 16px;
            color: var(--brand-muted);
            margin-bottom: 8px;
        }

        .upload-hint {
            font-size: 13px;
            color: #aaa;
        }

        .file-input {
            display: none;
        }

        .selected-file {
            background: #f8f8f8;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .file-icon {
            width: 44px;
            height: 44px;
            background: var(--brand-orange);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .file-size {
            font-size: 12px;
            color: var(--brand-muted);
        }

        .remove-file {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--brand-muted);
        }

        .remove-file:hover {
            background: var(--error);
            color: white;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--brand-orange);
            color: white;
        }

        .btn-primary:hover {
            background: #e85a28;
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: var(--brand-ink);
        }

        .progress-section {
            margin: 20px 0;
            display: none;
        }

        .progress-section.active {
            display: block;
        }

        .progress-status {
            text-align: center;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--brand-muted);
        }

        .progress-bar {
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--brand-orange);
            border-radius: 4px;
            transition: width 0.3s;
            width: 0%;
        }

        .result-section {
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .ai-analysis-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .ai-analysis-card .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .ai-avatar {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .ai-header-info h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .ai-header-info p {
            font-size: 12px;
            opacity: 0.8;
        }

        .ai-content {
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .ai-content h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .ai-content p {
            font-size: 14px;
            line-height: 1.7;
        }

        .suggestion-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .suggestion-item {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 14px;
        }

        .suggestion-label {
            font-size: 11px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 4px;
        }

        .suggestion-value {
            font-size: 15px;
            font-weight: 600;
        }

        .suggestion-value.high {
            color: #4ade80;
        }

        .suggestion-value.medium {
            color: #facc15;
        }

        .preview-section {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            max-height: 300px;
            overflow-y: auto;
        }

        .preview-section h4 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--brand-muted);
        }

        .preview-content {
            font-size: 13px;
            line-height: 1.8;
            white-space: pre-wrap;
            color: var(--brand-ink);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .action-buttons .btn {
            flex: 1;
        }

        .history-section {
            margin-top: 20px;
        }

        .history-item {
            background: #f8f8f8;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            background: #f0f0f0;
        }

        .history-icon {
            width: 40px;
            height: 40px;
            background: var(--brand-orange);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .history-info {
            flex: 1;
        }

        .history-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .history-meta {
            font-size: 12px;
            color: var(--brand-muted);
        }

        .history-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .history-status.imported {
            background: rgba(39,174,96,0.15);
            color: var(--success);
        }

        .history-status.pending {
            background: rgba(243,156,18,0.15);
            color: var(--warning);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--brand-muted);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .dimension-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .dimension-tag {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .dimension-tag.qa { background: rgba(52,152,219,0.15); color: #3498db; }
        .dimension-tag.knowledge { background: rgba(155,89,182,0.15); color: #9b59b6; }
        .dimension-tag.feedback { background: rgba(46,204,113,0.15); color: #27ae60; }
        .dimension-tag.deal { background: rgba(231,76,60,0.15); color: #e74c3c; }

        .module-tag {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255,107,53,0.15);
            color: var(--brand-orange);
        }

        @media (max-width: 768px) {
            .suggestion-grid {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI智能分析</h1>
        <p>上传文档，AI自动识别内容类型并分类入库</p>
        <a href="/admin-upload.html" style="float:right;margin-top:-40px;background:rgba(255,255,255,0.2);color:white;padding:8px 16px;border-radius:20px;text-decoration:none;font-size:13px;">返回上传管理</a>
    </div>

    <div class="container">
        <!-- 上传区域 -->
        <div class="card">
            <div class="section-title">上传文件</div>

            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">🤖</div>
                <div class="upload-text">点击或拖拽文件到此处</div>
                <div class="upload-hint">支持 PDF, Word, TXT, PNG, JPG 格式</div>
                <input type="file" class="file-input" id="fileInput" accept=".pdf,.docx,.doc,.txt,.png,.jpg,.jpeg">
            </div>

            <div class="selected-file" id="selectedFile" style="display: none;">
                <div class="file-icon">📄</div>
                <div class="file-info">
                    <div class="file-name" id="fileName">-</div>
                    <div class="file-size" id="fileSize">-</div>
                </div>
                <button class="remove-file" onclick="removeFile()">×</button>
            </div>

            <button class="btn btn-primary" id="analyzeBtn" onclick="startAnalyze()" disabled>
                开始AI分析
            </button>
        </div>

        <!-- 进度显示 -->
        <div class="card progress-section" id="progressSection">
            <div class="progress-status" id="progressStatus">正在连接AI服务...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- 分析结果 -->
        <div class="result-section" id="resultSection">
            <div class="ai-analysis-card">
                <div class="card-header">
                    <div class="ai-avatar">🧠</div>
                    <div class="ai-header-info">
                        <h3>AI分析结果</h3>
                        <p>基于内容智能识别与分类</p>
                    </div>
                </div>

                <div class="ai-content">
                    <h4>内容摘要</h4>
                    <p id="aiSummary">-</p>
                </div>

                <div class="suggestion-grid">
                    <div class="suggestion-item">
                        <div class="suggestion-label">建议分类</div>
                        <div class="suggestion-value" id="suggestCategory">-</div>
                    </div>
                    <div class="suggestion-item">
                        <div class="suggestion-label">置信度</div>
                        <div class="suggestion-value high" id="suggestConfidence">-</div>
                    </div>
                    <div class="suggestion-item">
                        <div class="suggestion-label">目标板块</div>
                        <div class="suggestion-value" id="suggestTarget">-</div>
                    </div>
                    <div class="suggestion-item">
                        <div class="suggestion-label">数据类型</div>
                        <div class="suggestion-value" id="suggestDataType">-</div>
                    </div>
                </div>

                <div id="dimensionTags" class="dimension-tags"></div>
            </div>

            <!-- 内容预览 -->
            <div class="card preview-section">
                <h4>解析内容预览</h4>
                <div class="preview-content" id="previewContent">-</div>
            </div>

            <!-- 操作按钮 -->
            <div class="action-buttons">
                <button class="btn btn-secondary" onclick="discardResult()">放弃</button>
                <button class="btn btn-primary" id="importBtn" onclick="confirmImport()">
                    确认导入到数据库
                </button>
            </div>
        </div>

        <!-- 分析历史 -->
        <div class="card history-section">
            <div class="section-title">分析历史</div>
            <div id="historyList">
                <div class="empty-state">
                    <div class="icon">📋</div>
                    <p>暂无分析记录</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let analysisResult = null;
        let history = [];

        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const progressSection = document.getElementById('progressSection');
        const resultSection = document.getElementById('resultSection');

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            selectedFile = file;
            document.getElementById('selectedFile').style.display = 'flex';
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatFileSize(file.size);
            analyzeBtn.disabled = false;
            resultSection.classList.remove('active');
        }

        function removeFile() {
            selectedFile = null;
            document.getElementById('selectedFile').style.display = 'none';
            analyzeBtn.disabled = true;
            fileInput.value = '';
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        async function startAnalyze() {
            if (!selectedFile) return;

            progressSection.classList.add('active');
            resultSection.classList.remove('active');
            analyzeBtn.disabled = true;

            const steps = [
                { status: '正在上传文件...', progress: 20 },
                { status: '正在解析文档内容...', progress: 40 },
                { status: '正在调用AI分析...', progress: 60 },
                { status: '正在识别内容类型...', progress: 80 },
                { status: '正在生成导入建议...', progress: 95 }
            ];

            let stepIndex = 0;

            const progressTimer = setInterval(() => {
                if (stepIndex < steps.length) {
                    document.getElementById('progressStatus').textContent = steps[stepIndex].status;
                    document.getElementById('progressFill').style.width = steps[stepIndex].progress + '%';
                    stepIndex++;
                }
            }, 800);

            try {
                const formData = new FormData();
                formData.append('file', selectedFile);

                const response = await fetch('/api/admin/ai-analyze.php', {
                    method: 'POST',
                    headers: window.authHeaders ? window.authHeaders() : {},
                    body: formData
                });

                clearInterval(progressTimer);
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressStatus').textContent = '分析完成！';

                const result = await response.json();

                setTimeout(() => {
                    progressSection.classList.remove('active');
                    analyzeBtn.disabled = false;

                    if (result.code === 0) {
                        displayResult(result.data);
                        addToHistory(selectedFile.name, result.data.category, 'pending');
                    } else {
                        alert('分析失败: ' + result.message);
                    }
                }, 500);

            } catch (err) {
                clearInterval(progressTimer);
                progressSection.classList.remove('active');
                analyzeBtn.disabled = false;
                alert('分析失败: ' + err.message);
            }
        }

        function displayResult(data) {
            analysisResult = data;
            resultSection.classList.add('active');

            document.getElementById('aiSummary').textContent = data.summary || '-';
            document.getElementById('suggestCategory').textContent = data.category || '-';
            document.getElementById('suggestConfidence').textContent = data.confidence ? (data.confidence * 100).toFixed(0) + '%' : '-';
            document.getElementById('suggestTarget').textContent = data.target || '-';
            document.getElementById('suggestDataType').textContent = data.data_type || '-';
            document.getElementById('previewContent').textContent = data.preview || '-';

            // 维度标签
            const tagsContainer = document.getElementById('dimensionTags');
            tagsContainer.innerHTML = '';

            if (data.dimensions && data.dimensions.length > 0) {
                data.dimensions.forEach(dim => {
                    const tag = document.createElement('span');
                    tag.className = `dimension-tag ${dim}`;
                    tag.textContent = getDimensionName(dim);
                    tagsContainer.appendChild(tag);
                });
            }

            if (data.module) {
                const moduleTag = document.createElement('span');
                moduleTag.className = 'module-tag';
                moduleTag.textContent = data.module;
                tagsContainer.appendChild(moduleTag);
            }
        }

        function getDimensionName(code) {
            const names = {
                'qa': '问答话术',
                'knowledge': '专业知识',
                'feedback': '课后点评',
                'deal': '独立谈单'
            };
            return names[code] || code;
        }

        async function confirmImport() {
            if (!analysisResult) return;

            const btn = document.getElementById('importBtn');
            btn.disabled = true;
            btn.textContent = '正在导入...';

            try {
                const response = await fetch('/api/admin/ai-analyze.php', {
                    method: 'POST',
                    headers: window.authHeaders ? window.authHeaders({
                        'Content-Type': 'application/json'
                    }) : {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'import',
                        data: analysisResult,
                        filename: selectedFile.name
                    })
                });

                const result = await response.json();

                if (result.code === 0) {
                    btn.textContent = '导入成功 ✓';
                    btn.style.background = 'var(--success)';
                    updateHistoryStatus(selectedFile.name, 'imported');

                    setTimeout(() => {
                        btn.disabled = false;
                        btn.textContent = '确认导入到数据库';
                        btn.style.background = '';
                        resultSection.classList.remove('active');
                        removeFile();
                    }, 2000);
                } else {
                    btn.disabled = false;
                    btn.textContent = '导入失败，请重试';
                    alert('导入失败: ' + result.message);
                }
            } catch (err) {
                btn.disabled = false;
                btn.textContent = '确认导入到数据库';
                alert('导入失败: ' + err.message);
            }
        }

        function discardResult() {
            resultSection.classList.remove('active');
            removeFile();
            analysisResult = null;
        }

        function addToHistory(filename, category, status) {
            history.unshift({
                filename,
                category,
                status,
                time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
            });
            renderHistory();
        }

        function updateHistoryStatus(filename, status) {
            const item = history.find(h => h.filename === filename);
            if (item) {
                item.status = status;
                renderHistory();
            }
        }

        function renderHistory() {
            const container = document.getElementById('historyList');

            if (history.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <p>暂无分析记录</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = history.map(item => `
                <div class="history-item">
                    <div class="history-icon">📄</div>
                    <div class="history-info">
                        <div class="history-name">${item.filename}</div>
                        <div class="history-meta">${item.category} · ${item.time}</div>
                    </div>
                    <span class="history-status ${item.status}">${item.status === 'imported' ? '已导入' : '待处理'}</span>
                </div>
            `).join('');
        }
        function canAccessAiTools(user) {
            const role = String(user?.role || '').toLowerCase();
            return !!user?.is_hq || ['admin', 'ceo', 'operation', 'finance'].includes(role);
        }

        if (window.requirePageAuth) {
            window.requirePageAuth({ onAuthed: async function(user) {
                if (!canAccessAiTools(user)) {
                    window.location.replace('/internal.html');
                }
            } });
        }
    </script>
</body>
</html>
