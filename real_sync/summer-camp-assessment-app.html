<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暑假班学员评估 - 追光小牛</title>
<link rel="stylesheet" href="/styles.css">
<script src="/internal-auth.js?v=7" defer></script>
<style>
:root {
  --summer-orange: #e74c3c;
  --summer-orange-light: #f9ebea;
  --green: #27ae60;
  --purple: #9b59b6;
  --blue: #3498db;
  --bg: #f8f9ff;
  --card-bg: #ffffff;
  --text: #2d3436;
  --text-light: #636e72;
  --shadow: 0 4px 20px rgba(231,76,60,0.1);
  --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.app-header {
  background: linear-gradient(135deg, var(--summer-orange) 0%, #c0392b 100%);
  padding: 12px 20px;
  color: #fff;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

.app-header h1 {
  font-size: 16px;
  font-weight: 700;
}

.progress-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: var(--card-bg);
  border-bottom: 1px solid rgba(0,0,0,0.06);
}

.progress-step {
  display: flex;
  align-items: center;
}

.progress-dot {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: #e0e0e0;
  color: #999;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  transition: all 0.3s;
}

.progress-dot.active {
  background: var(--summer-orange);
  color: #fff;
  box-shadow: 0 2px 10px rgba(231,76,60,0.3);
}

.progress-dot.done {
  background: var(--green);
  color: #fff;
}

.progress-line {
  width: 50px; height: 3px;
  background: #e0e0e0;
  transition: all 0.3s;
}

.progress-line.done {
  background: var(--green);
}

.step-content {
  max-width: 800px;
  margin: 20px auto;
  padding: 0 20px;
}

.step-panel {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
}

.step-panel h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--text);
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-light);
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  height: 44px;
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 10px;
  padding: 0 14px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus {
  border-color: var(--summer-orange);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.gender-options {
  display: flex;
  gap: 12px;
}

.gender-option {
  padding: 12px 20px;
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 14px;
}

.gender-option.selected {
  border-color: var(--summer-orange);
  background: var(--summer-orange-light);
  font-weight: 600;
}

.btn {
  border: none;
  border-radius: 10px;
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--summer-orange);
  color: #fff;
}

.btn-primary:hover {
  background: #c0392b;
}

.btn-secondary {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.1);
  color: var(--text);
}

.report-shell {
  background: #fff;
  border: 1px solid #f0d7d2;
  border-radius: 14px;
  overflow: hidden;
}

.report-cover {
  background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
  color: #fff;
  padding: 22px 24px;
}

.report-cover h3 {
  font-size: 22px;
  margin-bottom: 8px;
}

.report-cover p {
  font-size: 13px;
  opacity: 0.9;
}

.report-body {
  padding: 22px 24px 26px;
}

.report-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 18px;
}

.report-item {
  background: #fff7f5;
  border: 1px solid #f5d6cf;
  border-radius: 10px;
  padding: 10px;
}

.report-item .label {
  color: var(--text-light);
  font-size: 12px;
  margin-bottom: 4px;
}

.report-item .value {
  font-size: 15px;
  font-weight: 700;
}

.report-section {
  margin-top: 18px;
  break-inside: avoid;
  page-break-inside: avoid;
}

.report-section h4 {
  border-left: 4px solid var(--summer-orange);
  color: #9f2d22;
  font-size: 16px;
  line-height: 1.3;
  margin-bottom: 10px;
  padding-left: 10px;
}

.report-section p,
.report-section li {
  color: #34495e;
  font-size: 14px;
  line-height: 1.65;
}

.report-section ul {
  padding-left: 18px;
}

.report-callout {
  background: #fff7f5;
  border: 1px solid #f5d6cf;
  border-radius: 12px;
  color: #9f2d22;
  font-size: 15px;
  font-weight: 700;
  line-height: 1.6;
  padding: 14px 16px;
}

.score-table {
  border-collapse: collapse;
  width: 100%;
}

.score-table th,
.score-table td {
  border: 1px solid #f0d7d2;
  font-size: 13px;
  padding: 9px 8px;
  text-align: left;
}

.score-table th {
  background: #fff0ed;
  color: #9f2d22;
}

.phase-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.phase-card {
  border: 1px solid #f0d7d2;
  border-radius: 12px;
  padding: 12px;
}

.phase-card strong {
  color: #9f2d22;
  display: block;
  margin-bottom: 8px;
}

.phase-card p {
  margin: 0 0 8px;
}

.blank-line {
  border-bottom: 1px solid #b8b8b8;
  display: inline-block;
  min-width: 180px;
}

.phase-fill {
  display: flex;
  gap: 6px;
  align-items: flex-end;
  margin-top: 8px;
}

.phase-fill .blank-line {
  flex: 1;
  min-width: 0;
}

.report-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 18px;
}

.report-shell {
  width: 210mm;
  margin: 0 auto;
  background: transparent;
  border: 0;
  border-radius: 0;
  overflow: visible;
}

.report-page {
  width: 210mm;
  height: 297mm;
  margin: 0 auto;
  background: #fff;
  border: 1px solid #f0d7d2;
  border-radius: 0;
  overflow: hidden;
  page-break-after: always;
}

.report-page:last-child {
  page-break-after: auto;
}

.report-cover {
  height: 24mm;
  padding: 7mm 9mm 0;
}

.report-cover h3 {
  font-size: 20px;
  line-height: 1.2;
  margin-bottom: 4px;
}

.report-cover p {
  font-size: 12px;
}

.report-body {
  height: 273mm;
  padding: 7mm 9mm 8mm;
  display: grid;
  grid-template-rows: 17mm 20mm 44mm 32mm 74mm 42mm;
  gap: 3mm;
}

.report-body.page-two {
  height: 297mm;
  padding: 10mm 9mm 9mm;
  display: grid;
  grid-template-rows: 80mm 60mm 40mm 35mm 48mm;
  gap: 4mm;
}

.report-grid {
  margin-bottom: 0;
}

.report-item {
  padding: 7px 8px;
}

.report-item .label {
  font-size: 11px;
  margin-bottom: 2px;
}

.report-item .value {
  font-size: 13px;
}

.report-section {
  margin-top: 0;
  min-height: 0;
  overflow: hidden;
}

.report-section h4 {
  font-size: 13px;
  line-height: 1.2;
  margin-bottom: 5px;
  padding-left: 7px;
  border-left-width: 3px;
}

.report-section p,
.report-section li {
  font-size: 11.5px;
  line-height: 1.35;
}

.report-section ul {
  margin: 0;
  padding-left: 16px;
}

.report-callout {
  font-size: 13px;
  line-height: 1.35;
  padding: 8px 10px;
}

.score-table th,
.score-table td {
  font-size: 10.8px;
  padding: 4px 6px;
}

.phase-grid {
  gap: 5px;
}

.phase-card {
  padding: 7px 9px;
}

.phase-card strong {
  display: inline-block;
  min-width: 96px;
  margin: 0;
}

.phase-card p {
  display: inline;
  margin: 0 8px 0 0;
}

.phase-fill {
  display: inline-flex;
  width: 58%;
  margin: 0;
}

.hidden {
  display: none;
}

@media (max-width: 768px) {
  .form-row {
    grid-template-columns: 1fr;
  }
  .report-grid,
  .phase-grid {
    grid-template-columns: 1fr;
  }
  .step-content {
    padding: 0 12px;
  }
  .report-shell {
    width: 100%;
  }
  .report-page {
    width: 100%;
    height: auto;
    min-height: 297mm;
  }
}

@media print {
  @page { size: A4; margin: 0; }
  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  .app-header, .progress-bar, #step1, #step2, #step3, .report-actions { display: none !important; }
  html, body { width: 210mm; margin: 0; background: #fff; overflow: visible; }
  .step-content { width: 210mm; max-width: 210mm; margin: 0; padding: 0; }
  .step-panel { box-shadow: none; border-radius: 0; padding: 0; }
  #step4 { display: block !important; }
  #step4 > h2 { display: none; }
  .report-shell { width: 210mm; border: none; box-shadow: none; }
  .report-page { width: 210mm; height: 297mm; border: none; box-shadow: none; }
  .report-section { break-inside: avoid; page-break-inside: avoid; }
}
</style>
</head>
<body>
<header class="app-header">
<h1>暑假班学员评估</h1>
</header>

<div class="progress-bar" id="progressBar">
<div class="progress-step">
<div class="progress-dot active" id="step1Dot">1</div>
<div class="progress-line" id="line1"></div>
</div>
<div class="progress-step">
<div class="progress-dot" id="step2Dot">2</div>
<div class="progress-line" id="line2"></div>
</div>
<div class="progress-step">
<div class="progress-dot" id="step3Dot">3</div>
<div class="progress-line" id="line3"></div>
</div>
<div class="progress-step">
<div class="progress-dot" id="step4Dot">4</div>
</div>
</div>

<div class="step-content">
<!-- 步骤1：基本信息 -->
<div class="step-panel" id="step1">
<h2>学员基本信息</h2>
<div class="form-group">
<label class="form-label">姓名</label>
<input class="form-input" id="studentName" placeholder="请输入学员姓名">
</div>
<div class="form-row">
<div class="form-group">
<label class="form-label">性别</label>
<div class="gender-options">
<div class="gender-option" data-gender="男">男</div>
<div class="gender-option" data-gender="女">女</div>
</div>
</div>
<div class="form-group">
<label class="form-label">年级/年龄</label>
<input class="form-input" id="studentGrade" placeholder="如：初二 或 10岁">
</div>
</div>
<div class="form-row">
<div class="form-group">
<label class="form-label">身高(cm)</label>
<input class="form-input" id="studentHeight" type="number" placeholder="165">
</div>
<div class="form-group">
<label class="form-label">体重(kg)</label>
<input class="form-input" id="studentWeight" type="number" placeholder="55">
</div>
</div>
<div class="form-group">
<label class="form-label">联系电话</label>
<input class="form-input" id="phone" placeholder="家长联系电话">
</div>
<div class="form-group">
<label class="form-label">评估日期</label>
<input class="form-input" id="assessmentDate" type="date">
</div>
<button class="btn btn-primary" onclick="goStep2()">下一步：录入测试数据</button>
</div>

<!-- 步骤2：测试数据 -->
<div class="step-panel hidden" id="step2">
<h2>测试数据录入</h2>
<div id="testDataForm"></div>
<button class="btn btn-secondary" onclick="goStep1()">返回</button>
<button class="btn btn-primary" onclick="goStep3()">下一步：教练诊断</button>
</div>

<!-- 步骤3：教练诊断 -->
<div class="step-panel hidden" id="step3">
<h2>教练诊断</h2>
<div id="diagnosisForm"></div>
<button class="btn btn-secondary" onclick="goStep2()">返回</button>
<button class="btn btn-primary" id="generateReportBtn" onclick="goStep4()">生成评估报告</button>
</div>

<!-- 步骤4：评估报告 -->
<div class="step-panel hidden" id="step4">
<h2>评估报告</h2>
<div id="reportContent"></div>
<div class="report-actions">
<button class="btn btn-secondary" onclick="goStep3()">返回修改</button>
<button class="btn btn-secondary" onclick="printReport()">导出/打印</button>
<button class="btn btn-secondary" onclick="exportReportJpg()">导出高清JPG</button>
<button class="btn btn-primary" onclick="saveReport()">保存报告</button>
</div>
</div>
</div>

<script src="/js/app-auth.js"></script>
<script>
const state = {
  campType: '',
  studentName: '',
  gender: '',
  grade: '',
  age: 0,
  height: 0,
  weight: 0,
  phone: '',
  assessmentDate: '',
  testData: {},
  diagnosis: {},
  isGenerating: false,
  currentStep: 1
};

const campConfigs = {
  zhongkao: {
    name: '中考体训达标营',
    standardTitle: '中考体育标准说明',
    impactTitle: '阶段影响判断',
    testItems: [
      { code: 'jump_rope', label: '跳绳（1分钟）', unit: '个' },
      { code: 'run_type', label: '跑步项目', type: 'select', options: ['男1000米', '女800米'] },
      { code: 'run_minutes', label: '跑步成绩（分钟）', unit: '分', placeholder: '如：3' },
      { code: 'run_seconds', label: '跑步成绩（秒数）', unit: '秒', placeholder: '如：45' },
      { code: 'long_jump', label: '立定跳远', unit: 'cm' }
    ]
  },
  tineng: {
    name: '体能达标营',
    standardTitle: '体能达标标准说明',
    impactTitle: '体能发展影响判断',
    testItems: [
      { code: 'vital_capacity', label: '肺活量', unit: 'ml' },
      { code: 'sprint_50m', label: '50米跑', unit: '秒' },
      { code: 'jump_rope', label: '跳绳（1分钟）', unit: '个' },
      { code: 'sit_reach', label: '坐位体前屈', unit: 'cm' }
    ]
  },
  tiaosheng: {
    name: '跳绳达标营',
    standardTitle: '跳绳达标标准说明',
    impactTitle: '跳绳专项影响判断',
    testItems: [
      { code: 'jump_rope_1min', label: '1分钟跳绳', unit: '个' },
      { code: 'jump_rope_30s', label: '30秒跳绳', unit: '个' },
      { code: 'consecutive', label: '连续不掉绳', unit: '个' }
    ]
  },
  lanqiu: {
    name: '篮球体能营',
    standardTitle: '篮球体能标准说明',
    impactTitle: '篮球专项影响判断',
    testItems: [
      { code: 'dribble', label: '原地运球（30秒）', unit: '次' },
      { code: 'shoot', label: '定点投篮（10次）', unit: '个' },
      { code: 'layup', label: '三步上篮（10次）', unit: '个' }
    ]
  },
  tuobei: {
    name: '驼背体态调整营',
    standardTitle: '体态调整标准说明',
    impactTitle: '体态健康影响判断',
    testItems: [
      { code: 'sit_reach', label: '坐位体前屈', unit: 'cm' },
      { code: 'plank', label: '平板支撑', unit: '秒' },
      { code: 'pushup', label: '俯卧撑', unit: '个' }
    ]
  }
};

function init() {
  const urlParams = new URLSearchParams(window.location.search);
  state.campType = urlParams.get('camp') || 'zhongkao';
  
  if (!campConfigs[state.campType]) {
    state.campType = 'zhongkao';
  }
  
  document.querySelector('.app-header h1').textContent = campConfigs[state.campType].name + ' · 学员评估';
  document.getElementById('assessmentDate').value = new Date().toISOString().slice(0, 10);
}

function updateProgress(step) {
  state.currentStep = step;
  for (let i = 1; i <= 4; i++) {
    const dot = document.getElementById('step' + i + 'Dot');
    const line = document.getElementById('line' + (i - 1));
    
    if (i < step) {
      dot.classList.add('done');
      dot.classList.remove('active');
      if (line) line.classList.add('done');
    } else if (i === step) {
      dot.classList.add('active');
      dot.classList.remove('done');
    } else {
      dot.classList.remove('active', 'done');
      if (line) line.classList.remove('done');
    }
  }
}

function goStep1() {
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step3').classList.add('hidden');
  document.getElementById('step4').classList.add('hidden');
  updateProgress(1);
}

function goStep2() {
  state.studentName = document.getElementById('studentName').value.trim();
  state.grade = document.getElementById('studentGrade').value.trim();
  state.height = parseFloat(document.getElementById('studentHeight').value) || 0;
  state.weight = parseFloat(document.getElementById('studentWeight').value) || 0;
  state.phone = document.getElementById('phone').value.trim();
  state.assessmentDate = document.getElementById('assessmentDate').value;
  
  if (!state.studentName) {
    alert('请填写学员姓名');
    return;
  }
  if (!state.gender) {
    alert('请选择性别');
    return;
  }
  
  renderTestDataForm();
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
  document.getElementById('step3').classList.add('hidden');
  document.getElementById('step4').classList.add('hidden');
  updateProgress(2);
}

function goStep3() {
  // 收集测试数据
  const testItems = campConfigs[state.campType].testItems;
  testItems.forEach(item => {
    const input = document.getElementById('test_' + item.code);
    if (input) {
      state.testData[item.code] = item.type === 'select' ? input.value : (parseFloat(input.value) || 0);
    }
  });
  
  renderDiagnosisForm();
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step3').classList.remove('hidden');
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step4').classList.add('hidden');
  updateProgress(3);
}

function goStep4() {
  syncStudentInfoFromForm();
  generateReport();
  document.getElementById('step3').classList.add('hidden');
  document.getElementById('step4').classList.remove('hidden');
  updateProgress(4);
}

function renderTestDataForm() {
  const testItems = campConfigs[state.campType].testItems;
  let html = '';
  
  testItems.forEach(item => {
    html += '<div class="form-group">';
    html += '<label class="form-label">' + item.label + '</label>';
    
    if (item.type === 'select') {
      html += '<select class="form-input" id="test_' + item.code + '">';
      item.options.forEach(opt => {
        html += '<option value="' + opt + '">' + opt + '</option>';
      });
      html += '</select>';
    } else {
      const placeholder = item.placeholder || ('请输入' + (item.unit || ''));
      html += '<input class="form-input" id="test_' + item.code + '" type="number" placeholder="' + placeholder + '">';
    }
    
    html += '</div>';
  });
  
  document.getElementById('testDataForm').innerHTML = html;
}

function renderDiagnosisForm() {
  const campType = state.campType;
  let html = '';
  
  if (campType === 'zhongkao') {
    html = '<div class="form-group"><label class="form-label">跳绳问题</label><select class="form-input" id="diag_jump_rope"><option value="">无明显问题</option><option value="手腕发力不对">手腕发力不对（用手臂甩）</option><option value="节奏不稳">节奏不稳（前快后慢）</option><option value="跳太高">跳太高（离地>5cm）</option></select></div>';
    html += '<div class="form-group"><label class="form-label">跑步问题</label><select class="form-input" id="diag_run"><option value="">无明显问题</option><option value="呼吸没有节奏">呼吸没有节奏</option><option value="前快后慢">前快后慢（配速差）</option><option value="步频太慢">步频太慢</option></select></div>';
    html += '<div class="form-group"><label class="form-label">立定跳远问题</label><select class="form-input" id="diag_long_jump"><option value="">无明显问题</option><option value="摆臂不充分">摆臂不充分</option><option value="起跳角度不对">起跳角度不对</option><option value="收腿不够">收腿不够</option></select></div>';
  } else if (campType === 'tiaosheng') {

async function generateReport() {
  if (state.isGenerating) return;
  state.isGenerating = true;
  const generateBtn = document.getElementById('generateReportBtn');
  if (generateBtn) {
    generateBtn.disabled = true;
    generateBtn.textContent = '正在生成...';
  }
  syncStudentInfoFromForm();
  document.getElementById('reportContent').innerHTML = '<p style="text-align: center; padding: 40px;">正在生成评估报告...</p><p style="text-align: center; color: #999; font-size: 12px;">预计需要20-30秒，请耐心等待</p>';
  
  const campType = state.campType;
  const studentInfo = {
    name: state.studentName,
    grade: state.grade,
    gender: state.gender,
    height: state.height,
    weight: state.weight,
    age: state.age || state.grade
  };
  
  const testData = {};
  for (const key in state.testData) {
    testData[key] = state.testData[key];
  }
  
  const coachDiagnosis = {
    main_issue: document.getElementById('diag_core_issue')?.value || '',
    jump_rope_issue: document.getElementById('diag_jump_rope')?.value || '',
    run_issue: document.getElementById('diag_run')?.value || '',
    long_jump_issue: document.getElementById('diag_long_jump')?.value || '',
    vital_issue: document.getElementById('diag_vital')?.value || '',
    speed_issue: document.getElementById('diag_speed')?.value || '',
    flex_issue: document.getElementById('diag_flex')?.value || '',
    dribble_issue: document.getElementById('diag_dribble')?.value || '',
    shoot_issue: document.getElementById('diag_shoot')?.value || '',
    layup_issue: document.getElementById('diag_layup')?.value || '',
    posture_issue: document.getElementById('diag_posture')?.value || '',
    mobility_issue: document.getElementById('diag_mobility')?.value || '',
    strength_issue: document.getElementById('diag_strength')?.value || '',
    general_issue: document.getElementById('diag_main')?.value || ''
  };
  state.diagnosis = coachDiagnosis;
  
  const token = window.AppAuth ? window.AppAuth.getToken() : '';
  if (!token) {
    document.getElementById('reportContent').innerHTML = '<p style="color: #e74c3c; text-align: center; padding: 40px;">请先登录后再生成报告</p><a href="/internal.html" class="btn btn-primary" style="display: block; text-align: center; margin: 20px auto;">返回首页登录</a>';
    return;
  }
  
  try {
    const response = await fetch('/api/ai-services.php', {
      method: 'POST',
      headers: window.AppAuth ? window.AppAuth.authHeaders({'Content-Type': 'application/json'}) : {'Content-Type': 'application/json'},
      body: JSON.stringify({
        action: 'summer_camp_report',
        camp_type: campType,
        student_info: studentInfo,
        test_data: testData,
        coach_diagnosis: coachDiagnosis
      })
    });
    
    if (!response.ok) {
      const errorText = await response.text();
      throw new Error('HTTP ' + response.status + ': ' + errorText);
    }
    
    const data = await response.json();
    const reportData = parseReportData(data.content || '');
    const reportHtml = renderReport(reportData);
    state.reportContent = reportHtml;
    document.getElementById('reportContent').innerHTML = reportHtml;
    
  } catch (error) {
    document.getElementById('reportContent').innerHTML = '<p style="color: #e74c3c; text-align: center; padding: 40px;">报告生成失败：' + error.message + '</p><button class="btn btn-secondary" onclick="generateReport()">重新生成</button>';
  } finally {
    state.isGenerating = false;
    if (generateBtn) {
      generateBtn.disabled = false;
      generateBtn.textContent = '生成评估报告';
    }
  }
}

function syncStudentInfoFromForm() {
  state.studentName = document.getElementById('studentName')?.value.trim() || state.studentName;
  state.grade = document.getElementById('studentGrade')?.value.trim() || state.grade;
  state.height = parseFloat(document.getElementById('studentHeight')?.value) || state.height || 0;
  state.weight = parseFloat(document.getElementById('studentWeight')?.value) || state.weight || 0;
  state.phone = document.getElementById('phone')?.value.trim() || state.phone;
  state.assessmentDate = document.getElementById('assessmentDate')?.value || state.assessmentDate;
}

function parseReportData(content) {
  let text = String(content || '').trim();
  text = text.replace(/^```json\s*/i, '').replace(/```$/g, '').trim();
  const jsonStart = text.indexOf('{');
  const jsonEnd = text.lastIndexOf('}');
  if (jsonStart >= 0 && jsonEnd > jsonStart) {
    text = text.substring(jsonStart, jsonEnd + 1);
  }
  try {
    return JSON.parse(text);
  } catch (error) {
    return {
      summary: '本次评估已完成，建议围绕核心问题进行连续训练和阶段复测。',
      standard: getDefaultStandardText(),
      analysis: [content || '报告内容解析异常，请重新生成。'],
      training_focus: ['建立基础动作模式并稳定节奏', '围绕薄弱项目进行针对性纠偏', '通过阶段复测确认训练效果'],
      score_impact: getDefaultScoreImpact(),
      age_advice: getDefaultAgeAdvice(),
      parent_message: '建议先完成本期5次训练，观察动作质量、成绩稳定性和训练参与度的变化。'
    };
  }
}

async function exportReportJpg() {
  const pages = Array.from(document.querySelectorAll('#reportContent .report-page'));

    return;
  }
  try {
    for (let index = 0; index < pages.length; index++) {

    alert('导出JPG失败：' + error.message);

function buildReportFilename(pageNumber) {
  const name = (state.studentName || '评估报告').replace(/[\\/:*?"<>|\s]+/g, '-');
  const camp = (campConfigs[state.campType]?.name || '暑假班').replace(/[\\/:*?"<>|\s]+/g, '-');
  return name + '-' + camp + '-第' + pageNumber + '页.jpg';
}

function exportElementToJpg(element, filename, scale) {
  return new Promise((resolve, reject) => {
    const rect = element.getBoundingClientRect();
    const width = Math.ceil(rect.width);
    const height = Math.ceil(rect.height);
    if (!width || !height) {
      reject(new Error('报告尺寸异常'));
      return;
    }
    const cloned = element.cloneNode(true);
    cloned.setAttribute('xmlns', 'http://www.w3.org/1999/xhtml');
    cloned.style.width = width + 'px';
    cloned.style.height = height + 'px';
    cloned.style.margin = '0';
    const style = document.createElement('style');
    style.textContent = getJpgExportCss();
    cloned.insertBefore(style, cloned.firstChild);
    const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + width + '" height="' + height + '"><foreignObject width="100%" height="100%">' + new XMLSerializer().serializeToString(cloned) + '</foreignObject></svg>';
    const image = new Image();
    image.onload = function() {
      const canvas = document.createElement('canvas');
      canvas.width = width * scale;
      canvas.height = height * scale;
      const context = canvas.getContext('2d');
      context.fillStyle = '#ffffff';
      context.fillRect(0, 0, canvas.width, canvas.height);
      context.setTransform(scale, 0, 0, scale, 0, 0);
      context.drawImage(image, 0, 0);
      URL.revokeObjectURL(image.src);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/jpeg', 0.96);
      link.click();
      resolve();
    };
    image.onerror = function() {
      reject(new Error('浏览器渲染图片失败'));
    };
    image.src = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml;charset=utf-8' }));
  });
}

function renderTestTable() {
  const items = campConfigs[state.campType].testItems;
  let html = '<table class="score-table"><thead><tr><th>项目</th><th>成绩</th><th>教练观察</th></tr></thead><tbody>';
  html += '<tr><td>身高</td><td>' + escapeHtml(state.height ? state.height + 'cm' : '未填写') + '</td><td>基础发育数据</td></tr>';
  html += '<tr><td>体重</td><td>' + escapeHtml(state.weight ? state.weight + 'kg' : '未填写') + '</td><td>基础发育数据</td></tr>';
  items.forEach(item => {
    const value = state.testData[item.code];
    if (item.code === 'run_minutes' || item.code === 'run_seconds') return;
    let displayValue = value || '未填写';
    if (item.code === 'run_type') {
      const minutes = state.testData.run_minutes || 0;
      const seconds = state.testData.run_seconds || 0;
      displayValue = (value || '跑步') + ' · ' + minutes + '分' + seconds + '秒';
    } else if (item.unit && displayValue !== '未填写') {
      displayValue += item.unit;
    }
    html += '<tr><td>' + escapeHtml(item.label) + '</td><td>' + escapeHtml(displayValue) + '</td><td>' + escapeHtml(getDiagnosisText(item.code)) + '</td></tr>';
  });
  html += '</tbody></table>';
  return html;
}

function normalizeList(value, fallback, max) {
  const list = Array.isArray(value) ? value : (typeof value === 'string' ? value.split(/\n|；|;/) : []);
  const cleaned = list.map(item => String(item || '').replace(/^[-\d.、\s]+/, '').trim()).filter(Boolean);
  return (cleaned.length ? cleaned : fallback).slice(0, max);
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>'"]/g, function(char) {
    return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[char];
  });
}

async function saveReport() {
  if (!state.reportContent) {
    alert('请先生成报告');
    return;
  }
  
  const campType = state.campType;
  
  try {
    const saveResponse = await fetch('/api/summer-camp/assessment-api.php', {
      method: 'POST',
      headers: window.AppAuth ? window.AppAuth.authHeaders({'Content-Type': 'application/json'}) : {'Content-Type': 'application/json'},
      body: JSON.stringify({
        action: 'save_record',
        camp_type: campType,
        student_name: state.studentName,
        student_gender: state.gender,
        student_grade: state.grade,
        student_age: state.age,
        student_height: state.height,
        student_weight: state.weight,
        phone: state.phone,
        assessment_date: state.assessmentDate,
        test_data: Object.keys(state.testData).map(key => ({
          metric_code: key,
          metric_value: state.testData[key]
        })),
        coach_diagnosis: state.diagnosis || {}
      })
    });
    
    if (!saveResponse.ok) {
      throw new Error('保存记录失败');
    }
    
    const saveData = await saveResponse.json();
    const assessmentId = saveData.data?.assessment_id;
    
    if (!assessmentId) {
      throw new Error('无法获取记录ID');
    }
    
    const reportResponse = await fetch('/api/summer-camp/assessment-api.php', {
      method: 'POST',
      headers: window.AppAuth ? window.AppAuth.authHeaders({'Content-Type': 'application/json'}) : {'Content-Type': 'application/json'},
      body: JSON.stringify({
        action: 'save_report',
        assessment_id: assessmentId,
        ai_content: state.reportContent,
        coach_remarks: '',
        coach_name: '',
        coach_phone: '',
        coach_store: '',
        report_date: state.assessmentDate
      })
    });
    
    if (!reportResponse.ok) {
      throw new Error('保存报告失败');
    }
    
    alert('报告保存成功！记录ID：' + assessmentId);
    
  } catch (error) {
    alert('保存失败：' + error.message);
  }
}
