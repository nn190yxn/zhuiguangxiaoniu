<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作量中心 - 追光小牛管理后台</title>
<script src="/internal-auth.js?v=5"></script>
<script src="/js/app-auth.js"></script>
<script src="/js/api-client.js"></script>
<style>
:root{--orange:#ff6b35;--ink:#1f1a17;--muted:#6b625c;--bg:#f6f4f1;--card:#fff;--line:rgba(0,0,0,.08);--danger:#b42318;--ok:#087443}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink)}.top{background:#fff;border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}.brand{font-size:18px;font-weight:850}.nav{display:flex;gap:10px}.nav a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:700}.nav a.active{color:var(--orange)}.main{max-width:1240px;margin:0 auto;padding:22px}.hero{background:linear-gradient(135deg,#1f1a17,#40332c);color:#fff;border-radius:20px;padding:24px;margin-bottom:18px}.hero h1{margin:0 0 8px;font-size:26px}.hero p{margin:0;color:rgba(255,255,255,.75)}.filters,.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 4px 14px rgba(0,0,0,.04)}.filters{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:end}.field label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin-bottom:6px}.field input,.field select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px}.btn{border:none;border-radius:10px;padding:11px 14px;background:var(--orange);color:#fff;font-weight:850;cursor:pointer}.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px}.stat .num{font-size:28px;font-weight:900;color:var(--orange)}.stat .num.danger{color:var(--danger)}.stat .label{font-size:12px;color:var(--muted);margin-top:4px}.section-title{font-size:16px;font-weight:850;margin-bottom:12px}.split{display:grid;grid-template-columns:1fr 1fr;gap:14px}.mini-list{display:grid;gap:8px}.mini-item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fbf8f4}.mini-item strong{display:block;font-size:14px}.mini-item span{font-size:12px;color:var(--muted)}.subtle{font-size:12px;color:var(--muted);font-weight:700}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:850;background:#f2eee9;color:var(--muted)}.badge.ok{background:#eaf7ef;color:var(--ok)}.badge.warn{background:#fff4e8;color:#a15c00}.badge.danger{background:#ffeceb;color:var(--danger)}.metric-text{max-width:420px;white-space:normal;line-height:1.5}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px;border-bottom:1px solid rgba(0,0,0,.06);text-align:left;vertical-align:top}th{color:var(--muted);font-size:12px}.click-row{cursor:pointer}.click-row:hover{background:#fff4ec}.link-cell{color:var(--orange);font-weight:850}.status{font-size:13px;color:var(--muted);margin-top:8px}.status.err{color:var(--danger)}.status.ok{color:var(--ok)}@media(max-width:900px){.filters{grid-template-columns:1fr 1fr}.summary{grid-template-columns:1fr 1fr}.split{grid-template-columns:1fr}.nav{display:none}.metric-text{max-width:none}}
</style>
</head>
<body>
<header class="top"><div class="brand">工作量中心</div><nav class="nav"><a href="/admin/dashboard.html">后台首页</a><a class="active" href="/admin/workload.html">工作量</a><a href="/internal.html">工作台</a></nav></header>
<main class="main">
  <section class="hero"><h1>常态化工作量中心</h1><p>查看销售/教练日报提交情况、门店汇总和总部过程指标。</p></section>
  <section class="filters">
    <div class="field"><label>开始日期</label><input type="date" id="dateFrom"></div>
    <div class="field"><label>结束日期</label><input type="date" id="dateTo"></div>
    <div class="field"><label>门店 ID</label><input type="number" id="storeId" placeholder="店长默认本店"></div>
    <div class="field"><label>查看模式</label><select id="mode"><option value="store">门店日报</option><option value="hq">总部汇总</option></select></div>
    <button class="btn" onclick="loadData()">刷新数据</button>
    <button class="btn" style="background:#1f1a17" onclick="exportCsv()">导出 CSV</button>
    <button class="btn" style="background:#087443" onclick="copyReminder()">复制提醒</button>
  </section>
  <section class="summary">
    <div class="stat"><div class="num" id="statReports">0</div><div class="label">日报数</div></div>
    <div class="stat"><div class="num" id="statSubmitted">0</div><div class="label">已提交</div></div>
    <div class="stat"><div class="num" id="statRoles">0</div><div class="label">岗位组</div></div>
    <div class="stat"><div class="num" id="statMetrics">0</div><div class="label">指标汇总项</div></div>
    <div class="stat"><div class="num" id="statRate">0%</div><div class="label">提交率</div></div>
  </section>
  <section class="split" id="exceptionCards" style="display:none;"></section>
  <section class="card" id="coachDailyCard"><div class="section-title">教练完成量 <span class="subtle" id="coachDailyDate"></span></div><div id="coachDailyWrap"></div></section>
  <section class="card"><div class="section-title">日报明细 / 汇总</div><div id="tableWrap"></div><div class="status" id="statusText">准备加载数据...</div></section>
</main>
<script>
var context=null,currentMode='store',currentData=null;
function today(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function daysAgo(n){var d=new Date();d.setDate(d.getDate()-n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function setStatus(t,c){var el=document.getElementById('statusText');el.textContent=t;el.className='status '+(c||'')}
async function init(){document.getElementById('dateFrom').value=daysAgo(7);document.getElementById('dateTo').value=today();try{var res=await ApiClient.get('/api/common/context-info.php');context=res.data.context||{};if(context.store_id)document.getElementById('storeId').value=context.store_id;if(context.is_hq||context.is_admin){document.getElementById('mode').value='hq'}await loadData()}catch(err){setStatus(err.message||'读取身份失败','err')}}
async function loadData(){var mode=document.getElementById('mode').value;var from=document.getElementById('dateFrom').value;var to=document.getElementById('dateTo').value;var storeId=document.getElementById('storeId').value;setStatus('正在加载...');try{currentMode=mode;if(mode==='hq'){var hq=await ApiClient.get('/api/workload/hq-summary.php?date_from='+encodeURIComponent(from)+'&date_to='+encodeURIComponent(to));currentData=hq.data;renderHq(hq.data)}else{var store=await ApiClient.get('/api/workload/store-summary.php?date='+encodeURIComponent(to)+'&store_id='+encodeURIComponent(storeId));currentData=store.data;renderStore(store.data)}await loadCoachDaily(to);setStatus('数据已刷新','ok')}catch(err){setStatus(err.message||'加载失败','err')}}
function renderStore(data){var reports=data.reports||[];var roles=data.role_summary||[];var metricCount=roles.reduce(function(n,r){return n+(r.metrics||[]).length},0);setStats(data.expected_count||reports.length,data.submitted_count||0,roles.length,metricCount,(data.submission_rate||0)+'%');renderExceptions(data);document.getElementById('tableWrap').innerHTML='<table><thead><tr><th>员工</th><th>门店</th><th>岗位</th><th>状态</th><th>更新时间</th><th>指标数</th></tr></thead><tbody>'+reports.map(function(r){return'<tr><td>'+esc(r.staff_name||r.staff_id)+'</td><td>'+esc(r.store_name||r.store_id)+'</td><td>'+esc(r.role_code)+'</td><td>'+esc(r.submit_status)+'</td><td>'+esc(r.updated_at||'')+'</td><td>'+((r.values||[]).length)+'</td></tr>'}).join('')+'</tbody></table>'}
function renderHq(data){var rows=data.summary_rows||[];var metrics=data.metric_rows||[];var storeRows=data.store_submission_rows||[];var expected=storeRows.reduce(function(n,r){return n+Number(r.expected_count||0)},0);var submitted=storeRows.reduce(function(n,r){return n+Number(r.submitted_count||0)},0);var rate=expected>0?Math.round(submitted*1000/expected)/10:0;renderHqStores(storeRows);setStats(expected,submitted,new Set(rows.map(function(r){return r.role_code})).size,metrics.length,rate+'%');document.getElementById('tableWrap').innerHTML='<table><thead><tr><th>日期</th><th>门店</th><th>岗位</th><th>状态</th><th>日报数</th></tr></thead><tbody>'+rows.map(function(r){return'<tr><td>'+esc(r.report_date)+'</td><td>'+esc(r.store_name||r.store_id)+'</td><td>'+esc(r.role_code)+'</td><td>'+esc(r.submit_status)+'</td><td>'+esc(r.report_count)+'</td></tr>'}).join('')+'</tbody></table>'}
function renderHqStores(rows){var wrap=document.getElementById('exceptionCards');wrap.style.display='grid';wrap.innerHTML='<section class="card" style="grid-column:1/-1"><div class="section-title">门店提交率排行</div><table><thead><tr><th>门店</th><th>应交</th><th>已交</th><th>草稿</th><th>缺交</th><th>提交率</th></tr></thead><tbody>'+rows.map(function(r){return'<tr class="click-row" onclick="drillStore('+Number(r.store_id||0)+')"><td class="link-cell">'+esc(r.store_name||r.store_id)+'</td><td>'+esc(r.expected_count)+'</td><td>'+esc(r.submitted_count)+'</td><td>'+esc(r.draft_count)+'</td><td>'+esc(r.missing_count)+'</td><td>'+esc(r.submission_rate)+'%</td></tr>'}).join('')+'</tbody></table><div class="status">点击门店行可下钻查看该店缺交名单</div></section>'}
async function loadCoachDaily(date){var wrap=document.getElementById('coachDailyWrap');document.getElementById('coachDailyDate').textContent=date||'';wrap.innerHTML='<div class="status">正在加载教练完成量...</div>';try{var res=await ApiClient.get('/api/admin/workload/summary.php?date='+encodeURIComponent(date)+'&role=coach');renderCoachDaily(res.data||{})}catch(err){wrap.innerHTML='<div class="status err">'+esc(err.message||'教练完成量加载失败')+'</div>'}}
function workloadStatusLabel(status){if(status==='submitted')return'<span class="badge ok">已提交</span>';if(status==='draft')return'<span class="badge warn">草稿</span>';if(status==='missing')return'<span class="badge danger">未提交</span>';return'<span class="badge">'+esc(status||'-')+'</span>'}
function renderCoachDaily(data){var rows=data.list||[];var summary=data.summary||{};if(!rows.length){document.getElementById('coachDailyWrap').innerHTML='<div class="mini-item"><strong>暂无教练日报数据</strong><span>当前日期没有教练提交或预期名单</span></div>';return}document.getElementById('coachDailyWrap').innerHTML='<div class="status">应交 '+esc(summary.expected_count||0)+' / 已交 '+esc(summary.submitted_count||0)+' / 草稿 '+esc(summary.draft_count||0)+' / 缺交 '+esc(summary.missing_count||0)+' / 完成率 '+esc(summary.completion_rate||0)+'%</div><table><thead><tr><th>门店</th><th>教练</th><th>状态</th><th>完成量</th><th>指标摘要</th></tr></thead><tbody>'+rows.map(function(r){return'<tr><td>'+esc(r.store_name||'-')+'</td><td><strong>'+esc(r.staff_name||'-')+'</strong></td><td>'+workloadStatusLabel(r.status)+'</td><td>'+esc(r.score||0)+'</td><td class="metric-text">'+esc(r.summary||'-')+'</td></tr>'}).join('')+'</tbody></table>'}
function drillStore(storeId){if(!storeId)return;document.getElementById('storeId').value=storeId;document.getElementById('mode').value='store';loadData()}
function exportCsv(){if(!currentData){setStatus('请先加载数据再导出','err');return}var rows=[],name='workload';if(currentMode==='hq'){rows=[['门店ID','门店','应交','已交','草稿','缺交','提交率']].concat((currentData.store_submission_rows||[]).map(function(r){return[r.store_id,r.store_name,r.expected_count,r.submitted_count,r.draft_count,r.missing_count,(r.submission_rate||0)+'%']}));name='workload-hq-'+document.getElementById('dateFrom').value+'-'+document.getElementById('dateTo').value}else{rows=[['类型','员工ID','姓名','岗位','状态/说明','更新时间']];(currentData.missing_staff||[]).forEach(function(r){rows.push(['未提交',r.staff_id,r.staff_name,r.role_code,'未提交',''])});(currentData.draft_staff||[]).forEach(function(r){rows.push(['草稿',r.staff_id,r.staff_name,r.role_code,'草稿',r.updated_at||''])});(currentData.reports||[]).forEach(function(r){rows.push(['日报',r.staff_id,r.staff_name,r.role_code,r.submit_status,r.updated_at||''])});name='workload-store-'+(currentData.store_id||document.getElementById('storeId').value)+'-'+(currentData.date||document.getElementById('dateTo').value)}downloadCsv(name+'.csv',rows)}
function downloadCsv(filename,rows){var csv='\ufeff'+rows.map(function(row){return row.map(function(cell){var v=String(cell==null?'':cell);return '"'+v.replace(/"/g,'""')+'"'}).join(',')}).join('\n');var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);setStatus('CSV 已生成','ok')}
function buildReminder(){if(!currentData)return '';if(currentMode==='hq'){var rows=currentData.store_submission_rows||[];var weak=rows.filter(function(r){return Number(r.missing_count||0)>0}).slice(0,8);if(!weak.length)return '今日各门店工作量日报已全部提交。';return '【工作量日报提醒】\n以下门店仍有缺交，请店长今天内跟进提交：\n'+weak.map(function(r,i){return (i+1)+'. '+(r.store_name||r.store_id)+'：缺交 '+(r.missing_count||0)+'，提交率 '+(r.submission_rate||0)+'%'}).join('\n')}var missing=currentData.missing_staff||[];var drafts=currentData.draft_staff||[];var date=currentData.date||document.getElementById('dateTo').value;var lines=['【工作量日报提醒】','日期：'+date];if(!missing.length&&!drafts.length){lines.push('今日工作量日报已全部提交，辛苦大家。');return lines.join('\n')}if(missing.length){lines.push('未提交：'+missing.map(function(r){return r.staff_name||r.staff_id}).join('、'))}if(drafts.length){lines.push('草稿未提交：'+drafts.map(function(r){return r.staff_name||r.staff_id}).join('、'))}lines.push('请以上同事今天内完成提交，店长请跟进确认。');return lines.join('\n')}
function copyReminder(){var text=buildReminder();if(!text){setStatus('请先加载数据再复制提醒','err');return}if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){setStatus('提醒文案已复制','ok')}).catch(function(){fallbackCopy(text)})}else{fallbackCopy(text)}}
function fallbackCopy(text){var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');setStatus('提醒文案已复制','ok')}catch(e){setStatus('复制失败，请手动复制：'+text,'err')}ta.remove()}
function renderExceptions(data){var wrap=document.getElementById('exceptionCards');var missing=data.missing_staff||[];var drafts=data.draft_staff||[];wrap.style.display='grid';wrap.innerHTML='<section class="card"><div class="section-title">未提交名单 <span style="color:var(--danger)">'+(data.missing_count||missing.length)+'</span></div><div class="mini-list">'+listPeople(missing,'今天还没有日报记录')+'</div></section><section class="card"><div class="section-title">草稿未提交 <span style="color:var(--orange)">'+(data.draft_count||drafts.length)+'</span></div><div class="mini-list">'+listPeople(drafts,'暂无草稿')+'</div></section>'}
function hideExceptions(){document.getElementById('exceptionCards').style.display='none'}
function listPeople(rows,empty){if(!rows.length)return '<div class="mini-item"><strong>'+esc(empty)+'</strong><span>当前无需处理</span></div>';return rows.map(function(r){return '<div class="mini-item"><strong>'+esc(r.staff_name||r.staff_id)+'</strong><span>'+esc(r.role_code||'')+(r.updated_at?' · '+esc(r.updated_at):'')+'</span></div>'}).join('')}
function setStats(a,b,c,d,e){document.getElementById('statReports').textContent=a;document.getElementById('statSubmitted').textContent=b;document.getElementById('statRoles').textContent=c;document.getElementById('statMetrics').textContent=d;document.getElementById('statRate').textContent=e||'-';document.getElementById('statRate').className=String(e||'').indexOf('100')===0?'num':'num danger'}
function esc(v){return String(v==null?'':v).replace(/[&<>"]/g,function(s){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]})}
window.requirePageAuth({onAuthed:async(user)=>{const role=String(user?.role||'').toLowerCase();const canAccessWorkload=!!user?.is_hq||['admin','ceo','operation','finance','manager'].includes(role);if(!canAccessWorkload){window.location.replace('/internal.html');return}init()}});
</script>
</body>
</html>
