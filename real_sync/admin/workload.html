<!DOCTYPE html>
<html lang="zh-CN">

<title>工作量驾驶舱 - 追光小牛管理后台</title>
<script src="/internal-auth.js?v=7"></script>

<style>
:root{--orange:#ff6b35;--ink:#1f1a17;--muted:#6b625c;--bg:#f6f4f1;--card:#fff;--line:rgba(0,0,0,.08);--danger:#b42318;--ok:#087443;--warn:#b76e00;--blue:#155eef}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);font-size:14px}.top{background:#fff;border-bottom:1px solid var(--line);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}.brand{font-size:16px;font-weight:700}.nav{display:flex;gap:12px}.nav a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:600}.nav a.active{color:var(--orange)}.main{max-width:1400px;margin:0 auto;padding:20px 24px}.hero{background:linear-gradient(135deg,#1f1a17,#44362e);color:#fff;border-radius:16px;padding:20px 24px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}.hero-left h1{margin:0 0 6px;font-size:22px;font-weight:700}.hero-left p{margin:0;font-size:13px;color:rgba(255,255,255,.7)}.hero-right{text-align:right}.stamp{font-size:12px;color:rgba(255,255,255,.6)}.quick-buttons{display:flex;gap:8px;margin-top:10px}.quick-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:7px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}.quick-btn:hover{background:rgba(255,255,255,.25)}.quick-btn.active{background:var(--orange);border-color:var(--orange)}.filters{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;gap:12px;align-items:end;flex-wrap:wrap}.field{display:flex;align-items:center;gap:8px}.field label{font-size:12px;color:var(--muted);font-weight:600}.field input,.field select{border:1px solid var(--line);border-radius:6px;padding:8px 12px;font-size:13px;background:#fff}.field input[type="date"]{width:140px}.field select{min-width:160px}.btn{border:none;border-radius:6px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}.btn.primary{background:var(--orange);color:#fff}.btn.primary:hover{background:#e55a28}.btn.secondary{background:#fff;border:1px solid var(--line);color:var(--ink)}.btn.secondary:hover{background:var(--bg)}.kpis{display:grid;grid-template-columns:repeat(8,1fr);gap:12px;margin-bottom:16px}.kpi-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}.kpi-card.primary{border-color:var(--orange);border-width:2px}.kpi-value{font-size:32px;font-weight:900;line-height:1;margin-bottom:4px}.kpi-value.ok{color:var(--ok)}.kpi-value.danger{color:var(--danger)}.kpi-value.warn{color:var(--warn)}.kpi-value.blue{color:var(--blue)}.kpi-label{font-size:11px;color:var(--muted);margin-top:4px}.kpi-trend{font-size:11px;margin-top:2px}.kpi-trend.up{color:var(--ok)}.kpi-trend.down{color:var(--danger)}.kpi-trend-arrow{font-size:14px;font-weight:700;margin-left:4px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px}.card-title{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--ink)}.card-subtitle{font-size:11px;color:var(--muted);margin-left:8px}.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}.card-header-left{flex:1}.card-header-right{display:flex;gap:8px;align-items:center}.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}.badge.ok{background:#e7f5ed;color:var(--ok)}.badge.danger{background:#fce8e6;color:var(--danger)}.badge.warn{background:#fef3e2;color:var(--warn)}.badge.count{background:var(--danger);color:#fff}.exception-filter{border:1px solid var(--line);border-radius:6px;padding:6px 10px;font-size:12px;background:#fff;min-width:100px}.exception-group{border:1px solid var(--line);border-radius:8px;margin-bottom:8px}.exception-group-header{padding:10px 12px;background:var(--bg);cursor:pointer;font-weight:600;font-size:13px;display:flex;justify-content:space-between;align-items:center}.exception-group-header:hover{background:#eae8e5}.exception-group-count{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700}.exception-group-body{padding:8px 12px 12px;display:none;max-height:200px;overflow-y:auto}.exception-group-body.open{display:block}.exception-item{padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:12px}.exception-item:last-child{border-bottom:none}.exception-item-title{display:flex;align-items:center;gap:6px;margin-bottom:3px}.exception-item-detail{color:var(--muted);font-size:11px}.exception-item-link{color:var(--orange);font-weight:600;cursor:pointer;margin-left:4px}.table-container{overflow-x:auto}.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{padding:10px 8px;text-align:left;border-bottom:1px solid var(--line)}.table th{font-weight:600;color:var(--muted);font-size:11px;background:var(--bg);border-bottom-width:2px;white-space:nowrap}.table tbody tr:nth-child(even){background:#faf9f7}.table tbody tr:hover{background:#f2f0ed}.table .col-store{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.table .col-store:hover{overflow:visible;white-space:normal}.table .col-name{font-weight:600;cursor:pointer;color:var(--ink)}.table .col-name:hover{color:var(--orange)}.table .col-number{text-align:right;white-space:nowrap}.table .col-percent{text-align:right;font-weight:600;white-space:nowrap}.table .col-percent.ok{color:var(--ok)}.table .col-percent.danger{color:var(--danger)}.table .col-percent.warn{color:var(--warn)}.table .col-badge{text-align:center}.table .col-status{text-align:center}.table .progress-bar{height:16px;background:var(--bg);border-radius:4px;overflow:hidden;display:inline-block;width:80px}.table .progress-fill{height:100%;display:block;transition:width .3s}.table .progress-fill.ok{background:var(--ok)}.table .progress-fill.danger{background:var(--danger)}.table .progress-fill.warn{background:var(--warn)}.trend-container{display:flex;gap:16px;align-items:flex-start}.trend-cards{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;flex:0 0 auto}.trend-chart-wrap{flex:1;min-width:300px;height:220px;background:var(--bg);border-radius:10px;padding:12px}.trend-item{background:var(--bg);border-radius:10px;padding:12px;min-width:90px;text-align:center}.trend-date{font-size:11px;color:var(--muted);margin-bottom:4px}.trend-rate{font-size:20px;font-weight:900;margin-bottom:2px}.trend-rate.ok{color:var(--ok)}.trend-rate.danger{color:var(--danger)}.trend-rate.warn{color:var(--warn)}.trend-detail{font-size:10px;color:var(--muted)}.metric-groups{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}.metric-card{border:1px solid var(--line);border-radius:10px;padding:12px}.metric-card-title{font-size:13px;font-weight:700;margin-bottom:8px}.metric-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid rgba(0,0,0,.04)}.metric-row:last-child{border-bottom:none}.metric-value{font-weight:600;color:var(--orange)}.drawer-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}.drawer-overlay.show{opacity:1;pointer-events:all}.drawer{position:fixed;top:0;right:-480px;width:480px;max-width:100%;height:100%;background:#fff;z-index:101;transition:right .3s;overflow-y:auto;box-shadow:-2px 0 8px rgba(0,0,0,.1)}.drawer.show{right:0}.drawer-head{padding:16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.drawer-title{font-size:16px;font-weight:700}.drawer-close{border:1px solid var(--line);background:#fff;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer}.drawer-body{padding:16px}.drawer-date-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}.drawer-date-tab{border:1px solid var(--line);background:var(--bg);border-radius:6px;padding:5px 8px;font-size:10px;font-weight:600;cursor:pointer}.drawer-date-tab.selected{background:var(--orange);color:#fff;border-color:var(--orange)}.drawer-section{margin-bottom:12px}.drawer-section-title{font-size:13px;font-weight:600;margin-bottom:6px;color:var(--muted)}.drawer-metrics{border:1px solid var(--line);border-radius:8px;padding:10px}.drawer-metric-item{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;border-bottom:1px solid rgba(0,0,0,.04)}.drawer-metric-item:last-child{border-bottom:none}.drawer-metric-name{color:var(--muted)}.drawer-metric-value{font-weight:600}.drawer-remarks{background:var(--bg);border-radius:6px;padding:10px;font-size:12px}.drawer-evidences{margin-top:12px}.drawer-evidences-title{font-size:13px;font-weight:600;margin-bottom:8px}.drawer-evidences-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px}.drawer-evidence-item{width:70px;height:70px;border-radius:6px;overflow:hidden;cursor:pointer;border:1px solid var(--line);position:relative}.drawer-evidence-item img{width:100%;height:100%;object-fit:cover}.evidence-warn{position:absolute;bottom:0;left:0;right:0;background:rgba(180,35,24,.9);color:#fff;font-size:9px;padding:2px;text-align:center}.preview-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;display:flex;align-items:center;justify-content:center}.preview-modal.show{opacity:1;pointer-events:all}.preview-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer}.preview-img{max-width:90%;max-height:90%;object-fit:contain;border-radius:6px}.hidden{display:none}.status{padding:12px;text-align:center;color:var(--muted);font-size:12px}.status.err{color:var(--danger)}@media(max-width:900px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(4,1fr)}.filters{flex-direction:column;align-items:stretch}.field{flex-direction:column;gap:4px}.drawer{width:100%;right:-100%}}
</style>
</head>
<body>
<header class="top"><div class="brand">工作量驾驶舱</div><nav class="nav"><a href="/admin/dashboard.html">后台首页</a><a class="active" href="/admin/workload.html">工作量</a><a href="/internal.html">工作台</a></nav></header>
<main class="main">
  <section class="hero">
    <div class="hero-left">
      <h1>管理层工作量驾驶舱</h1>
      <p>核心指标 · 异常定位 · 门店监控 · 员工明细</p>
      <div class="quick-buttons">
        <button class="quick-btn active" onclick="quickRange('yesterday')">昨日</button>
        <button class="quick-btn" onclick="quickRange('7d')">近 7 日</button>
        <button class="quick-btn" onclick="quickRange('30d')">近 30 日</button>
      </div>
    </div>
    <div class="hero-right"><div class="stamp" id="rangeStamp">准备加载</div></div>
  </section>
  <section class="filters">
    <div class="field"><label>开始</label><input type="date" id="dateFrom"></div>
    <div class="field"><label>结束</label><input type="date" id="dateTo"></div>
    <div class="field"><label>门店</label><select id="storeId"><option value="">全部门店</option></select></div>
    <div class="field"><label>模式</label><select id="mode"><option value="dashboard">驾驶舱</option><option value="store">门店日报</option><option value="hq">总部汇总</option></select></div>
    <button class="btn primary" onclick="loadData()">刷新</button>
    <button class="btn secondary" onclick="exportCsv()">导出</button>
    <button class="btn secondary" onclick="copyReminder()">复制提醒</button>
  </section>
  <section class="kpis">
    <div class="kpi-card primary"><div class="kpi-value" id="kpi7dAvg">-</div><div class="kpi-label">7日平均完成率</div><div class="kpi-trend" id="kpi7dTrend"></div></div>
    <div class="kpi-card"><div class="kpi-value" id="kpi30dAvg">-</div><div class="kpi-label">30日平均完成率</div><div class="kpi-trend" id="kpi30dText"></div></div>
    <div class="kpi-card"><div class="kpi-value" id="kpiRate">0%</div><div class="kpi-label">当前完成率</div></div>
    <div class="kpi-card"><div class="kpi-value ok" id="kpiSubmitted">0</div><div class="kpi-label">已提交</div></div>
    <div class="kpi-card"><div class="kpi-value danger" id="kpiMissing">0</div><div class="kpi-label">缺交</div></div>
    <div class="kpi-card"><div class="kpi-value" id="kpiDraft">0</div><div class="kpi-label">草稿</div></div>
    <div class="kpi-card"><div class="kpi-value blue" id="kpiWeakStore">0</div><div class="kpi-label">异常门店</div><div class="kpi-trend" id="kpiWeakText">提交率&lt;80%</div></div>
    <div class="kpi-card"><div class="kpi-value" id="kpiExpected">0</div><div class="kpi-label">应交员工</div></div>
  </section>
  <section id="dashboardView">
    <div class="grid">
      <section class="card">
        <div class="card-header">
          <div class="card-header-left"><div class="card-title">门店提交率排行<span class="card-subtitle">点击下钻门店日报</span></div></div>
        </div>
        <div class="table-container" id="storeRankWrap"></div>
      </section>
      <section class="card">
        <div class="card-header">
          <div class="card-header-left"><div class="card-title">异常中心<span class="badge count" id="exceptionCountBadge">0</span></div></div>
          <div class="card-header-right">
            <select class="exception-filter" id="exceptionTypeFilter" onchange="filterExceptions()">
              <option value="">全部类型</option>
              <option value="missing">未提交</option>
              <option value="draft">草稿</option>
              <option value="evidence_missing">凭证异常</option>
            </select>
            <select class="exception-filter" id="exceptionStoreFilter" onchange="filterExceptions()">
              <option value="">全部门店</option>
            </select>
            <select class="exception-filter" id="exceptionDaysFilter" onchange="filterExceptions()">
              <option value="3">最近 3 天</option>
              <option value="7">最近 7 天</option>
              <option value="">全部日期</option>
            </select>
          </div>
        </div>
        <div id="exceptionWrap"></div>
      </section>
    </div>
    <section class="card">
      <div class="card-title">近 7 日提交趋势</div>
      <div class="trend-container">
        <div class="trend-cards" id="trendCards"></div>
        <div class="trend-chart-wrap">
          <canvas id="trendChart" width="400" height="200"></canvas>
        </div>
      </div>
    </section>
    <section class="card">
      <div class="card-title">岗位关键指标汇总<span class="card-subtitle">只统计已提交日报</span></div>
      <div class="metric-groups" id="metricWrap"></div>
    </section>
  </section>
  <section id="detailView" class="hidden">
    <section class="card" id="exceptionCards"></section>
    <section class="card"><div class="card-title">日报明细</div><div class="table-container" id="tableWrap"></div></section>
  </section>
  <div class="status" id="statusText">准备加载...</div>
</main>
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="staffDrawer">
  <div class="drawer-head"><div class="drawer-title" id="drawerTitle">员工明细</div><button class="drawer-close" onclick="closeDrawer()">关闭</button></div>
  <div class="drawer-body">
    <div class="drawer-date-tabs" id="drawerDateTabs"></div>
    <div id="drawerContent"><div class="status">选择员工查看明细</div></div>
  </div>
</div>
<div class="preview-modal" id="previewModal" onclick="closePreview(event)">
  <button class="preview-close" onclick="closePreview(event)">×</button>
  <img class="preview-img" id="previewImg" alt="凭证预览">
</div>
<script>
var context=null,currentMode='dashboard',currentData=null,dashboardData=null,storeOptions=[],allExceptions=[];
var currentDrawerStaffId=null,currentDrawerDate=null;
function today(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function daysAgo(n){var d=new Date();d.setDate(d.getDate()-n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function setStatus(t,c){var el=document.getElementById('statusText');el.textContent=t;el.className='status '+(c||'')}
function quickRange(type){var fromEl=document.getElementById('dateFrom'),toEl=document.getElementById('dateTo');var yesterdayDate=daysAgo(1);toEl.value=yesterdayDate;if(type==='yesterday'){fromEl.value=yesterdayDate}else if(type==='7d'){fromEl.value=daysAgo(7)}else if(type==='30d'){fromEl.value=daysAgo(30)}var btns=document.querySelectorAll('.quick-btn');btns.forEach(function(b){b.classList.remove('active')});event.target.classList.add('active');loadData()}
async function init(){var yesterday=daysAgo(1);document.getElementById('dateFrom').value=yesterday;document.getElementById('dateFrom').max=yesterday;document.getElementById('dateTo').value=yesterday;document.getElementById('dateTo').max=yesterday;try{var res=await ApiClient.get('/api/common/context-info.php');context=res.data.context||{};await loadStores();if(context.store_id&&!context.is_hq&&!context.is_admin){document.getElementById('storeId').value=String(context.store_id);document.getElementById('storeId').disabled=true}await loadData()}catch(err){setStatus(err.message||'读取身份失败','err')}}
async function loadStores(){var select=document.getElementById('storeId');select.innerHTML='<option value="">全部门店</option>';try{var res=await ApiClient.get('/api/statistics/store.php?page_size=50');storeOptions=res.data&&Array.isArray(res.data.list)?res.data.list:[];if(context&&context.store_id&&!context.is_hq&&!context.is_admin){storeOptions=storeOptions.filter(function(s){return String(s.id)===String(context.store_id)})}renderStoreSelect();updateExceptionStoreFilter()}catch(err){storeOptions=[];renderStoreSelect()}}
function renderStoreSelect(){var select=document.getElementById('storeId');var selected=select.value;var locked=context&&context.store_id&&!context.is_hq&&!context.is_admin;select.innerHTML=(locked?'':'<option value="">全部门店</option>')+storeOptions.map(function(s){return'<option value="'+esc(s.id)+'">'+esc(s.name||('门店 '+s.id))+'</option>'}).join('');if(selected&&storeOptions.some(function(s){return String(s.id)===String(selected)}))select.value=selected}
function updateExceptionStoreFilter(){var filter=document.getElementById('exceptionStoreFilter');filter.innerHTML='<option value="">全部门店</option>'+storeOptions.map(function(s){return'<option value="'+esc(s.id)+'">'+esc(s.name||('门店 '+s.id))+'</option>'}).join('')}
function mergeStoreOptions(rows){var changed=false;(rows||[]).forEach(function(r){var id=r.store_id||r.id;if(!id)return;if(!storeOptions.some(function(s){return String(s.id)===String(id)})){storeOptions.push({id:id,name:r.store_name||r.name||('门店 '+id)});changed=true}});if(changed){storeOptions.sort(function(a,b){return Number(a.id||0)-Number(b.id||0)});renderStoreSelect();updateExceptionStoreFilter()}}
async function loadData(){var mode=document.getElementById('mode').value;var from=document.getElementById('dateFrom').value;var to=document.getElementById('dateTo').value;var storeId=document.getElementById('storeId').value;currentMode=mode;if(mode==='store'&&!storeId){setStatus('请先选择门店再查看门店日报','err');return}setStatus('加载中...');try{if(mode==='dashboard'){showDashboard();var url='/api/workload/dashboard.php?date_from='+encodeURIComponent(from)+'&date_to='+encodeURIComponent(to);if(storeId)url+='&store_id='+encodeURIComponent(storeId);var dash=await ApiClient.get(url);dashboardData=dash.data;currentData=dash.data;allExceptions=dash.data.exceptions||[];mergeStoreOptions(dash.data&&dash.data.store_rank_rows);renderDashboard(dash.data)}else{showDetail();if(mode==='hq'){var hqUrl='/api/workload/hq-summary.php?date_from='+encodeURIComponent(from)+'&date_to='+encodeURIComponent(to);var hq=await ApiClient.get(hqUrl);currentData=hq.data;mergeStoreOptions(hq.data&&hq.data.store_submission_rows);renderHq(hq.data)}else{var store=await ApiClient.get('/api/workload/store-summary.php?date='+encodeURIComponent(to)+'&store_id='+encodeURIComponent(storeId));currentData=store.data;renderStore(store.data)}}setStatus('已刷新','')}catch(err){setStatus(err.message||'加载失败','err')}}
function showDashboard(){document.getElementById('dashboardView').classList.remove('hidden');document.getElementById('detailView').classList.add('hidden')}
function showDetail(){document.getElementById('dashboardView').classList.add('hidden');document.getElementById('detailView').classList.remove('hidden')}
function renderDashboard(data){var k=data.kpis||{};var trendRows=data.trend_rows||[];document.getElementById('rangeStamp').textContent=(data.filters.date_from||'')+' 至 '+data.filters.date_to+' · '+getSelectedStoreName(data);calcTrendKpis(trendRows);setKpis(k);calcWeakStore(data.store_rank_rows||[]);renderStoreRank(data.store_rank_rows||[]);renderExceptionsDashboard(data.exceptions||[]);renderTrend(trendRows.slice(-7));renderMetrics(data.metric_rows||[])}
function calcTrendKpis(rows){if(!rows.length){document.getElementById('kpi7dAvg').textContent='-';document.getElementById('kpi7dTrend').textContent='';document.getElementById('kpi30dAvg').textContent='-';document.getElementById('kpi30dText').textContent='数据不足';return}var last7=rows.slice(-7);var avg7=last7.reduce(function(s,r){return s+Number(r.submission_rate||0)},0)/7;document.getElementById('kpi7dAvg').textContent=Math.round(avg7)+'%';document.getElementById('kpi7dAvg').className='kpi-value '+rateColor(avg7);if(rows.length>=14){var prev7=rows.slice(-14,-7);var avgPrev=prev7.reduce(function(s,r){return s+Number(r.submission_rate||0)},0)/7;var diff=avg7-avgPrev;var arrow=diff>2?'↑':diff<-2?'↓':'→';var cls=diff>2?'up':diff<-2?'down':'';document.getElementById('kpi7dTrend').textContent=arrow+' 较前7日 '+Math.abs(Math.round(diff))+'%';document.getElementById('kpi7dTrend').className='kpi-trend '+cls}else{document.getElementById('kpi7dTrend').textContent=''}if(rows.length>=30){var last30=rows.slice(-30);var avg30=last30.reduce(function(s,r){return s+Number(r.submission_rate||0)},0)/30;document.getElementById('kpi30dAvg').textContent=Math.round(avg30)+'%';document.getElementById('kpi30dAvg').className='kpi-value '+rateColor(avg30);document.getElementById('kpi30dText').textContent='('+rows.length+'天)'}else{document.getElementById('kpi30dAvg').textContent='-';document.getElementById('kpi30dText').textContent='数据不足'}}
function rateColor(rate){if(rate>=90)return 'ok';if(rate<80)return 'danger';if(rate<90)return 'warn';return ''}
function calcWeakStore(rows){var weak=rows.filter(function(r){return Number(r.submission_rate||0)<80});document.getElementById('kpiWeakStore').textContent=weak.length;document.getElementById('kpiWeakStore').className='kpi-value '+weak.length>0?'danger':'ok';if(weak.length>0){var worst=weak.sort(function(a,b){return Number(a.submission_rate||0)-Number(b.submission_rate||0)})[0];document.getElementById('kpiWeakText').textContent='最差: '+esc(worst.store_name||worst.store_id)+' '+worst.submission_rate+'%'}else{document.getElementById('kpiWeakText').textContent='全部达标'}}
function getSelectedStoreName(data){var filterStoreId=data&&data.filters?data.filters.store_id:document.getElementById('storeId').value;if(!filterStoreId)return '全部门店';var match=storeOptions.find(function(s){return String(s.id)===String(filterStoreId)});if(match)return match.name||('门店 '+match.id);var rows=data&&data.store_rank_rows?data.store_rank_rows:[];var row=rows.find(function(r){return String(r.store_id)===String(filterStoreId)});return row&&row.store_name?row.store_name:'门店 '+filterStoreId}
function setKpis(k){document.getElementById('kpiRate').textContent=(k.submission_rate||0)+'%';document.getElementById('kpiRate').className='kpi-value '+rateColor(k.submission_rate||0);document.getElementById('kpiSubmitted').textContent=k.submitted_count||0;document.getElementById('kpiMissing').textContent=k.missing_count||0;document.getElementById('kpiDraft').textContent=k.draft_count||0;document.getElementById('kpiExpected').textContent=k.expected_count||0}
function renderStoreRank(rows){if(!rows.length){document.getElementById('storeRankWrap').innerHTML='<div class="status">暂无门店数据</div>';return}document.getElementById('storeRankWrap').innerHTML='<table class="table"><thead><tr><th>门店</th><th>进度</th><th class="col-number">应交</th><th class="col-number">已交</th><th class="col-number">草稿</th><th class="col-number">缺交</th><th class="col-number">提交率</th></tr></thead><tbody>'+rows.map(function(r){var rate=Number(r.submission_rate||0);var colorClass=rateColor(rate);var progressClass=colorClass||'';var nameEsc=esc(r.store_name||r.store_id);return'<tr onclick="drillStore('+Number(r.store_id||0)+')"><td class="col-store col-name" title="'+nameEsc+'">'+nameEsc+'</td><td><div class="progress-bar"><div class="progress-fill '+progressClass+'" style="width:'+Math.min(100,rate)+'%"></div></div></td><td class="col-number">'+esc(r.expected_count)+'</td><td class="col-number">'+esc(r.submitted_count)+'</td><td class="col-number">'+esc(r.draft_count)+'</td><td class="col-number">'+esc(r.missing_count)+'</td><td class="col-percent '+colorClass+'">'+rate+'%</td></tr>'}).join('')+'</tbody></table>'}
function renderExceptionsDashboard(rows){document.getElementById('exceptionCountBadge').textContent=rows.length;allExceptions=rows;filterExceptions()}
function filterExceptions(){var typeFilter=document.getElementById('exceptionTypeFilter').value;var storeFilter=document.getElementById('exceptionStoreFilter').value;var daysFilter=document.getElementById('exceptionDaysFilter').value;var filtered=allExceptions.filter(function(r){if(typeFilter&&r.type!==typeFilter)return false;if(storeFilter&&String(r.store_id)!==String(storeFilter))return false;if(daysFilter){var dateLimit=daysAgo(Number(daysFilter)-1);if(r.date<dateLimit)return false}return true});renderExceptionGroups(filtered)}
function renderExceptionGroups(rows){if(!rows.length){document.getElementById('exceptionWrap').innerHTML='<div class="status">暂无异常</div>';return}var labels={missing:'未提交',draft:'草稿',evidence_missing:'凭证异常'};var badges={missing:'danger',draft:'warn',evidence_missing:'danger'};var grouped={};rows.forEach(function(r){var type=r.type||'missing';if(!grouped[type])grouped[type]=[];grouped[type].push(r)});var typeOrder=['missing','draft','evidence_missing'];var html=typeOrder.map(function(type){var items=grouped[type]||[];if(!items.length)return'';return'<div class="exception-group"><div class="exception-group-header" onclick="toggleGroup(this)"><span>'+labels[type]+' <span class="badge '+badges[type]+' exception-group-count">'+items.length+'</span></span><span style="font-size:11px;color:var(--muted)">展开</span></div><div class="exception-group-body">'+renderExceptionItems(items)+'</div></div>'}).join('');document.getElementById('exceptionWrap').innerHTML=html}
function toggleGroup(header){var body=header.nextElementSibling;if(body.classList.contains('open')){body.classList.remove('open');header.querySelector('span:last-child').textContent='展开'}else{body.classList.add('open');header.querySelector('span:last-child').textContent='收起'}}
function renderExceptionItems(items){return items.map(function(r){return'<div class="exception-item"><div class="exception-item-title"><span class="badge '+r.type+'">'+esc(r.message||r.type)+'</span><span class="exception-item-link" onclick="openStaffDrawer('+Number(r.staff_id||0)+',\''+esc(r.date)+'\')">'+esc(r.staff_name||r.staff_id)+'</span></div><div class="exception-item-detail">'+esc(r.date)+' '+esc(r.store_name||r.store_id)+' '+roleLabel(r.role_code||'')+'</div></div>'}).join('')}
function renderTrend(rows){if(!rows.length){document.getElementById('trendCards').innerHTML='';return}document.getElementById('trendCards').innerHTML=rows.map(function(r){var rate=Number(r.submission_rate||0);var colorClass=rateColor(rate);return'<div class="trend-item"><div class="trend-date">'+esc(r.date.slice(5))+'</div><div class="trend-rate '+colorClass+'">'+rate+'%</div><div class="trend-detail">已交 '+esc(r.submitted_count)+' / '+esc(r.expected_count)+'</div></div>'}).join('');drawTrendChart(rows)}
function drawTrendChart(rows){var canvas=document.getElementById('trendChart');if(!canvas)return;var container=canvas.parentElement;canvas.width=container.clientWidth-24;canvas.height=200;var ctx=canvas.getContext('2d');var width=canvas.width;var height=canvas.height;ctx.clearRect(0,0,width,height);if(!rows.length)return;var padding=30;var chartWidth=width-padding*2;var chartHeight=height-padding*2;var maxRate=100;var rates=rows.map(function(r){return Number(r.submission_rate||0)});var stepX=rows.length>1?chartWidth/(rows.length-1):chartWidth/2;ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=1;ctx.beginPath();for(var i=0;i<=10;i++){var y=padding+(chartHeight/10)*i;ctx.moveTo(padding,y);ctx.lineTo(width-padding,y)}ctx.stroke();ctx.strokeStyle='#ff6b35';ctx.lineWidth=2;ctx.beginPath();for(var i=0;i<rows.length;i++){var x=padding+i*stepX;var y=padding+chartHeight-(rates[i]/maxRate)*chartHeight;if(i===0){ctx.moveTo(x,y)}else{ctx.lineTo(x,y)}}ctx.stroke();for(var i=0;i<rows.length;i++){var x=padding+i*stepX;var y=padding+chartHeight-(rates[i]/maxRate)*chartHeight;ctx.beginPath();ctx.arc(x,y,4,0,2*Math.PI);ctx.fillStyle=rateColor(rates[i])==='danger'?'#b42318':rateColor(rates[i])==='ok'?'#087443':'#ff6b35';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke()}ctx.fillStyle='#6b625c';ctx.font='10px sans-serif';ctx.textAlign='center';for(var i=0;i<rows.length;i++){var x=padding+i*stepX;ctx.fillText(rows[i].date.slice(5),x,height-8)}ctx.fillStyle='#1f1a17';ctx.font='11px sans-serif';ctx.textAlign='left';ctx.fillText('提交率 (%)',padding,12)}
function renderMetrics(rows){if(!rows.length){document.getElementById('metricWrap').innerHTML='<div class="status">暂无已提交指标</div>';return}var groups={};rows.forEach(function(r){var role=r.role_code||'其他';if(!groups[role])groups[role]=[];groups[role].push(r)});document.getElementById('metricWrap').innerHTML=Object.keys(groups).map(function(role){return'<div class="metric-card"><div class="metric-card-title">'+roleLabel(role)+'</div>'+groups[role].map(function(r){return'<div class="metric-row"><span>'+esc(r.metric_name||r.metric_code)+'</span><span class="metric-value">'+fmt(r.metric_value)+' '+unitLabel(r.unit||'')+'</span></div>'}).join('')+'</div>'}).join('')}
function renderStore(data){var reports=data.reports||[];var date=data.date||document.getElementById('dateTo').value;document.getElementById('tableWrap').innerHTML='<table class="table"><thead><tr><th>员工</th><th>门店</th><th>岗位</th><th class="col-status">状态</th><th class="col-number">更新时间</th><th class="col-badge">凭证</th></tr></thead><tbody>'+reports.map(function(r){var nameEsc=esc(r.staff_name||r.staff_id);var storeEsc=esc(r.store_name||r.store_id);return'<tr onclick="openStaffDrawer('+Number(r.staff_id||0)+',\''+esc(date)+'\')"><td class="col-name" title="'+nameEsc+'">'+nameEsc+'</td><td class="col-store" title="'+storeEsc+'">'+storeEsc+'</td><td>'+roleLabel(r.role_code)+'</td><td class="col-status">'+statusBadge(r.submit_status)+'</td><td class="col-number">'+esc(r.updated_at||'-')+'</td><td class="col-badge">'+renderEvidenceCount(r.evidences||[])+'</td></tr>'}).join('')+'</tbody></table>';renderStoreExceptions(data)}
function renderEvidenceCount(list){if(!list.length)return'<span style="color:var(--muted)">无</span>';var warnCount=list.filter(function(e){return Number(e.file_size||0)>0&&Number(e.file_size||0)<1024}).length;var normalBadge='<span class="badge ok">'+list.length+'</span>';var warnBadge=warnCount>0?'<span class="badge danger">'+warnCount+' 异</span>':'';return normalBadge+warnBadge}
function renderHq(data){var rows=data.summary_rows||[];var storeRows=data.store_submission_rows||[];document.getElementById('exceptionCards').innerHTML='<div class="card-title">门店提交率排行</div><div class="table-container" id="hqStoreRank"></div>';renderStoreRankInto('hqStoreRank',storeRows);document.getElementById('tableWrap').innerHTML='<table class="table"><thead><tr><th class="col-number">日期</th><th>门店</th><th>岗位</th><th class="col-status">状态</th><th class="col-number">日报数</th></tr></thead><tbody>'+rows.map(function(r){var storeEsc=esc(r.store_name||r.store_id);return'<tr><td class="col-number">'+esc(r.report_date)+'</td><td class="col-store" title="'+storeEsc+'">'+storeEsc+'</td><td>'+roleLabel(r.role_code)+'</td><td class="col-status">'+statusBadge(r.submit_status)+'</td><td class="col-number">'+esc(r.report_count)+'</td></tr>'}).join('')+'</tbody></table>'}
function renderStoreRankInto(id,rows){var target=document.getElementById(id);target.innerHTML='<table class="table"><thead><tr><th>门店</th><th class="col-number">应交</th><th class="col-number">已交</th><th class="col-number">草稿</th><th class="col-number">缺交</th><th class="col-number">提交率</th></tr></thead><tbody>'+rows.map(function(r){var rate=Number(r.submission_rate||0);var colorClass=rateColor(rate);var nameEsc=esc(r.store_name||r.store_id);return'<tr onclick="drillStore('+Number(r.store_id||0)+')"><td class="col-store col-name" title="'+nameEsc+'">'+nameEsc+'</td><td class="col-number">'+esc(r.expected_count)+'</td><td class="col-number">'+esc(r.submitted_count)+'</td><td class="col-number">'+esc(r.draft_count)+'</td><td class="col-number">'+esc(r.missing_count)+'</td><td class="col-percent '+colorClass+'">'+rate+'%</td></tr>'}).join('')+'</tbody></table>'}
function renderStoreExceptions(data){var missing=data.missing_staff||[];var drafts=data.draft_staff||[];var date=data.date||document.getElementById('dateTo').value;document.getElementById('exceptionCards').innerHTML='<div class="grid"><section class="card"><div class="card-title">未提交名单<span class="badge danger">'+(data.missing_count||missing.length)+'</span></div><div>'+listPeople(missing,'无',date)+'</div></section><section class="card"><div class="card-title">草稿未提交<span class="badge warn">'+(data.draft_count||drafts.length)+'</span></div><div>'+listPeople(drafts,'无',date)+'</div></section></div>'}
function openStaffDrawer(staffId,date){currentDrawerStaffId=staffId;currentDrawerDate=date;document.getElementById('drawerOverlay').classList.add('show');document.getElementById('staffDrawer').classList.add('show');loadStaffDetail(staffId,date)}
function closeDrawer(){document.getElementById('drawerOverlay').classList.remove('show');document.getElementById('staffDrawer').classList.remove('show');currentDrawerStaffId=null;currentDrawerDate=null}
async function loadStaffDetail(staffId,date){document.getElementById('drawerTitle').textContent='加载中...';document.getElementById('drawerDateTabs').innerHTML='';document.getElementById('drawerContent').innerHTML='<div class="status">加载中...</div>';try{var res=await ApiClient.get('/api/workload/staff-detail.php?staff_id='+staffId+'&date='+encodeURIComponent(date));renderStaffDetail(res.data)}catch(err){document.getElementById('drawerContent').innerHTML='<div class="status err">'+esc(err.message||'加载失败')+'</div>'}}
function renderStaffDetail(data){var staff=data.staff||{};document.getElementById('drawerTitle').textContent=esc(staff.staff_name||'员工')+' '+roleLabel(staff.role_code||'')+' '+esc(staff.store_name||'');renderDrawerDateTabs(data.recent_days||[],data.date);var values=data.values||[];var evidences=data.evidences||[];var remarks=data.remarks||'';var status=data.submit_status||'missing';var html='<div class="drawer-section">'+statusBadge(status)+'</div>';if(values.length){html+='<div class="drawer-section"><div class="drawer-section-title">工作量指标</div><div class="drawer-metrics">'+values.map(function(v){return'<div class="drawer-metric-item"><span class="drawer-metric-name">'+esc(v.metric_name||v.metric_code)+'</span><span class="drawer-metric-value">'+fmt(v.numeric_value)+' '+unitLabel(v.unit||'')+'</span></div>'}).join('')+'</div></div>'}if(remarks){html+='<div class="drawer-section"><div class="drawer-section-title">备注</div><div class="drawer-remarks">'+esc(remarks)+'</div></div>'}if(evidences.length){var grid=evidences.map(function(e,i){var warn=Number(e.file_size||0)>0&&Number(e.file_size||0)<1024;var warnDiv=warn?'<div class="evidence-warn">异常</div>':'';return'<div class="drawer-evidence-item" onclick="openPreview(\''+esc(e.file_url)+'\')"><img src="'+esc(e.file_url)+'" alt="'+(i+1)+'">'+warnDiv+'</div>'}).join('');html+='<div class="drawer-section"><div class="drawer-section-title">凭证图片 '+evidences.length+' 张</div><div class="drawer-evidences-grid">'+grid+'</div></div>'}else{html+='<div class="drawer-section"><div class="drawer-section-title">凭证图片</div><div class="status">无凭证</div></div>'}document.getElementById('drawerContent').innerHTML=html}
function renderDrawerDateTabs(rows,selectedDate){if(!rows.length)return;document.getElementById('drawerDateTabs').innerHTML=rows.map(function(r){var cls=r.date===selectedDate?'selected':'';var mini=r.status==='submitted'?'已交':r.status==='draft'?'草稿':'缺';return'<button class="drawer-date-tab '+cls+'" onclick="loadStaffDetail('+currentDrawerStaffId+',\''+esc(r.date)+'\')">'+esc(r.date)+' '+mini+'</button>'}).join('')}
function openPreview(url){document.getElementById('previewImg').src=url;document.getElementById('previewModal').classList.add('show')}
function closePreview(event){if(event)event.stopPropagation();document.getElementById('previewModal').classList.remove('show');document.getElementById('previewImg').src=''}
function drillStore(storeId){if(!storeId)return;document.getElementById('storeId').value=String(storeId);document.getElementById('mode').value='store';loadData()}
function exportCsv(){if(!currentData){setStatus('请先加载数据','err');return}var rows=[],name='workload';if(currentMode==='dashboard'){rows=[['门店ID','门店','应交','已交','草稿','缺交','提交率']].concat((currentData.store_rank_rows||[]).map(function(r){return[r.store_id,r.store_name,r.expected_count,r.submitted_count,r.draft_count,r.missing_count,(r.submission_rate||0)+'%']}));name='workload-'+document.getElementById('dateFrom').value+'-'+document.getElementById('dateTo').value}else if(currentMode==='hq'){rows=[['门店ID','门店','应交','已交','草稿','缺交','提交率']].concat((currentData.store_submission_rows||[]).map(function(r){return[r.store_id,r.store_name,r.expected_count,r.submitted_count,r.draft_count,r.missing_count,(r.submission_rate||0)+'%']}));name='workload-hq-'+document.getElementById('dateFrom').value+'-'+document.getElementById('dateTo').value}else{rows=[['类型','员工ID','姓名','岗位','状态','更新时间']];(currentData.missing_staff||[]).forEach(function(r){rows.push(['未提交',r.staff_id,r.staff_name,r.role_code,'未提交',''])});(currentData.draft_staff||[]).forEach(function(r){rows.push(['草稿',r.staff_id,r.staff_name,r.role_code,'草稿',r.updated_at||''])});(currentData.reports||[]).forEach(function(r){rows.push(['日报',r.staff_id,r.staff_name,r.role_code,r.submit_status,r.updated_at||''])});name='workload-'+(currentData.store_id||document.getElementById('storeId').value)+'-'+(currentData.date||document.getElementById('dateTo').value)}downloadCsv(name+'.csv',rows)}
function downloadCsv(filename,rows){var csv='\ufeff'+rows.map(function(row){return row.map(function(cell){var v=String(cell==null?'':cell);return '"'+v.replace(/"/g,'""')+'"'}).join(',')}).join('\n');var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);setStatus('CSV 已生成','')}
function buildReminder(){var data=currentData;if(!data)return '';if(currentMode==='dashboard'){var rows=data.store_rank_rows||[];var weak=rows.filter(function(r){return Number(r.missing_count||0)>0}).slice(0,8);if(!weak.length)return '当前工作量日报已全部提交。';return '【工作量日报提醒】\n以下门店仍有缺交：\n'+weak.map(function(r,i){return (i+1)+'. '+r.store_name+' 缺交 '+r.missing_count+' 提交率 '+r.submission_rate+'%'}).join('\n')}var missing=data.missing_staff||[];var drafts=data.draft_staff||[];var date=data.date||document.getElementById('dateTo').value;var lines=['【工作量日报提醒】','日期：'+date];if(!missing.length&&!drafts.length){lines.push('昨日工作量日报已全部提交。');return lines.join('\n')}if(missing.length){lines.push('未提交：'+missing.map(function(r){return r.staff_name||r.staff_id}).join('、'))}if(drafts.length){lines.push('草稿未提交：'+drafts.map(function(r){return r.staff_name||r.staff_id}).join('、'))}return lines.join('\n')}
function copyReminder(){var text=buildReminder();if(!text){setStatus('请先加载数据','err');return}navigator.clipboard.writeText(text).then(function(){setStatus('已复制','')}).catch(function(){fallbackCopy(text)})}
function fallbackCopy(text){var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();setStatus('已复制','')}
function listPeople(rows,empty,date){if(!rows.length)return '<div class="status">'+empty+'</div>';return rows.map(function(r){var staffId=Number(r.staff_id||0);var name=esc(r.staff_name||r.staff_id);return '<div style="padding:6px 0;font-size:12px;border-bottom:1px solid rgba(0,0,0,.04)"><span class="exception-item-link" onclick="openStaffDrawer('+staffId+',\''+esc(date||document.getElementById('dateTo').value)+'\')">'+name+'</span> <span style="color:var(--muted)">'+roleLabel(r.role_code||r.role||'')+(r.updated_at?' '+r.updated_at:'')+'</span></div>'}).join('')}
function statusBadge(status){if(status==='submitted')return'<span class="badge ok">已提交</span>';if(status==='draft')return'<span class="badge warn">草稿</span>';if(status==='missing')return'<span class="badge danger">未提交</span>';return'<span class="badge">'+esc(status||'-')+'</span>'}
function roleLabel(role){return{sales:'销售',coach:'教练',manager:'店长',operation:'运营',finance:'财务'}[role]||role}
function fmt(v){var n=Number(v||0);return Math.round(n*100)/100}
function unitLabel(unit){var map={count:'个',class:'节',minute:'分钟',minutes:'分钟',hour:'小时',hours:'小时',person:'人',people:'人',yuan:'元',percent:'%'};return esc(map[String(unit||'').toLowerCase()]||unit||'')}
function esc(v){return String(v==null?'':v).replace(/[&<>"]/g,function(s){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]})}
window.requirePageAuth({onAuthed:async(user)=>{const role=String(user&&user.role||'').toLowerCase();const canAccessWorkload=!!(user&&user.is_hq)||['admin','ceo','operation','finance','manager'].includes(role);if(!canAccessWorkload){window.location.replace('/internal.html');return}init()}});
</script>
