<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>工作量驾驶舱 - 追光小牛管理后台</title>
<script src="/internal-auth.js?v=7"></script>
<script src="/js/app-auth.js?v=2"></script>
<script src="/js/api-client.js?v=2"></script>
<style>
:root{--orange:#ff6b35;--ink:#1f1a17;--muted:#6b625c;--bg:#f6f4f1;--card:#fff;--line:rgba(0,0,0,.08);--danger:#b42318;--ok:#087443;--warn:#b76e00;--blue:#155eef}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink)}.top{background:#fff;border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}.brand{font-size:18px;font-weight:850}.nav{display:flex;gap:10px}.nav a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:700}.nav a.active{color:var(--orange)}.main{max-width:1280px;margin:0 auto;padding:22px}.hero{background:linear-gradient(135deg,#1f1a17,#44362e);color:#fff;border-radius:22px;padding:24px;margin-bottom:18px;display:flex;justify-content:space-between;gap:18px;align-items:flex-end}.hero h1{margin:0 0 8px;font-size:28px}.hero p{margin:0;color:rgba(255,255,255,.74)}.hero .stamp{font-size:12px;color:rgba(255,255,255,.75);text-align:right}.filters,.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 4px 14px rgba(0,0,0,.04)}.filters{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;align-items:end}.field label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin-bottom:6px}.field input,.field select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px}.btn{border:none;border-radius:10px;padding:11px 14px;background:var(--orange);color:#fff;font-weight:850;cursor:pointer}.btn.dark{background:#1f1a17}.btn.green{background:#087443}.kpis{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;margin-bottom:16px}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px}.stat .num{font-size:28px;font-weight:900;color:var(--orange)}.stat .num.ok{color:var(--ok)}.stat .num.danger{color:var(--danger)}.stat .label{font-size:12px;color:var(--muted);margin-top:4px}.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:16px}.section-title{font-size:16px;font-weight:850;margin-bottom:12px;display:flex;justify-content:space-between;gap:10px;align-items:center}.subtle{font-size:12px;color:var(--muted);font-weight:600}.mini-list{display:grid;gap:8px}.mini-item{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}.mini-item strong{display:block;font-size:14px}.mini-item span{display:block;color:var(--muted);font-size:12px;margin-top:4px}.badge{display:inline-block;border-radius:999px;padding:3px 8px;font-size:12px;background:#f0ece8;color:var(--muted);font-weight:800}.badge.ok{background:#e9f8ef;color:var(--ok)}.badge.warn{background:#fff4df;color:var(--warn)}.badge.danger{background:#fff1f3;color:var(--danger)}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{color:var(--muted);font-size:12px;background:#faf9f7}.click-row{cursor:pointer}.click-row:hover{background:#fff7f2}.link-cell{color:var(--orange);font-weight:850}.status{font-size:13px;color:var(--muted);margin-top:10px}.status.err{color:var(--danger)}.status.ok{color:var(--ok)}.bar{height:8px;background:#f0ece8;border-radius:999px;overflow:hidden;min-width:90px}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--orange),#ff9f1c);border-radius:999px}.trend{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.trend-day{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}.trend-day strong{font-size:13px}.trend-day .rate{font-size:20px;font-weight:900;color:var(--orange);margin-top:6px}.metric-groups{display:grid;grid-template-columns:1fr 1fr;gap:12px}.metric-card{border:1px solid var(--line);border-radius:14px;padding:12px}.metric-card h3{font-size:14px;margin:0 0 8px}.metric-row{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px dashed rgba(0,0,0,.07);font-size:13px}.metric-row:last-child{border-bottom:none}.metric-value{font-weight:900;color:var(--orange)}.hidden{display:none!important}.metric-detail{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:6px 14px}.metric-detail div{border-bottom:1px dashed var(--line);padding:5px 0}.evidence-warn{color:var(--danger);font-weight:900}.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:none}.drawer-overlay.show{display:block}.drawer{position:fixed;top:0;right:-480px;width:480px;max-width:100vw;height:100vh;background:#fff;z-index:101;transition:right .25s ease;overflow-y:auto;box-shadow:-4px 0 20px rgba(0,0,0,.12)}.drawer.show{right:0}.drawer-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.drawer-title{font-size:16px;font-weight:900}.drawer-close{border:none;background:#1f1a17;color:#fff;border-radius:12px;padding:6px 12px;font-weight:700;cursor:pointer}.drawer-body{padding:18px 20px}.drawer-date-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.drawer-date-tab{border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:800;background:#fff;color:var(--muted);cursor:pointer}.drawer-date-tab.selected{background:var(--orange);color:#fff;border-color:var(--orange)}.drawer-metrics{margin-bottom:16px}.drawer-metric-item{border-bottom:1px dashed var(--line);padding:10px 0;display:flex;justify-content:space-between;gap:12px;font-size:14px}.drawer-metric-name{font-weight:700}.drawer-metric-value{font-weight:900;color:var(--orange)}.drawer-remarks{background:#f6f4f1;border-radius:12px;padding:12px;margin-bottom:16px;font-size:13px;color:var(--ink)}.drawer-evidences-title{font-size:14px;font-weight:850;margin-bottom:10px}.drawer-evidences-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.drawer-evidence-item{border-radius:12px;overflow:hidden;background:#fff;border:1px solid var(--line);cursor:pointer}.drawer-evidence-item img{display:block;width:100%;height:120px;object-fit:cover;background:#f0ece8}.drawer-evidence-item .evidence-warn-text{padding:8px;font-size:11px;color:var(--danger);font-weight:800}.preview-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}.preview-modal.show{display:flex}.preview-img{max-width:100%;max-height:85vh;border-radius:16px;background:#111;box-shadow:0 12px 40px rgba(0,0,0,.4)}.preview-close{position:absolute;top:12px;right:12px;border:none;border-radius:999px;background:#fff;color:#111;width:36px;height:36px;font-size:18px;font-weight:800;cursor:pointer}@media(max-width:980px){.filters,.kpis,.grid,.metric-groups,.trend{grid-template-columns:1fr}.hero{display:block}.hero .stamp{text-align:left;margin-top:14px}.main{padding:14px}.drawer{width:100vw;right:-100vw}.drawer.show{right:0}.drawer-evidences-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header class="top"><div class="brand">工作量驾驶舱</div><nav class="nav"><a href="/admin/dashboard.html">后台首页</a><a class="active" href="/admin/workload.html">工作量</a><a href="/internal.html">工作台</a></nav></header>
<main class="main">
  <section class="hero"><div><h1>管理层工作量驾驶舱</h1><p>先看提交率、异常、门店排行，再下钻到门店日报和员工明细。</p></div><div class="stamp" id="rangeStamp">准备加载数据</div></section>
  <section class="filters">
    <div class="field"><label>开始日期</label><input type="date" id="dateFrom"></div>
    <div class="field"><label>结束日期</label><input type="date" id="dateTo"></div>
    <div class="field"><label>门店</label><select id="storeId"><option value="">全部门店</option></select></div>
    <div class="field"><label>查看模式</label><select id="mode"><option value="dashboard">驾驶舱</option><option value="store">门店日报</option><option value="hq">总部汇总</option></select></div>
    <button class="btn" onclick="loadData()">刷新数据</button>
    <button class="btn dark" onclick="exportCsv()">导出 CSV</button>
    <button class="btn green" onclick="copyReminder()">复制提醒</button>
  </section>
  <section class="kpis">
    <div class="stat"><div class="num" id="kpiRate">0%</div><div class="label">提交率</div></div>
    <div class="stat"><div class="num ok" id="kpiSubmitted">0</div><div class="label">已提交</div></div>
    <div class="stat"><div class="num danger" id="kpiMissing">0</div><div class="label">缺交</div></div>
    <div class="stat"><div class="num" id="kpiDraft">0</div><div class="label">草稿</div></div>
    <div class="stat"><div class="num" id="kpiExpected">0</div><div class="label">应交</div></div>
    <div class="stat"><div class="num" id="kpiAudit">0</div><div class="label">待审核</div></div>
    <div class="stat"><div class="num danger" id="kpiEvidence">0</div><div class="label">凭证异常</div></div>
  </section>
  <section id="dashboardView">
    <div class="grid">
      <section class="card"><div class="section-title">门店提交率排行 <span class="subtle">点击门店下钻</span></div><div id="storeRankWrap"></div></section>
      <section class="card"><div class="section-title">异常中心 <span class="subtle" id="exceptionCount">0 项</span></div><div id="exceptionWrap"></div></section>
    </div>
    <section class="card"><div class="section-title">近 7 日提交趋势</div><div class="trend" id="trendWrap"></div></section>
    <section class="card"><div class="section-title">岗位关键指标汇总 <span class="subtle">只统计已提交日报</span></div><div class="metric-groups" id="metricWrap"></div></section>
  </section>
  <section id="detailView" class="hidden">
    <section class="card" id="exceptionCards"></section>
    <section class="card"><div class="section-title">日报明细 / 汇总</div><div id="tableWrap"></div></section>
  </section>
  <div class="status" id="statusText">准备加载数据...</div>
</main>
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="staffDrawer">
  <div class="drawer-head"><div class="drawer-title" id="drawerTitle">员工工作量明细</div><button class="drawer-close" onclick="closeDrawer()">关闭</button></div>
  <div class="drawer-body">
    <div class="drawer-date-tabs" id="drawerDateTabs"></div>
    <div id="drawerContent"><div class="status">选择员工查看明细</div></div>
  </div>
</div>
<div class="preview-modal" id="previewModal" onclick="closePreview(event)">
  <button class="preview-close" onclick="closePreview(event)">×</button>
  <img class="preview-img" id="previewImg" alt="凭证预览">
</div>
<script>
var context=null,currentMode='dashboard',currentData=null,dashboardData=null,storeOptions=[];
var currentDrawerStaffId=null,currentDrawerDate=null;
function today(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function daysAgo(n){var d=new Date();d.setDate(d.getDate()-n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function setStatus(t,c){var el=document.getElementById('statusText');el.textContent=t;el.className='status '+(c||'')}
async function init(){document.getElementById('dateFrom').value=daysAgo(6);document.getElementById('dateTo').value=today();try{var res=await ApiClient.get('/api/common/context-info.php');context=res.data.context||{};await loadStores();if(context.store_id&&!context.is_hq&&!context.is_admin){document.getElementById('storeId').value=String(context.store_id);document.getElementById('storeId').disabled=true}await loadData()}catch(err){setStatus(err.message||'读取身份失败','err')}}
async function loadStores(){var select=document.getElementById('storeId');select.innerHTML='<option value="">全部门店</option>';try{var res=await ApiClient.get('/api/statistics/store.php?page_size=50');storeOptions=res.data&&Array.isArray(res.data.list)?res.data.list:[];if(context&&context.store_id&&!context.is_hq&&!context.is_admin){storeOptions=storeOptions.filter(function(s){return String(s.id)===String(context.store_id)})}renderStoreSelect()}catch(err){storeOptions=[];renderStoreSelect();setStatus('门店列表加载失败，将从工作量数据自动补齐','err')}}
function renderStoreSelect(){var select=document.getElementById('storeId');var selected=select.value;var locked=context&&context.store_id&&!context.is_hq&&!context.is_admin;select.innerHTML=(locked?'':'<option value="">全部门店</option>')+storeOptions.map(function(s){return'<option value="'+esc(s.id)+'">'+esc(s.name||('门店 '+s.id))+'</option>'}).join('');if(selected&&storeOptions.some(function(s){return String(s.id)===String(selected)}))select.value=selected}
function mergeStoreOptions(rows){var changed=false;(rows||[]).forEach(function(r){var id=r.store_id||r.id;if(!id)return;if(!storeOptions.some(function(s){return String(s.id)===String(id)})){storeOptions.push({id:id,name:r.store_name||r.name||('门店 '+id)});changed=true}});if(changed){storeOptions.sort(function(a,b){return Number(a.id||0)-Number(b.id||0)});renderStoreSelect()}}
async function loadData(){var mode=document.getElementById('mode').value;var from=document.getElementById('dateFrom').value;var to=document.getElementById('dateTo').value;var storeId=document.getElementById('storeId').value;currentMode=mode;if(mode==='store'&&!storeId){setStatus('请先选择门店再查看门店日报','err');return}setStatus('正在加载...');try{if(mode==='dashboard'){showDashboard();var url='/api/workload/dashboard.php?date_from='+encodeURIComponent(from)+'&date_to='+encodeURIComponent(to);if(storeId)url+='&store_id='+encodeURIComponent(storeId);var dash=await ApiClient.get(url);dashboardData=dash.data;currentData=dash.data;mergeStoreOptions(dash.data&&dash.data.store_rank_rows);renderDashboard(dash.data)}else{showDetail();if(mode==='hq'){var hqUrl='/api/workload/hq-summary.php?date_from='+encodeURIComponent(from)+'&date_to='+encodeURIComponent(to);var hq=await ApiClient.get(hqUrl);currentData=hq.data;mergeStoreOptions(hq.data&&hq.data.store_submission_rows);renderHq(hq.data)}else{var store=await ApiClient.get('/api/workload/store-summary.php?date='+encodeURIComponent(to)+'&store_id='+encodeURIComponent(storeId));currentData=store.data;renderStore(store.data)}}setStatus('数据已刷新','ok')}catch(err){setStatus(err.message||'加载失败','err')}}
function showDashboard(){document.getElementById('dashboardView').classList.remove('hidden');document.getElementById('detailView').classList.add('hidden')}
function showDetail(){document.getElementById('dashboardView').classList.add('hidden');document.getElementById('detailView').classList.remove('hidden')}
function renderDashboard(data){var k=data.kpis||{};document.getElementById('rangeStamp').textContent=(data.filters.date_from||'')+' 至 '+data.filters.date_to+' · '+getSelectedStoreName(data);setKpis(k);renderStoreRank(data.store_rank_rows||[]);renderExceptionsDashboard(data.exceptions||[]);renderTrend(data.trend_rows||[]);renderMetrics(data.metric_rows||[])}
function getSelectedStoreName(data){var filterStoreId=data&&data.filters?data.filters.store_id:document.getElementById('storeId').value;if(!filterStoreId)return '全部门店';var match=storeOptions.find(function(s){return String(s.id)===String(filterStoreId)});if(match)return match.name||('门店 '+match.id);var rows=data&&data.store_rank_rows?data.store_rank_rows:[];var row=rows.find(function(r){return String(r.store_id)===String(filterStoreId)});return row&&row.store_name?row.store_name:'门店 '+filterStoreId}
function setKpis(k){document.getElementById('kpiRate').textContent=(k.submission_rate||0)+'%';document.getElementById('kpiSubmitted').textContent=k.submitted_count||0;document.getElementById('kpiMissing').textContent=k.missing_count||0;document.getElementById('kpiDraft').textContent=k.draft_count||0;document.getElementById('kpiExpected').textContent=k.expected_count||0;document.getElementById('kpiAudit').textContent=k.pending_audit_count||0;document.getElementById('kpiEvidence').textContent=k.evidence_issue_count||0;document.getElementById('kpiRate').className=Number(k.submission_rate||0)>=90?'num ok':'num danger'}
function renderStoreRank(rows){if(!rows.length){document.getElementById('storeRankWrap').innerHTML='<div class="mini-item"><strong>暂无门店数据</strong><span>当前筛选范围没有应交员工</span></div>';return}document.getElementById('storeRankWrap').innerHTML='<table><thead><tr><th>门店</th><th>进度</th><th>应交</th><th>已交</th><th>草稿</th><th>缺交</th><th>提交率</th></tr></thead><tbody>'+rows.map(function(r){var rate=Number(r.submission_rate||0);return'<tr class="click-row" onclick="drillStore('+Number(r.store_id||0)+')"><td class="link-cell">'+esc(r.store_name||r.store_id)+'</td><td><div class="bar"><span style="width:'+Math.min(100,rate)+'%"></span></div></td><td>'+esc(r.expected_count)+'</td><td>'+esc(r.submitted_count)+'</td><td>'+esc(r.draft_count)+'</td><td>'+esc(r.missing_count)+'</td><td>'+rate+'%</td></tr>'}).join('')+'</tbody></table>'}
function renderExceptionsDashboard(rows){document.getElementById('exceptionCount').textContent=rows.length+' 项';if(!rows.length){document.getElementById('exceptionWrap').innerHTML='<div class="mini-item"><strong>暂无异常</strong><span>当前筛选范围内没有缺交、草稿或凭证异常</span></div>';return}var labels={missing:'未提交',draft:'草稿',evidence_missing:'凭证异常'};document.getElementById('exceptionWrap').innerHTML='<div class="mini-list">'+rows.slice(0,24).map(function(r){var cls=r.type==='missing'||r.type==='evidence_missing'?'danger':'warn';return'<div class="mini-item"><strong><span class="badge '+cls+'">'+esc(labels[r.type]||r.type)+'</span> '+esc(r.staff_name||r.staff_id)+'</strong><span>'+esc(r.date)+' · '+esc(r.store_name||r.store_id)+' · '+esc(r.role_code||'')+' · '+esc(r.message||'')+'</span></div>'}).join('')+'</div>'}
function renderTrend(rows){if(!rows.length){document.getElementById('trendWrap').innerHTML='';return}document.getElementById('trendWrap').innerHTML=rows.slice(-7).map(function(r){return'<div class="trend-day"><strong>'+esc(r.date)+'</strong><div class="rate">'+esc(r.submission_rate)+'%</div><div class="subtle">已交 '+esc(r.submitted_count)+' / 应交 '+esc(r.expected_count)+'</div><div class="subtle">缺交 '+esc(r.missing_count)+' · 草稿 '+esc(r.draft_count)+'</div></div>'}).join('')}
function renderMetrics(rows){if(!rows.length){document.getElementById('metricWrap').innerHTML='<div class="mini-item"><strong>暂无已提交指标</strong><span>草稿数据不会进入经营指标汇总</span></div>';return}var groups={};rows.forEach(function(r){var role=r.role_code||'其他';if(!groups[role])groups[role]=[];groups[role].push(r)});document.getElementById('metricWrap').innerHTML=Object.keys(groups).map(function(role){return'<div class="metric-card"><h3>'+roleLabel(role)+'</h3>'+groups[role].map(function(r){return'<div class="metric-row"><span>'+esc(r.metric_name||r.metric_code)+'</span><span class="metric-value">'+fmt(r.metric_value)+' '+esc(r.unit||'')+'</span></div>'}).join('')+'</div>'}).join('')}
function renderStore(data){var reports=data.reports||[];var roles=data.role_summary||[];var metricCount=roles.reduce(function(n,r){return n+(r.metrics||[]).length},0);setLegacyStats(data.expected_count||reports.length,data.submitted_count||0,roles.length,metricCount,(data.submission_rate||0)+'%');renderStoreExceptions(data);var date=data.date||document.getElementById('dateTo').value;document.getElementById('tableWrap').innerHTML='<table><thead><tr><th>员工</th><th>门店</th><th>岗位</th><th>状态</th><th>更新时间</th><th>凭证</th></tr></thead><tbody>'+reports.map(function(r){return'<tr class="click-row" onclick="openStaffDrawer('+Number(r.staff_id||0)+',\''+esc(date)+'\')"><td class="link-cell">'+esc(r.staff_name||r.staff_id)+'</td><td>'+esc(r.store_name||r.store_id)+'</td><td>'+roleLabel(r.role_code)+'</td><td>'+statusBadge(r.submit_status)+'</td><td>'+esc(r.updated_at||'')+'</td><td>'+renderEvidenceCount(r.evidences||[])+'</td></tr>'}).join('')+'</tbody></table>'}
function renderEvidenceCount(list){if(!list.length)return'<span class="subtle">无</span>';var warnCount=list.filter(function(e){return Number(e.file_size||0)>0&&Number(e.file_size||0)<1024}).length;return'<span class="badge ok">'+list.length+' 张</span>'+warnCount?'<span class="badge danger">'+warnCount+' 异常</span>':''}
function renderHq(data){var rows=data.summary_rows||[];var metrics=data.metric_rows||[];var storeRows=data.store_submission_rows||[];var expected=storeRows.reduce(function(n,r){return n+Number(r.expected_count||0)},0);var submitted=storeRows.reduce(function(n,r){return n+Number(r.submitted_count||0)},0);var rate=expected>0?Math.round(submitted*1000/expected)/10:0;setLegacyStats(expected,submitted,new Set(rows.map(function(r){return r.role_code})).size,metrics.length,rate+'%');document.getElementById('exceptionCards').innerHTML='<div class="section-title">门店提交率排行</div><div id="hqStoreRank"></div>';document.getElementById('hqStoreRank').innerHTML='';renderStoreRankInto('hqStoreRank',storeRows);document.getElementById('tableWrap').innerHTML='<table><thead><tr><th>日期</th><th>门店</th><th>岗位</th><th>状态</th><th>日报数</th></tr></thead><tbody>'+rows.map(function(r){return'<tr><td>'+esc(r.report_date)+'</td><td>'+esc(r.store_name||r.store_id)+'</td><td>'+esc(r.role_code)+'</td><td>'+statusBadge(r.submit_status)+'</td><td>'+esc(r.report_count)+'</td></tr>'}).join('')+'</tbody></table>'}
function renderStoreRankInto(id,rows){var target=document.getElementById(id);target.innerHTML='<table><thead><tr><th>门店</th><th>应交</th><th>已交</th><th>草稿</th><th>缺交</th><th>提交率</th></tr></thead><tbody>'+rows.map(function(r){return'<tr class="click-row" onclick="drillStore('+Number(r.store_id||0)+')"><td class="link-cell">'+esc(r.store_name||r.store_id)+'</td><td>'+esc(r.expected_count)+'</td><td>'+esc(r.submitted_count)+'</td><td>'+esc(r.draft_count)+'</td><td>'+esc(r.missing_count)+'</td><td>'+esc(r.submission_rate)+'%</td></tr>'}).join('')+'</tbody></table>'}
function renderStoreExceptions(data){var missing=data.missing_staff||[];var drafts=data.draft_staff||[];document.getElementById('exceptionCards').innerHTML='<div class="grid"><section><div class="section-title">未提交名单 <span class="badge danger">'+(data.missing_count||missing.length)+'</span></div><div class="mini-list">'+listPeople(missing,'当前没有未提交',data.date||document.getElementById('dateTo').value)+'</div></section><section><div class="section-title">草稿未提交 <span class="badge warn">'+(data.draft_count||drafts.length)+'</span></div><div class="mini-list">'+listPeople(drafts,'暂无草稿',data.date||document.getElementById('dateTo').value)+'</div></section></div>'}
function openStaffDrawer(staffId,date){currentDrawerStaffId=staffId;currentDrawerDate=date;document.getElementById('drawerOverlay').classList.add('show');document.getElementById('staffDrawer').classList.add('show');loadStaffDetail(staffId,date)}
function closeDrawer(){document.getElementById('drawerOverlay').classList.remove('show');document.getElementById('staffDrawer').classList.remove('show');currentDrawerStaffId=null;currentDrawerDate=null}
async function loadStaffDetail(staffId,date){document.getElementById('drawerTitle').textContent='正在加载...';document.getElementById('drawerDateTabs').innerHTML='';document.getElementById('drawerContent').innerHTML='<div class="status">正在加载员工明细...</div>';try{var res=await ApiClient.get('/api/workload/staff-detail.php?staff_id='+staffId+'&date='+encodeURIComponent(date));renderStaffDetail(res.data)}catch(err){document.getElementById('drawerContent').innerHTML='<div class="status err">'+esc(err.message||'加载失败')+'</div>'}}
function renderStaffDetail(data){var staff=data.staff||{};document.getElementById('drawerTitle').textContent=esc(staff.staff_name||'员工')+' · '+roleLabel(staff.role_code||'')+' · '+esc(staff.store_name||'');renderDrawerDateTabs(data.recent_days||[],data.date);var values=data.values||[];var evidences=data.evidences||[];var remarks=data.remarks||'';var status=data.submit_status||'missing';var metricsHtml=values.length?'<div class="drawer-metrics">'+values.map(function(v){return'<div class="drawer-metric-item"><span class="drawer-metric-name">'+esc(v.metric_name||v.metric_code)+':</span><span class="drawer-metric-value">'+fmt(v.numeric_value)+' '+unitLabel(v.unit||'')+'</span></div>'}).join('')+'</div>':'<div class="subtle">无指标</div>';var remarksHtml=remarks?'<div class="drawer-remarks">备注：'+esc(remarks)+'</div>':'';var evidencesHtml='';if(evidences.length){var grid=evidences.map(function(e,i){var warn=Number(e.file_size||0)>0&&Number(e.file_size||0)<1024;var warnText=warn?'<div class="evidence-warn-text">文件异常，请重新上传</div>':'';return'<div class="drawer-evidence-item" onclick="openPreview(\''+esc(e.file_url)+'\')"><img src="'+esc(e.file_url)+'" alt="凭证'+(i+1)+'">'+warnText+'</div>'}).join('');evidencesHtml='<div class="drawer-evidences-title">凭证图片 '+evidences.length+' 张</div><div class="drawer-evidences-grid">'+grid+'</div>'}else{evidencesHtml='<div class="drawer-evidences-title">凭证图片</div><div class="subtle">无凭证</div>'}document.getElementById('drawerContent').innerHTML=statusBadge(status)+metricsHtml+remarksHtml+evidencesHtml}
function renderDrawerDateTabs(rows,selectedDate){if(!rows.length)return;document.getElementById('drawerDateTabs').innerHTML=rows.map(function(r){var cls=r.date===selectedDate?'selected':'';return'<button class="drawer-date-tab '+cls+'" onclick="loadStaffDetail('+currentDrawerStaffId+',\''+esc(r.date)+'\')">'+esc(r.date)+' '+statusBadgeMini(r.status)+'</button>'}).join('')}
function statusBadgeMini(status){if(status==='submitted')return'已交';if(status==='draft')return'草稿';if(status==='missing')return'缺';return status||'-'}
function openPreview(url){document.getElementById('previewImg').src=url;document.getElementById('previewModal').classList.add('show')}
function closePreview(event){if(event)event.stopPropagation();document.getElementById('previewModal').classList.remove('show');document.getElementById('previewImg').src=''}
function drillStore(storeId){if(!storeId)return;document.getElementById('storeId').value=String(storeId);document.getElementById('mode').value='store';loadData()}
function exportCsv(){if(!currentData){setStatus('请先加载数据再导出','err');return}var rows=[],name='workload';if(currentMode==='dashboard'){rows=[['门店ID','门店','应交','已交','草稿','缺交','提交率']].concat((currentData.store_rank_rows||[]).map(function(r){return[r.store_id,r.store_name,r.expected_count,r.submitted_count,r.draft_count,r.missing_count,(r.submission_rate||0)+'%']}));name='workload-dashboard-'+document.getElementById('dateFrom').value+'-'+document.getElementById('dateTo').value}else if(currentMode==='hq'){rows=[['门店ID','门店','应交','已交','草稿','缺交','提交率']].concat((currentData.store_submission_rows||[]).map(function(r){return[r.store_id,r.store_name,r.expected_count,r.submitted_count,r.draft_count,r.missing_count,(r.submission_rate||0)+'%']}));name='workload-hq-'+document.getElementById('dateFrom').value+'-'+document.getElementById('dateTo').value}else{rows=[['类型','员工ID','姓名','岗位','状态/说明','更新时间']];(currentData.missing_staff||[]).forEach(function(r){rows.push(['未提交',r.staff_id,r.staff_name,r.role_code,'未提交',''])});(currentData.draft_staff||[]).forEach(function(r){rows.push(['草稿',r.staff_id,r.staff_name,r.role_code,'草稿',r.updated_at||''])});(currentData.reports||[]).forEach(function(r){rows.push(['日报',r.staff_id,r.staff_name,r.role_code,r.submit_status,r.updated_at||''])});name='workload-store-'+(currentData.store_id||document.getElementById('storeId').value)+'-'+(currentData.date||document.getElementById('dateTo').value)}downloadCsv(name+'.csv',rows)}
function downloadCsv(filename,rows){var csv='\ufeff'+rows.map(function(row){return row.map(function(cell){var v=String(cell==null?'':cell);return '"'+v.replace(/"/g,'""')+'"'}).join(',')}).join('\n');var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);setStatus('CSV 已生成','ok')}
function buildReminder(){var data=currentData;if(!data)return '';if(currentMode==='dashboard'){var rows=data.store_rank_rows||[];var weak=rows.filter(function(r){return Number(r.missing_count||0)>0}).slice(0,8);if(!weak.length)return '当前工作量日报已全部提交。';return '【工作量日报提醒】\n以下门店仍有缺交，请店长今天内跟进提交：\n'+weak.map(function(r,i){return (i+1)+'. '+(r.store_name||r.store_id)+'：缺交 '+r.missing_count+'，提交率 '+r.submission_rate+'%'}).join('\n')}if(currentMode==='hq'){var hqRows=data.store_submission_rows||[];var hqWeak=hqRows.filter(function(r){return Number(r.missing_count||0)>0}).slice(0,8);if(!hqWeak.length)return '当前各门店工作量日报已全部提交。';return '【工作量日报提醒】\n以下门店仍有缺交，请店长今天内跟进提交：\n'+hqWeak.map(function(r,i){return (i+1)+'. '+(r.store_name||r.store_id)+'：缺交 '+r.missing_count+'，提交率 '+r.submission_rate+'%'}).join('\n')}var missing=data.missing_staff||[];var drafts=data.draft_staff||[];var date=data.date||document.getElementById('dateTo').value;var lines=['【工作量日报提醒】','日期：'+date];if(!missing.length&&!drafts.length){lines.push('今日工作量日报已全部提交，辛苦大家。');return lines.join('\n')}if(missing.length){lines.push('未提交：'+missing.map(function(r){return r.staff_name||r.staff_id}).join('、'))}if(drafts.length){lines.push('草稿未提交：'+drafts.map(function(r){return r.staff_name||r.staff_id}).join('、'))}lines.push('请以上同事今天内完成提交，店长请跟进确认。');return lines.join('\n')}
function copyReminder(){var text=buildReminder();if(!text){setStatus('请先加载数据再复制提醒','err');return}if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){setStatus('提醒文案已复制','ok')}).catch(function(){fallbackCopy(text)})}else{fallbackCopy(text)}}
function fallbackCopy(text){var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');setStatus('提醒文案已复制','ok')}catch(e){setStatus('复制失败，请手动复制：'+text,'err')}ta.remove()}
function listPeople(rows,empty,date){if(!rows.length)return '<div class="mini-item"><strong>'+esc(empty)+'</strong><span>当前无需处理</span></div>';return rows.map(function(r){var staffId=Number(r.staff_id||0);return '<div class="mini-item"><strong><button type="button" class="link-cell" style="border:none;background:none;padding:0" onclick="openStaffDrawer('+staffId+',\''+esc(date||document.getElementById('dateTo').value)+'\')">'+esc(r.staff_name||r.staff_id)+'</button></strong><span>'+roleLabel(r.role_code||r.role||'')+(r.updated_at?' · '+esc(r.updated_at):'')+'</span></div>'}).join('')}
function setLegacyStats(expected,submitted,roles,metrics,rate){setKpis({expected_count:expected,submitted_count:submitted,missing_count:Math.max(0,Number(expected||0)-Number(submitted||0)),draft_count:0,submission_rate:parseFloat(rate)||0,pending_audit_count:roles,evidence_issue_count:metrics})}
function statusBadge(status){if(status==='submitted')return'<span class="badge ok">已提交</span>';if(status==='draft')return'<span class="badge warn">草稿</span>';if(status==='missing')return'<span class="badge danger">未提交</span>';return'<span class="badge">'+esc(status||'-')+'</span>'}
function roleLabel(role){return{sales:'销售',coach:'教练',manager:'店长',operation:'运营',finance:'财务'}[role]||role}
function fmt(v){var n=Number(v||0);return Math.round(n*100)/100}
function unitLabel(unit){var map={count:'个',class:'节',minute:'分钟',minutes:'分钟',hour:'小时',hours:'小时',person:'人',people:'人',yuan:'元',percent:'%'};return esc(map[String(unit||'').toLowerCase()]||unit||'')}
function esc(v){return String(v==null?'':v).replace(/[&<>"]/g,function(s){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]})}
window.requirePageAuth({onAuthed:async(user)=>{const role=String(user&&user.role||'').toLowerCase();const canAccessWorkload=!!(user&&user.is_hq)||['admin','ceo','operation','finance','manager'].includes(role);if(!canAccessWorkload){window.location.replace('/internal.html');return}init()}});
</script>
