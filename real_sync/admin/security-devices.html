<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>追光小牛 · 设备安全中心</title><style>:root{--bg:#f5f1ea;--panel:#fff;--ink:#1f1a17;--muted:#6b625c;--line:rgba(31,26,23,.08);--brand:#ff6b35;--danger:#d35454}*{box-sizing:border-box}body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#faf7f2 0,#f1ece5 100%);color:var(--ink)}a{text-decoration:none;color:inherit}.shell{width:min(calc(100% - 32px),1380px);margin:0 auto}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:20px 0 10px}.title h1{margin:0;font-size:24px}.title p{margin:6px 0 0;color:var(--muted);font-size:13px}.nav{display:flex;flex-wrap:wrap;gap:8px}.nav a{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.84);border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--muted)}.nav a.current{background:var(--brand);border-color:var(--brand);color:#fff}.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-top:16px}.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 12px 28px rgba(31,26,23,.04)}.metric .label{font-size:13px;color:var(--muted)}.metric .value{margin-top:10px;font-size:30px;font-weight:800}.layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}.panel-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.panel-title h3{margin:0;font-size:18px}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}.table th{font-size:12px;color:var(--muted)}.empty,.error{padding:18px;border-radius:14px;background:#fbf8f4;color:var(--muted)}.error{background:#fff1f1;color:var(--danger)}@media (max-width:960px){.cards,.layout{grid-template-columns:1fr}.nav{display:none}.shell{width:min(calc(100% - 20px),1380px)}}</style><script>window.__SKIP_AUTO_INTERNAL_AUTH__=true;</script><script src="/internal-auth.js?v=7"></script></head><body><div class="shell"><header class="topbar"><div class="title"><h1>设备安全中心</h1><p>复用现有设备预警与使用统计接口，汇总多设备账号与设备使用情况。</p></div><nav class="nav"><a href="/admin/system-dashboard.html">系统后台</a><a href="/admin/security-login-audit.html">登录审计</a><a class="current" href="/admin/security-devices.html">设备安全</a><a href="/admin/staffs.html">员工权限</a><a href="/admin/system-errors.html">系统异常</a><a href="/admin/operation-logs.html">操作日志</a></nav></header><section class="cards" id="summaryCards"></section><section class="layout"><article class="card"><div class="panel-title"><h3>风险预警</h3><span>v_device_security_alert</span></div><table class="table"><thead><tr><th>员工</th><th>门店</th><th>设备数</th><th>最近登录</th><th>风险等级</th></tr></thead><tbody id="alertBody"></tbody></table></article><article class="card"><div class="panel-title"><h3>设备使用</h3><span>v_device_usage_stats</span></div><table class="table"><thead><tr><th>员工</th><th>门店</th><th>设备数</th><th>总登录</th><th>信任设备</th><th>最近登录</th></tr></thead><tbody id="usageBody"></tbody></table></article></section></div><script>function e(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}function authFetch(url){return fetch(url,{headers:window.authHeaders?window.authHeaders():{},cache:'no-store'})}function renderMetric(alerts,usage){const risky=alerts.filter(item=>Number(item.device_count||0)>=5).length;const fresh=usage.filter(item=>item.last_login&&String(item.last_login).slice(0,10)===new Date().toISOString().slice(0,10)).length;document.getElementById('summaryCards').innerHTML=[['多设备账号',alerts.length],['新近活跃账号',fresh],['高风险账号',risky]].map(([label,value])=>`<article class="card metric"><div class="label">${e(label)}</div><div class="value">${e(value||0)}</div></article>`).join('')}function renderTable(id,list,mapper,cols){const root=document.getElementById(id);if(!list.length){root.innerHTML=`<tr><td colspan="${cols}"><div class="empty">暂无数据</div></td></tr>`;return}root.innerHTML=list.map(mapper).join('')}window.requirePageAuth({onAuthed:async(user)=>{const role=String(user?.role||'').toLowerCase();const isSuperAdmin=!!user?.is_admin||['admin','ceo'].includes(role);if(!isSuperAdmin){window.location.replace('/internal.html');return}try{const [a,u]=await Promise.all([authFetch('/api/statistics/device.php?view=alerts'),authFetch('/api/statistics/device.php?view=usage')]);const ar=await a.json(),ur=await u.json();if(!a.ok||ar.code!==0)throw new Error(ar.message||'预警加载失败');if(!u.ok||ur.code!==0)throw new Error(ur.message||'使用统计加载失败');const alerts=ar.data?.alerts||[];const usage=ur.data?.usage||[];renderMetric(alerts,usage);renderTable('alertBody',alerts,item=>`<tr><td>${e(item.staff_name||'-')}</td><td>${e(item.store_name||'-')}</td><td>${e(item.device_count||0)}</td><td>${e(item.last_login||'-')}</td><td>${Number(item.device_count||0)>=5?'高':'中'}</td></tr>`,5);renderTable('usageBody',usage,item=>`<tr><td>${e(item.staff_name||'-')}</td><td>${e(item.store_name||'-')}</td><td>${e(item.unique_devices||0)}</td><td>${e(item.total_logins||0)}</td><td>${e(item.trusted_count||0)}</td><td>${e(item.last_login||'-')}</td></tr>`,6)}catch(err){document.getElementById('summaryCards').innerHTML=`<article class="card"><div class="error">${e(err.message||'加载失败')}</div></article>`;document.getElementById('alertBody').innerHTML=`<tr><td colspan="5"><div class="error">${e(err.message||'加载失败')}</div></td></tr>`;document.getElementById('usageBody').innerHTML=`<tr><td colspan="6"><div class="error">${e(err.message||'加载失败')}</div></td></tr>`}}})</script></body></html>
