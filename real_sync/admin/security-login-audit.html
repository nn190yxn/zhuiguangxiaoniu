<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>追光小牛 · 登录审计</title><style>:root{--bg:#f5f1ea;--panel:#fff;--ink:#1f1a17;--muted:#6b625c;--line:rgba(31,26,23,.08);--brand:#ff6b35;--danger:#d35454}*{box-sizing:border-box}body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#faf7f2 0,#f1ece5 100%);color:var(--ink)}a{text-decoration:none;color:inherit}button,input,select{font:inherit}.shell{width:min(calc(100% - 32px),1380px);margin:0 auto}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:20px 0 10px}.title h1{margin:0;font-size:24px}.title p{margin:6px 0 0;color:var(--muted);font-size:13px}.nav{display:flex;flex-wrap:wrap;gap:8px}.nav a{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.84);border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--muted)}.nav a.current{background:var(--brand);border-color:var(--brand);color:#fff}.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 12px 28px rgba(31,26,23,.04)}.toolbar{display:grid;grid-template-columns:repeat(6,minmax(0,1fr)) auto;gap:12px;margin-top:16px}.field{display:grid;gap:6px}.field label{font-size:12px;color:var(--muted)}.field input,.field select{height:42px;border:1px solid var(--line);border-radius:12px;padding:0 12px}.btn{height:42px;border:0;border-radius:12px;padding:0 16px;background:var(--brand);color:#fff;font-weight:700;cursor:pointer}.btn.secondary{height:34px;padding:0 12px;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px}.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-top:16px}.metric .label{font-size:13px;color:var(--muted)}.metric .value{margin-top:10px;font-size:30px;font-weight:800}.layout{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;margin-top:16px}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}.table th{font-size:12px;color:var(--muted)}.empty,.error{padding:18px;border-radius:14px;background:#fbf8f4;color:var(--muted)}.error{background:#fff1f1;color:var(--danger)}.panel-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.panel-title h3{margin:0;font-size:18px}.panel-title span{font-size:12px;color:var(--muted)}.detail-grid{display:grid;gap:12px}.info{padding:12px 14px;border-radius:14px;background:#fbf8f4}.info strong{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}.list{display:grid;gap:10px}.list-item{padding:12px 14px;border-radius:14px;background:#fbf8f4}.list-item-title{font-weight:700}.list-item-sub{margin-top:4px;color:var(--muted);font-size:12px}@media (max-width:1180px){.toolbar,.cards,.layout{grid-template-columns:1fr 1fr}}@media (max-width:780px){.toolbar,.cards,.layout{grid-template-columns:1fr}.nav{display:none}.shell{width:min(calc(100% - 20px),1380px)}}</style><script>window.__SKIP_AUTO_INTERNAL_AUTH__=true;</script><script src="/internal-auth.js?v=8"></script></head><body><div class="shell"><header class="topbar"><div class="title"><h1>登录审计</h1><p>按时间、来源、状态、员工和门店查看登录行为，并联动员工安全详情。</p></div><nav class="nav"><a href="/admin/system-dashboard.html">系统后台</a><a class="current" href="/admin/security-login-audit.html">登录审计</a><a href="/admin/security-devices.html">设备安全</a><a href="/admin/staffs.html">员工权限</a><a href="/admin/system-errors.html">系统异常</a><a href="/admin/operation-logs.html">操作日志</a></nav></header><section class="card"><div class="toolbar"><div class="field"><label>开始日期</label><input id="dateFrom" type="date" /></div><div class="field"><label>结束日期</label><input id="dateTo" type="date" /></div><div class="field"><label>登录类型</label><input id="loginType" placeholder="password / wxlogin" /></div><div class="field"><label>状态</label><select id="loginStatus"><option value="">全部</option><option value="success">success</option><option value="failure">failure</option></select></div><div class="field"><label>来源</label><input id="source" placeholder="mobile / admin" /></div><div class="field"><label>员工 ID</label><input id="staffId" placeholder="例如 46" /></div><div class="field"><label>门店</label><select id="storeId"><option value="">全部门店</option></select></div><button class="btn" id="reloadBtn">刷新</button></div></section><section class="cards" id="summaryCards"></section><section class="layout"><article class="card"><div class="panel-title"><h3>审计记录</h3><span>点击查看详情</span></div><table class="table"><thead><tr><th>时间</th><th>员工</th><th>门店</th><th>登录类型</th><th>状态</th><th>来源</th><th>IP</th><th>结果说明</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table></article><aside class="card"><div class="panel-title"><h3>详情联动</h3><span>审计记录 + 员工详情</span></div><div id="detailRoot" class="detail-grid"><div class="empty">选择一条审计记录后显示详情。</div></div></aside></section></div><script>let auditList=[];function e(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}function authFetch(url){return fetch(url,{headers:window.authHeaders?window.authHeaders():{},cache:'no-store'})}function renderSummary(s){document.getElementById('summaryCards').innerHTML=[['今日成功登录',s.today_login_success],['今日失败登录',s.today_login_failure],['今日新设备',s.new_device_count],['今日风险登录',s.risk_login_count]].map(([label,value])=>`<article class="card metric"><div class="label">${e(label)}</div><div class="value">${e(value||0)}</div></article>`).join('')}function renderTable(list){auditList=Array.isArray(list)?list:[];const root=document.getElementById('tableBody');if(!auditList.length){root.innerHTML='<tr><td colspan="9"><div class="empty">暂无审计记录</div></td></tr>';return}root.innerHTML=auditList.map((item,index)=>`<tr><td>${e(item.created_at||'-')}</td><td>${e(item.staff_name||'-')}</td><td>${e(item.store_name||'-')}</td><td>${e(item.login_type||'-')}</td><td>${e(item.login_status||'-')}</td><td>${e(item.source||'-')}</td><td>${e(item.ip_address||'-')}</td><td>${e(item.message||'-')} / ${e(item.risk_level||'normal')} / ${Number(item.is_new_device||0)?'新设备':'常用设备'} / ${e(item.device_id||'-')}</td><td><button class="btn secondary" data-index="${index}">查看详情</button></td></tr>`).join('');root.querySelectorAll('button[data-index]').forEach(btn=>btn.onclick=()=>showAuditDetail(Number(btn.dataset.index)))}function renderDetailPanel(audit,staffDetail){const item=staffDetail?.item||null;const devices=staffDetail?.devices||[];const audits=staffDetail?.recent_login_audits||[];document.getElementById('detailRoot').innerHTML=`<div class="info"><strong>当前审计记录</strong><div>${e(audit?.created_at||'-')} · ${e(audit?.login_status||'-')} · ${e(audit?.login_type||'-')}</div><div class="list-item-sub">${e(audit?.source||'-')} · ${e(audit?.ip_address||'-')} · ${e(audit?.message||'-')} · 风险:${e(audit?.risk_level||'normal')} · 设备:${e(audit?.device_id||'-')}</div></div>${item?`<div class="info"><strong>员工信息</strong><div>${e(item.name||'-')} · ${e(item.employee_no||'-')}</div><div class="list-item-sub">${e(item.store_name||'-')} · ${e(item.phone||'-')} · ${e(item.role||'-')} · 微信${e(item.wechat_bound_text||'-')}</div></div><div class="info"><strong>设备概况</strong><div>设备 ${e(staffDetail?.device_stats?.total_devices||0)} 台，信任 ${e(staffDetail?.device_stats?.trusted_devices||0)} 台</div><div class="list-item-sub">最近登录：${e(staffDetail?.device_stats?.recent_login||'暂无')}</div></div><div class="info"><strong>最近设备</strong><div class="list">${devices.length?devices.slice(0,4).map(d=>`<div class="list-item"><div class="list-item-title">${e(d.device_model||d.device_name||'未知设备')}</div><div class="list-item-sub">${e(d.last_ip||'-')} · ${e(d.last_login||'-')} · ${Number(d.is_trusted||0)===1?'信任':'未信任'}</div></div>`).join(''):'<div class="empty">暂无设备记录</div>'}</div></div><div class="info"><strong>最近登录记录</strong><div class="list">${audits.length?audits.slice(0,4).map(a=>`<div class="list-item"><div class="list-item-title">${e(a.login_status||'-')} · ${e(a.login_type||'-')}</div><div class="list-item-sub">${e(a.created_at||'-')} · ${e(a.ip_address||'-')} · ${e(a.message||'-')}</div></div>`).join(''):'<div class="empty">暂无最近登录记录</div>'}</div></div><div class="info"><strong>快捷入口</strong><div><a href="/admin/staffs.html">前往员工与权限管理</a></div></div>`:'<div class="empty">该条记录未关联员工档案，无法加载员工详情。</div>'}`}
let storeOptions=[];async function loadStores(){const response=await authFetch('/api/statistics/store.php?page_size=50');const result=await response.json();if(!response.ok||result.code!==0)throw new Error(result.message||'门店列表加载失败');storeOptions=result.data?.list||[];document.getElementById('storeId').innerHTML='<option value="">全部门店</option>'+storeOptions.map(item=>`<option value="${e(item.id)}">${e(item.name||('门店 '+item.id))}</option>`).join('')}async function showAuditDetail(index){const audit=auditList[index];if(!audit){return}if(!audit.staff_id){renderDetailPanel(audit,null);return}const response=await authFetch('/api/admin/staff/detail.php?staff_id='+encodeURIComponent(audit.staff_id));const result=await response.json();if(!response.ok||result.code!==0){renderDetailPanel(audit,null);return}renderDetailPanel(audit,result.data||null)}async function load(){const qs=new URLSearchParams();if(document.getElementById('dateFrom').value)qs.set('date_from',document.getElementById('dateFrom').value);if(document.getElementById('dateTo').value)qs.set('date_to',document.getElementById('dateTo').value);if(document.getElementById('loginType').value.trim())qs.set('login_type',document.getElementById('loginType').value.trim());if(document.getElementById('loginStatus').value)qs.set('login_status',document.getElementById('loginStatus').value);if(document.getElementById('source').value.trim())qs.set('source',document.getElementById('source').value.trim());if(document.getElementById('staffId').value.trim())qs.set('staff_id',document.getElementById('staffId').value.trim());if(document.getElementById('storeId').value)qs.set('store_id',document.getElementById('storeId').value);const response=await authFetch('/api/admin/security/login-audit.php?'+qs.toString());const result=await response.json();if(!response.ok||result.code!==0)throw new Error(result.message||'加载失败');renderSummary(result.data?.summary||{});renderTable(result.data?.list||[]);document.getElementById('detailRoot').innerHTML='<div class="empty">选择一条审计记录后显示详情。</div>'}window.requirePageAuth({onAuthed:async(user)=>{const role=String(user?.role||'').toLowerCase();const isSuperAdmin=!!user?.is_admin||['admin','ceo'].includes(role);if(!isSuperAdmin){window.location.replace('/internal.html');return}document.getElementById('reloadBtn').onclick=()=>load().catch(err=>{document.getElementById('tableBody').innerHTML=`<tr><td colspan="9"><div class="error">${e(err.message||'加载失败')}</div></td></tr>`;document.getElementById('detailRoot').innerHTML=`<div class="error">${e(err.message||'加载失败')}</div>`});const now=new Date(),past=new Date(Date.now()-6*86400000);document.getElementById('dateTo').value=now.toISOString().slice(0,10);document.getElementById('dateFrom').value=past.toISOString().slice(0,10);await loadStores();await load()}})</script></body></html>
