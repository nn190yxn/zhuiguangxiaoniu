<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>追光小牛 · 员工与权限管理</title>
    <style>
      :root{--bg:#f5f1ea;--panel:#fff;--ink:#1f1a17;--muted:#6b625c;--line:rgba(31,26,23,.08);--brand:#ff6b35;--soft:#fff3ec;--danger:#d35454}
      *{box-sizing:border-box}body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#faf7f2 0,#f1ece5 100%);color:var(--ink)}a{text-decoration:none;color:inherit}button,input,select{font:inherit}
      .shell{width:min(calc(100% - 32px),1380px);margin:0 auto}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:20px 0 10px}.title h1{margin:0;font-size:24px}.title p{margin:6px 0 0;color:var(--muted);font-size:13px}.nav{display:flex;flex-wrap:wrap;gap:8px}.nav a{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.84);border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--muted)}.nav a.current{background:var(--brand);border-color:var(--brand);color:#fff}
      .card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 12px 28px rgba(31,26,23,.04)}.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-top:10px}.hero-main{background:linear-gradient(135deg,#1f1a17,#4a3124 60%,#8c472a 100%);color:#fff}.hero-main h2{margin:0;font-size:28px}.hero-main p{margin:10px 0 0;color:rgba(255,255,255,.76);line-height:1.7;font-size:14px}.hero-side{display:grid;gap:12px}.meta strong{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
      .toolbar{display:grid;grid-template-columns:repeat(4,minmax(0,1fr)) auto;gap:12px;margin-top:16px}.field{display:grid;gap:6px}.field label{font-size:12px;color:var(--muted)}.field input,.field select{height:42px;border:1px solid var(--line);border-radius:12px;padding:0 12px;background:#fff}.btn{height:42px;border:0;border-radius:12px;padding:0 16px;background:var(--brand);color:#fff;font-weight:700;cursor:pointer}.btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}
      .layout{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-top:16px}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}.table th{font-size:12px;color:var(--muted);font-weight:700}.table tr:hover{background:#fcfaf7}.chip{display:inline-flex;padding:4px 10px;border-radius:999px;background:var(--soft);color:var(--brand);font-size:12px;font-weight:700}.muted{color:var(--muted)}.empty,.error{padding:18px;border-radius:14px;background:#fbf8f4;color:var(--muted)}.error{background:#fff1f1;color:var(--danger)}
      .detail-grid{display:grid;gap:12px}.info{padding:12px 14px;border-radius:14px;background:#fbf8f4}.info strong{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}.detail-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.detail-actions button{height:40px;border-radius:12px;border:1px solid var(--line);background:#fff;cursor:pointer;font-weight:700}.list{display:grid;gap:10px}.list-item{padding:12px 14px;border-radius:14px;background:#fbf8f4}.list-item-title{font-weight:700}.list-item-sub{margin-top:4px;color:var(--muted);font-size:12px}.edit-form{display:grid;grid-template-columns:1fr 1fr;gap:10px}.edit-form .field{display:grid;gap:6px}.edit-form input,.edit-form select{height:40px;border:1px solid var(--line);border-radius:12px;padding:0 12px;background:#fff}.edit-form .full{grid-column:1 / -1}
      @media (max-width:1180px){.hero,.layout,.toolbar{grid-template-columns:1fr}}@media (max-width:680px){.shell{width:min(calc(100% - 20px),1380px)}.nav{display:none}}
    </style>
    <script>window.__SKIP_AUTO_INTERNAL_AUTH__=true;</script>
    <script src="/internal-auth.js?v=7"></script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar"><div class="title"><h1>员工与权限管理</h1><p>查看员工档案、设备概况与最近登录，并执行基础管理动作。</p></div><nav class="nav"><a href="/admin/dashboard.html">首页</a><a href="/admin/learning.html">学习汇总</a><a href="/admin/workload.html">工作量中心</a><a href="/admin/system-dashboard.html">系统后台</a><a class="current" href="/admin/staffs.html">员工权限</a></nav></header>
      <section class="hero"><article class="card hero-main"><h2 id="heroTitle">正在加载员工与权限管理</h2><p id="heroDesc">当前版本基于 staffs、stores、device_logins、login_audit_logs 组合展示。支持查看详情、重置密码、解绑微信与解锁账号。</p></article><aside class="hero-side"><div class="card meta"><strong>当前账号</strong><span id="currentUser">-</span></div><div class="card meta"><strong>数据来源</strong><span>staffs / stores / device_logins / login_audit_logs</span></div></aside></section>
      <section class="card"><div class="toolbar"><div class="field"><label>门店 ID</label><input id="filterStore" placeholder="例如 3" /></div><div class="field"><label>岗位</label><select id="filterRole"><option value="">全部岗位</option><option value="sales">销售</option><option value="coach">教练</option><option value="manager">店长</option></select></div><div class="field"><label>年月</label><input id="filterMonth" placeholder="默认当月，如 0 代表全年" /></div><div class="field"><label>每页</label><select id="filterSize"><option>10</option><option>20</option><option>50</option></select></div><button class="btn" id="reloadBtn">刷新列表</button></div></section>
      <section class="layout"><article class="card"><table class="table"><thead><tr><th>员工</th><th>门店</th><th>岗位</th><th>手机号</th><th>学习表现</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table></article><aside class="card"><div id="detailRoot" class="detail-grid"><div class="empty">选择一位员工后显示详细资料。</div></div></aside></section>
    </div>
    <script>
      let currentUser=null
      let currentStaffId=0
      let currentDetail=null
      let storeOptions=[]
      function escapeHtml(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
      function state(el,text,isError){el.innerHTML=`<div class="${isError?'error':'empty'}">${escapeHtml(text)}</div>`}
      function authFetch(url,options={}){return fetch(url,Object.assign({headers:window.authHeaders?window.authHeaders():{},cache:'no-store'},options))}
      function storeSelectOptions(selectedId){const fallback=selectedId&&!storeOptions.some(item=>String(item.id)===String(selectedId))?[{id:selectedId,name:`门店 ${selectedId}`}]:[];return [...storeOptions,...fallback].map(item=>`<option value="${escapeHtml(item.id)}" ${String(item.id)===String(selectedId)?'selected':''}>${escapeHtml(item.name||('门店 '+item.id))}</option>`).join('')}
      function renderRows(list){const root=document.getElementById('tableBody');if(!Array.isArray(list)||!list.length){root.innerHTML=`<tr><td colspan="6"><div class="empty">暂无员工数据</div></td></tr>`;return}root.innerHTML=list.map(item=>`<tr><td><strong>${escapeHtml(item.name||'-')}</strong><div class="muted">${escapeHtml(item.employee_no||'-')}</div></td><td>${escapeHtml(item.store_name||'-')}</td><td><span class="chip">${escapeHtml(item.role_name||item.role||'-')}</span></td><td>${escapeHtml(item.phone||'-')}</td><td>课程 ${escapeHtml(item.total_courses||0)} · 演练 ${escapeHtml(item.total_drills||0)} · 通过率 ${escapeHtml(item.avg_pass_rate||0)}%</td><td><button class="btn secondary" data-staff="${escapeHtml(item.id)}">查看详情</button></td></tr>`).join('');root.querySelectorAll('button[data-staff]').forEach(btn=>btn.onclick=()=>loadDetail(btn.dataset.staff))}
      function renderDetail(data){currentDetail=data||{};const item=data.item||{};const devices=data.devices||[];const audits=data.recent_login_audits||[];document.getElementById('detailRoot').innerHTML=`<div class="info"><strong>员工资料编辑</strong><div class="edit-form"><div class="field"><label>姓名</label><input id="editName" value="${escapeHtml(item.name||'')}" /></div><div class="field"><label>手机号</label><input id="editPhone" value="${escapeHtml(item.phone||'')}" /></div><div class="field"><label>岗位</label><select id="editRole"><option value="sales" ${item.role==='sales'?'selected':''}>销售</option><option value="coach" ${item.role==='coach'?'selected':''}>教练</option><option value="manager" ${item.role==='manager'?'selected':''}>店长</option><option value="ops" ${item.role==='ops'?'selected':''}>运营</option><option value="finance" ${item.role==='finance'?'selected':''}>财务</option><option value="admin" ${item.role==='admin'?'selected':''}>管理员</option></select></div><div class="field"><label>状态</label><select id="editStatus"><option value="1" ${String(item.status)==='1'?'selected':''}>启用</option><option value="0" ${String(item.status)!=='1'?'selected':''}>停用</option></select></div><div class="field full"><label>门店</label><select id="editStoreId"><option value="0">未分配</option>${storeSelectOptions(item.store_id)}</select></div></div></div><div class="detail-actions"><button id="saveProfileBtn">保存资料</button><button id="refreshDetailBtn">刷新详情</button><button id="resetPwdBtn">重置密码</button><button id="unbindBtn">解绑微信</button><button id="unlockBtn">解锁账号</button></div><div class="info"><strong>账号状态</strong><div>${escapeHtml(item.status_text||'-')} / 微信${escapeHtml(item.wechat_bound_text||'-')}</div><div class="list-item-sub">OpenID 绑定时间：${escapeHtml(item.openid_bound_at||'未记录')}</div></div><div class="info"><strong>设备概况</strong><div>设备 ${escapeHtml(data.device_stats?.total_devices||0)} 台，信任 ${escapeHtml(data.device_stats?.trusted_devices||0)} 台</div><div class="list-item-sub">最近登录：${escapeHtml(data.device_stats?.recent_login||'暂无')}</div></div><div class="info"><strong>最近设备</strong><div class="list">${devices.length?devices.slice(0,5).map(d=>`<div class="list-item"><div class="list-item-title">${escapeHtml(d.device_model||d.device_name||'未知设备')}</div><div class="list-item-sub">${escapeHtml(d.last_ip||'-')} · ${escapeHtml(d.last_login||'-')} · ${Number(d.is_trusted||0)===1?'信任':'未信任'}</div></div>`).join(''):'<div class="empty">暂无设备记录</div>'}</div></div><div class="info"><strong>最近登录</strong><div class="list">${audits.length?audits.slice(0,5).map(a=>`<div class="list-item"><div class="list-item-title">${escapeHtml(a.login_status||'-')} · ${escapeHtml(a.login_type||'-')}</div><div class="list-item-sub">${escapeHtml(a.created_at||'-')} · ${escapeHtml(a.ip_address||'-')} · ${escapeHtml(a.message||'-')}</div></div>`).join(''):'<div class="empty">暂无登录记录</div>'}</div></div>`;document.getElementById('saveProfileBtn').onclick=saveProfile;document.getElementById('refreshDetailBtn').onclick=()=>loadDetail(currentStaffId);document.getElementById('resetPwdBtn').onclick=resetPassword;document.getElementById('unbindBtn').onclick=unbindWechat;document.getElementById('unlockBtn').onclick=unlockAccount}
      async function loadStores(){const response=await authFetch('/api/statistics/store.php?page_size=50');const result=await response.json();if(!response.ok||result.code!==0)throw new Error(result.message||'门店列表加载失败');storeOptions=result.data?.list||[]}
      async function loadList(){const storeId=document.getElementById('filterStore').value.trim();const role=document.getElementById('filterRole').value;const month=document.getElementById('filterMonth').value.trim();const pageSize=document.getElementById('filterSize').value;const qs=new URLSearchParams({page_size:pageSize});if(storeId)qs.set('store_id',storeId);if(role)qs.set('role',role);if(month)qs.set('month',month);const response=await authFetch('/api/statistics/staff.php?'+qs.toString());const result=await response.json();if(!response.ok||result.code!==0)throw new Error(result.message||'加载失败');renderRows(result.data?.list||[])}
      async function loadDetail(staffId){currentStaffId=Number(staffId||0);const response=await authFetch('/api/admin/staff/detail.php?staff_id='+encodeURIComponent(currentStaffId));const result=await response.json();if(!response.ok||result.code!==0)throw new Error(result.message||'详情加载失败');renderDetail(result.data||{})}
      async function postAction(url,body){const response=await authFetch(url,{method:'POST',headers:Object.assign({'Content-Type':'application/json'},window.authHeaders?window.authHeaders():{}),body:JSON.stringify(body)});const result=await response.json();if(!response.ok||result.code!==0)throw new Error(result.message||'操作失败');return result.data||{}}
      async function saveProfile(){if(!currentStaffId)return;const payload={staff_id:currentStaffId,name:document.getElementById('editName').value.trim(),phone:document.getElementById('editPhone').value.trim(),role:document.getElementById('editRole').value,status:Number(document.getElementById('editStatus').value),store_id:Number(document.getElementById('editStoreId').value||0)};await postAction('/api/admin/staff/update.php',payload);window.alert('员工资料已保存');await Promise.all([loadList(),loadDetail(currentStaffId)])}
      async function resetPassword(){if(!currentStaffId)return;const newPassword=window.prompt('请输入新密码（至少 6 位）','');if(newPassword===null)return;const trimmed=(newPassword||'').trim();if(!trimmed){window.alert('已取消：未输入新密码');return;}if(trimmed.length<6){window.alert('新密码至少 6 位');return;}await postAction('/api/admin/staff/reset-password.php',{staff_id:currentStaffId,new_password:trimmed});window.alert('已重置密码，请通过安全渠道告知该员工');await loadDetail(currentStaffId)}
      async function unbindWechat(){if(!currentStaffId)return;if(!window.confirm('确认解绑该员工的微信绑定吗？'))return;await postAction('/api/admin/staff/unbind-wechat.php',{staff_id:currentStaffId});window.alert('已执行解绑');await loadDetail(currentStaffId)}
      async function unlockAccount(){if(!currentStaffId)return;await postAction('/api/admin/staff/unlock-account.php',{staff_id:currentStaffId});window.alert('已执行解锁');await loadDetail(currentStaffId)}
      async function boot(user){currentUser=user||null;document.getElementById('currentUser').textContent=[user?.staff_name,user?.display_name,user?.username].find(Boolean)||'已登录';document.getElementById('reloadBtn').onclick=()=>loadList().catch(err=>{document.getElementById('heroTitle').textContent='员工列表加载失败';document.getElementById('heroDesc').textContent=err.message||'请稍后重试'}) ;try{await loadStores();await loadList();document.getElementById('heroTitle').textContent='员工与权限管理已就绪';document.getElementById('heroDesc').textContent='当前已支持员工列表、详情查看、资料编辑、设备概况、重置密码、解绑微信与解锁账号。'}catch(err){document.getElementById('heroTitle').textContent='员工列表加载失败';document.getElementById('heroDesc').textContent=err.message||'请稍后重试';document.getElementById('tableBody').innerHTML=`<tr><td colspan="6"><div class="error">${escapeHtml(err.message||'加载失败')}</div></td></tr>`}}
      window.requirePageAuth({onAuthed:async(user)=>{const role=String(user?.role||'').toLowerCase();const isSuperAdmin=!!user?.is_admin||['admin','ceo'].includes(role);if(!isSuperAdmin){window.location.replace('/internal.html');return}await boot(user)}})
    </script>
  </body>
</html>
