<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>追光小牛 · 长期业绩看板</title>
    <style>
      :root { --bg:#f6f2ec; --panel:#fff; --ink:#1f1a17; --muted:#6b625c; --line:rgba(31,26,23,.08); --brand:#ff6b35; --brand-soft:#fff1e8; }
      *{box-sizing:border-box} body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#fbf7f2 0,#f4efe8 100%);color:var(--ink)} a{text-decoration:none;color:inherit}
      .shell{width:min(calc(100% - 32px),1360px);margin:0 auto}.topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:20px 0 10px}.title h1{margin:0;font-size:24px}.title p{margin:6px 0 0;color:var(--muted);font-size:13px}.nav{display:flex;flex-wrap:wrap;gap:8px}.nav a{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.85);border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--muted)}.nav a.current{background:var(--brand);border-color:var(--brand);color:#fff}
      .card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:0 12px 28px rgba(31,26,23,.04)}
      .hero{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;margin-top:10px}.hero-main{background:linear-gradient(135deg,#1f1a17,#4e3124 58%,#ff6b35 120%);color:#fff}.hero-main h2{margin:0;font-size:28px}.hero-main p{margin:10px 0 0;color:rgba(255,255,255,.76);line-height:1.7;font-size:14px}.meta-item strong{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}.meta-wrap{display:grid;gap:12px}
      .filters{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-top:16px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}.field input,.field select{width:100%;height:42px;border:1px solid var(--line);border-radius:12px;padding:0 12px;background:#fff;font-size:14px}
      .content-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:16px;margin-top:16px}.panel-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.panel-title h3{margin:0;font-size:18px}.panel-title span{font-size:12px;color:var(--muted)}
      .trend{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));align-items:end;gap:12px;min-height:260px}.bar-col{display:flex;flex-direction:column;align-items:center;gap:8px}.bar-stack{width:100%;min-height:190px;display:flex;align-items:end;justify-content:center;gap:6px}.bar{width:20px;border-radius:999px 999px 6px 6px;background:#eadfd5}.bar.new{background:#ffb08a}.bar.renew{background:#ff6b35}.bar.revenue{background:#6c4f3d}.bar-label{font-size:12px;color:var(--muted)}
      .breakdown{display:grid;gap:10px}.break-item{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:12px 14px;border-radius:14px;background:#fbf8f4}.break-item strong{display:block}.break-item span{font-size:12px;color:var(--muted)}
      table{width:100%;border-collapse:collapse}.table-card{margin:16px 0 24px}th,td{padding:14px 12px;border-bottom:1px solid var(--line);text-align:left;font-size:13px}th{color:var(--muted);font-weight:700}.empty,.error{padding:20px;border-radius:14px;background:#fbf8f4;color:var(--muted);font-size:14px}.error{background:#fff1f1;color:#d35454}
      @media (max-width:1180px){.hero,.content-grid,.filters{grid-template-columns:1fr}} @media (max-width:680px){.shell{width:min(calc(100% - 20px),1360px)}.nav{display:none}.trend{grid-template-columns:repeat(4,minmax(0,1fr))}}
    </style>
    <script>window.__SKIP_AUTO_INTERNAL_AUTH__=true;</script>
    <script src="/internal-auth.js?v=7"></script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="title"><h1>长期业绩看板</h1><p>一期补齐页 1/3 · 复用周年庆录入表做长期业绩视图</p></div>
        <nav class="nav"><a href="/admin/dashboard.html">首页</a><a href="/admin/learning.html">学习汇总</a><a class="current" href="/admin/performance.html">长期业绩</a><a href="/admin/workload.html">工作量中心</a><a href="/admin/system-dashboard.html">系统后台</a></nav>
      </header>

      <section class="hero">
        <article class="card hero-main"><h2 id="heroTitle">正在加载长期业绩</h2><p id="heroDesc">当前先按已落库的周年庆每日录入数据构建长期业绩趋势，后续可切换到正式业绩表。</p></article>
        <aside class="meta-wrap"><div class="card meta-item"><strong>当前账号</strong><span id="currentUser">-</span></div><div class="card meta-item"><strong>统计区间</strong><span id="currentPeriod">-</span></div><div class="card meta-item"><strong>数据来源</strong><span id="currentSource">-</span></div></aside>
      </section>

      <section class="filters">
        <div class="card field"><label for="dateFrom">开始日期</label><input id="dateFrom" type="date" /></div>
        <div class="card field"><label for="dateTo">结束日期</label><input id="dateTo" type="date" /></div>
        <div class="card field"><label for="roleFilter">岗位</label><select id="roleFilter"><option value="">全部岗位</option><option value="销售">销售</option><option value="店长">店长</option><option value="教练">教练</option><option value="直播运营">直播运营</option></select></div>
        <div class="card field"><label>&nbsp;</label><input id="reloadBtn" type="button" value="刷新数据" /></div>
      </section>

      <section class="content-grid">
        <article class="card"><div class="panel-title"><h3>趋势图</h3><span>新签 / 续费 / 收入</span></div><div id="trendChart" class="trend"></div></article>
        <article class="card"><div class="panel-title"><h3>门店与岗位拆分</h3><span>当前区间累计</span></div><div id="storeBreakdown" class="breakdown"></div><div style="height:12px"></div><div id="roleBreakdown" class="breakdown"></div></article>
      </section>

      <section class="card table-card"><div class="panel-title"><h3>业绩明细</h3><span>按日期和录入责任人展示</span></div><div id="tableWrap"></div></section>
    </div>

    <script>
      function escapeHtml(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
      function renderState(el,text,isError){el.innerHTML=`<div class="${isError?'error':'empty'}">${escapeHtml(text)}</div>`}
      function defaultDates(){const end=new Date();const start=new Date();start.setDate(end.getDate()-13);const to=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;return{start:to(start),end:to(end)}}
      function renderTrend(list){const root=document.getElementById('trendChart');if(!Array.isArray(list)||!list.length){renderState(root,'暂无趋势数据',false);return}const max=Math.max(1,...list.flatMap(i=>[Number(i.new_sign_count||0),Number(i.renew_count||0),Number(i.revenue||0)]));root.innerHTML=list.slice(-14).map(item=>{const a=Math.max(8,Math.round(Number(item.new_sign_count||0)/max*180));const b=Math.max(8,Math.round(Number(item.renew_count||0)/max*180));const c=Math.max(8,Math.round(Number(item.revenue||0)/max*180));return `<div class="bar-col"><div class="bar-stack"><div class="bar new" style="height:${a}px" title="新签 ${escapeHtml(item.new_sign_count||0)}"></div><div class="bar renew" style="height:${b}px" title="续费 ${escapeHtml(item.renew_count||0)}"></div><div class="bar revenue" style="height:${c}px" title="收入 ${escapeHtml(item.revenue||0)}"></div></div><div class="bar-label">${escapeHtml((item.date||'').slice(5))}</div></div>`}).join('')}
      function renderBreakdown(elId,list,label){const root=document.getElementById(elId);if(!Array.isArray(list)||!list.length){renderState(root,`暂无${label}数据`,false);return}root.innerHTML=list.slice(0,8).map(item=>`<div class="break-item"><div><strong>${escapeHtml(item.store_name||item.role||'-')}</strong><span>新签 ${escapeHtml(item.new_sign_count||0)} · 续费 ${escapeHtml(item.renew_count||0)}</span></div><div><strong>¥${Number(item.revenue||0).toLocaleString('zh-CN')}</strong></div></div>`).join('')}
      function renderTable(list){const root=document.getElementById('tableWrap');if(!Array.isArray(list)||!list.length){renderState(root,'暂无业绩明细',false);return}root.innerHTML=`<table><thead><tr><th>日期</th><th>门店</th><th>新签</th><th>续费</th><th>收入</th><th>责任人</th></tr></thead><tbody>${list.map(item=>`<tr><td>${escapeHtml(item.date||'-')}</td><td>${escapeHtml(item.store_name||'-')}</td><td>${escapeHtml(item.new_sign_count||0)}</td><td>${escapeHtml(item.renew_count||0)}</td><td>¥${Number(item.revenue||0).toLocaleString('zh-CN')}</td><td>${escapeHtml(item.owner_name||'-')}<span style="color:#6b625c"> / ${escapeHtml(item.role||'-')}</span></td></tr>`).join('')}</tbody></table>`}
      async function fetchTrend(){const params=new URLSearchParams({date_from:document.getElementById('dateFrom').value,date_to:document.getElementById('dateTo').value,role:document.getElementById('roleFilter').value});const response=await fetch(`/api/admin/performance/trend.php?${params.toString()}`,{headers:window.authHeaders?window.authHeaders():{},cache:'no-store'});const result=await response.json();if(!response.ok||!result||result.code!==0)throw new Error(result?.message||'加载失败');return result.data||{}}
      async function loadPage(user){const label=[user?.staff_name,user?.display_name,user?.nickname,user?.username].find(Boolean)||'已登录';document.getElementById('currentUser').textContent=label;const dates=defaultDates();document.getElementById('dateFrom').value=dates.start;document.getElementById('dateTo').value=dates.end;const data=await fetchTrend();document.getElementById('heroTitle').textContent='长期业绩看板已就绪';document.getElementById('heroDesc').textContent='当前版本先打通真实权限与可视化，后续可替换为正式业绩库。';document.getElementById('currentPeriod').textContent=`${data.filters?.date_from||'-'} 至 ${data.filters?.date_to||'-'}`;document.getElementById('currentSource').textContent=data.meta?.source||'-';renderTrend(data.trend||[]);renderBreakdown('storeBreakdown',data.store_breakdown||[],'门店');renderBreakdown('roleBreakdown',data.role_breakdown||[],'岗位');renderTable(data.list||[])}
      window.requirePageAuth({onAuthed:async(user)=>{const role=String(user?.role||'').toLowerCase();const canAccessPerformance=!!user?.is_hq||['admin','ceo','operation','finance','manager'].includes(role);if(!canAccessPerformance){window.location.replace('/internal.html');return}try{await loadPage(user);document.getElementById('reloadBtn').addEventListener('click',async()=>{await loadPage(user)})}catch(error){document.getElementById('heroTitle').textContent='长期业绩加载失败';document.getElementById('heroDesc').textContent=error.message||'请稍后重试';renderState(document.getElementById('trendChart'),error.message||'加载失败',true);renderState(document.getElementById('storeBreakdown'),error.message||'加载失败',true);renderState(document.getElementById('roleBreakdown'),error.message||'加载失败',true);renderState(document.getElementById('tableWrap'),error.message||'加载失败',true)}}})
    </script>
  </body>
</html>
