<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>追光小牛 · 管理操作日志</title><style>:root{--bg:#f5f1ea;--panel:#fff;--ink:#1f1a17;--muted:#6b625c;--line:rgba(31,26,23,.08);--brand:#ff6b35;--danger:#d35454}*{box-sizing:border-box}body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#faf7f2 0,#f1ece5 100%);color:var(--ink)}a{text-decoration:none;color:inherit}button,input{font:inherit}.shell{width:min(calc(100% - 32px),1380px);margin:0 auto}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:20px 0 10px}.title h1{margin:0;font-size:24px}.title p{margin:6px 0 0;color:var(--muted);font-size:13px}.nav{display:flex;flex-wrap:wrap;gap:8px}.nav a{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.84);border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--muted)}.nav a.current{background:var(--brand);border-color:var(--brand);color:#fff}.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 12px 28px rgba(31,26,23,.04)}.toolbar{display:grid;grid-template-columns:repeat(4,minmax(0,1fr)) auto;gap:12px;margin-top:16px}.field{display:grid;gap:6px}.field label{font-size:12px;color:var(--muted)}.field input{height:42px;border:1px solid var(--line);border-radius:12px;padding:0 12px}.btn{height:42px;border:0;border-radius:12px;padding:0 16px;background:var(--brand);color:#fff;font-weight:700;cursor:pointer}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}.table th{font-size:12px;color:var(--muted)}pre{margin:0;white-space:pre-wrap;word-break:break-word;font-size:12px;color:#5a514c}.empty,.error{padding:18px;border-radius:14px;background:#fbf8f4;color:var(--muted)}.error{background:#fff1f1;color:var(--danger)}@media (max-width:960px){.toolbar{grid-template-columns:1fr}.nav{display:none}.shell{width:min(calc(100% - 20px),1380px)}}</style><script>window.__SKIP_AUTO_INTERNAL_AUTH__=true;</script><script src="/internal-auth.js?v=8"></script></head><body><div class="shell"><header class="topbar"><div class="title"><h1>管理操作日志</h1><p>展示后台动作留痕，默认读取最近 7 天操作记录。</p></div><nav class="nav"><a href="/admin/system-dashboard.html">系统后台</a><a href="/admin/security-login-audit.html">登录审计</a><a href="/admin/security-devices.html">设备安全</a><a href="/admin/staffs.html">员工权限</a><a href="/admin/system-errors.html">系统异常</a><a class="current" href="/admin/operation-logs.html">操作日志</a></nav></header><section class="card"><div class="toolbar"><div class="field"><label>开始日期</label><input id="dateFrom" type="date" /></div><div class="field"><label>结束日期</label><input id="dateTo" type="date" /></div><div class="field"><label>模块</label><input id="module" placeholder="staff / admin" /></div><div class="field"><label>动作</label><input id="action" placeholder="update / reset_password" /></div><button class="btn" id="reloadBtn">刷新</button></div></section><section class="card" style="margin-top:16px"><table class="table"><thead><tr><th>时间</th><th>操作人</th><th>模块</th><th>动作</th><th>目标</th><th>IP</th><th>变更摘要</th></tr></thead><tbody id="tableBody"></tbody></table></section></div><script>function e(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}function authFetch(url){return fetch(url,{headers:window.authHeaders?window.authHeaders():{},cache:'no-store'})}function shortJson(v){if(!v)return '-';try{return JSON.stringify(JSON.parse(v),null,2)}catch{return String(v)}}function renderTable(list){const root=document.getElementById('tableBody');if(!list.length){root.innerHTML='<tr><td colspan="7"><div class="empty">暂无操作日志</div></td></tr>';return}root.innerHTML=list.map(item=>`<tr><td>${e(item.created_at||'-')}</td><td>${e(item.operator_name||item.operator_user_id||'-')}</td><td>${e(item.module||'-')}</td><td>${e(item.action||'-')}</td><td>${e(item.target_type||'-')} / ${e(item.target_id||'-')}</td><td>${e(item.ip_address||'-')}</td><td><pre>before: ${e(shortJson(item.before_json))}\nafter: ${e(shortJson(item.after_json))}</pre></td></tr>`).join('')}async function load(){const qs=new URLSearchParams();if(dateFrom.value)qs.set('date_from',dateFrom.value);if(dateTo.value)qs.set('date_to',dateTo.value);if(module.value.trim())qs.set('module',module.value.trim());if(action.value.trim())qs.set('action',action.value.trim());const response=await authFetch('/api/admin/system/operation-logs.php?'+qs.toString());const result=await response.json();if(!response.ok||result.code!==0)throw new Error(result.message||'加载失败');renderTable(result.data?.list||[])}window.requirePageAuth({onAuthed:async(user)=>{const role=String(user?.role||'').toLowerCase();const isSuperAdmin=!!user?.is_admin||['admin','ceo'].includes(role);if(!isSuperAdmin){window.location.replace('/internal.html');return}const now=new Date(),past=new Date(Date.now()-6*86400000);dateTo.value=now.toISOString().slice(0,10);dateFrom.value=past.toISOString().slice(0,10);reloadBtn.onclick=()=>load().catch(err=>tableBody.innerHTML=`<tr><td colspan="7"><div class="error">${e(err.message||'加载失败')}</div></td></tr>`);await load()}})</script></body></html>
