<script>
const SLIDES = [{"num": 1, "title": "追光小牛", "content": "销售培训\n第四课：体测 —— 你的第一把成交利器\n体测销售实战 | FAB法则驱动成交"}, {"num": 2, "title": "课程目录", "content": "体测销售实战 - 全流程掌握\n01\n体测的价值\n体测是什么 / 两大场景\n02\n体测流程6步\n邀约 > 准备 > 执行 > 录入 > 解读 > 跟进\n03\n体测解读与关单\n话术模板 / 单项分析 / 常见问题应答"}, {"num": 3, "title": "体测的价值", "content": "体测是什么？\n不是普通测试，是价值可视化节点\nF 特性\n价值可视化节点\n体测是一套科学的身体素质评估体系，通过8大维度（身高、体重、柔韧、力量、灵敏、平衡、心肺、核心）全面评估孩子的身体发育状况，用客观数据呈现孩子的运动能力画像。\nA 优势\n用数据说话建立信任\n告别“我觉得孩子需要锻炼”的主观推销，转而用专业体测数据说话。家长看到科学评估报告，自然建立对教练和机构的专业信任，降低销售阻力。\nB 利益\n看到差距产生需求\n当家长直观看到孩子与同龄标准的差距，以及体测报告中的风险提示时，购买需求从“可报可不报”转变为“必须马上行动”，大幅提升成交率。"}, {"num": 4, "title": "体测的价值", "content": "体测的两大场景\n新客转化 vs 老客续费\n新客体测 — 促转化\nF 特性：首次到店客户免费体验体测服务，建立第一印象\n\nA 优势：用专业数据替代销售话术，降低客户防备心理，建立专业形象\n\nB 利益：新客转化率提升至40%+，家长从“随便看看”变为“我要报名”\n季度体测 — 促续费\nF 特性：每季度定期体测，追踪孩子身体素质变化曲线\n\nA 优势：前后对比数据直观展示训练效果，让家长看到实实在在的进步\n\nB 利益：续费率提升至70%+，家长因“看到了效果”而主动续费"}, {"num": 5, "title": "体测流程6步", "content": "Step 1：体测邀约\n邀约成功是体测成交的第一步\n1\nF 特性\n标准化邀约流程\n电话/微信邀约，明确告知体测目的、时长（20-30分钟）、注意事项（穿运动服），提前1-2天确认。\nA 优势\n降低爽约率\n标准化话术+提前确认机制，让家长重视体测安排，爽约率从30%降至10%以下。\nB 利益\n到店率提升\n每多1组到店体测，就多1次成交机会。邀约到店率>=80%，直接提升月度业绩。\n邀约话术要点\n\"XX妈妈您好，我是追光小牛的XX教练。我们近期为3-12岁的小朋友提供了一次免费的体能评估，\n通过8项专业测试全面了解孩子的身体发育状况，整个过程只需20-30分钟。\n测完之后我们会出一份详细的评估报告，帮您清楚了解孩子目前的身体素质水平。您看这周六上午方便吗？\""}, {"num": 6, "title": "体测流程6步", "content": "Step 2：体测准备\n充分准备，专业呈现\n2\n场地\n场地准备\n体测区域干净整洁\n测试器材摆放有序\n温度适宜通风良好\n家长等候区舒适\n设备\n设备准备\n身高体重秤校准\n柔韧测试垫就位\n秒表/计时器准备\n体测表格打印齐全\n人员\n人员准备\n教练熟悉测试流程\n了解孩子基本信息\n准备解读话术\n着装专业整洁"}, {"num": 7, "title": "体测流程6步", "content": "Step 3：体测执行（20-30分钟）\n8大维度全面评估\n3\nF 特性：8项标准化测试  A 优势：科学评估体系  B 利益：数据驱动成交\n身高体重\nBMI指数评估\n柔韧性\n坐位体前屈\n力量\n立定跳远/握力\n灵敏度\n往返跑/折返\n平衡力\n单脚站立测试\n心肺功能\n折返跑/台阶\n核心力量\n平板支撑/仰卧\n综合评级\n雷达图总评"}, {"num": 8, "title": "体测流程6步", "content": "Step 4：录入系统\nGYMGO系统录入，生成专业报告\n4\n1\n数据整理\n将8项测试数据整理到体测表格，确保每项数据准确无误\n2\n系统录入\n登录GYMGO系统，进入体测模块，逐项录入测试数据\n3\n生成报告\n系统自动生成雷达图、评分报告，一键导出PDF版本\n4\n发送家长\n通过微信/邮件发送报告给家长，预约解读时间\n关键要求：体测完成后当天完成系统录入，确保数据新鲜度"}, {"num": 9, "title": "体测流程6步", "content": "Step 5：体测解读（新客24h / 会员48h内）\n核心解读逻辑6步法\n5\nF 特性：6步标准化解读流程  A 优势：逻辑清晰有说服力  B 利益：解读即关单，转化率>=40%\n1\n问询\n了解家长对孩子身体情况的认知和担忧\n2\n分析原因\n结合体测数据，分析孩子身体素质现状成因\n3\n给解决方案\n针对性推荐课程方案，匹配孩子实际需求\n4\n成功案例\n分享同龄孩子的训练成果，增强家长信心\n5\n总结\n回顾核心发现，强化训练的必要性和紧迫性\n6\n关单\n自然引导报名，提供限时优惠促成交"}, {"num": 10, "title": "体测流程6步", "content": "Step 6：跟进转化\n解读后新客24h / 会员48h内跟进，锁定成交\n6\n24h\n解读后跟进窗口\n>=40%\n体测转化率目标\n3次\n未成交最多跟进次数\n解读当天\n发送体测报告PDF + 感谢微信\n附上关键发现一句话总结\n解读后24h\n电话/微信跟进，了解家长想法\n解答疑问，消除顾虑\n解读后3天\n发送成功案例/活动信息\n制造紧迫感，限时优惠\n解读后7天\n最后一次跟进，邀请体验课\n未成交则转入长期培育"}, {"num": 11, "title": "体测解读与关单", "content": "体测解读话术模板\n标准化话术，新手也能专业解读\n开场白：\n\"妈妈您好，XX的体测报告出来了。整体来看，XX的身体素质在同龄孩子中处于中等水平，有几个亮点，也有一些需要关注的地方，我给您详细讲讲。\"\n\n亮点先行：\n\"XX的平衡能力测试得分很高，说明孩子的协调性不错，这在同龄孩子中是优势。\"\n\n问题揭示：\n\"不过我也注意到，XX的柔韧性和核心力量评分偏低。柔韧性不足可能影响运动表现，甚至增加运动受伤风险。核心力量弱的话，坐姿容易不端正，也影响专注力。\"\n\n方案推荐：\n\"针对XX的情况，我建议报名我们的基础体能班，重点加强柔韧性和核心力量训练。像XX这样大的孩子，每周2-3次课，3个月就能看到明显改善。\"\n\n关单引导：\n\"这个月刚好有体测专属优惠，报名可以额外赠送2节课。您看是给孩子报周中的课还是周末的课？\""}, {"num": 12, "title": "体测解读与关单", "content": "体测单项分析要点\n8项指标一句话解读\n身高体重\nBMI偏离标准区间，影响骨骼发育和运动能力基础\n柔韧性\n柔韧不足导致动作受限，增加运动损伤风险\n力量\n力量不足影响运动表现，降低孩子运动自信心\n灵敏度\n反应速度和变向能力弱，影响体育课表现和团队运动\n平衡力\n平衡能力弱容易摔倒，影响协调性发展和精细动作\n心肺功能\n心肺耐力不足，容易疲劳，影响专注力和学习效率\n核心力量\n核心不稳导致坐姿不良，影响脊柱健康和课堂专注力\n综合评级\n多项指标偏低说明系统训练不足，需要专业干预"}, {"num": 13, "title": "体测解读与关单", "content": "常见家长问题应答\n化解顾虑，建立信任\nQ\n\"我家孩子不需要体测吧？\"\nA\n体测不是看病，是了解孩子身体发育状况的科学方式。就像定期检查视力和牙齿一样，身体素质也需要定期评估。很多家长在孩子出现体态问题或运动能力落后时才后悔没有早做评估。\nQ\n\"体测准吗？\"\nA\n我们的体测项目参照国家学生体质健康标准，使用专业器材，由持证教练操作。更重要的是，体测的价值不在于绝对精确，而在于建立基线数据，后续可以通过季度复测追踪变化趋势。\nQ\n\"和医院体检有什么区别？\"\nA\n医院体检侧重于身高体重、视力、血常规等健康指标；我们的体测侧重于柔韧、力量、灵敏、平衡、心肺、核心等运动素质指标。两者互补，体测更能发现孩子在运动能力方面的优势和短板。"}, {"num": 14, "title": "本课要点回顾", "content": "体测6步法 + 解读逻辑6步\n体测流程6步法\n1\nStep 1  体测邀约\n2\nStep 2  体测准备\n3\nStep 3  体测执行（20-30分钟）\n4\nStep 4  录入系统（GYMGO）\n5\nStep 5  体测解读（新客24h / 会员48h内）\n6\nStep 6  跟进转化（>=40%）\n解读逻辑6步法\n1\n问询 — 了解家长认知和担忧\n2\n分析原因 — 结合数据找根因\n3\n给解决方案 — 针对性推荐课程\n4\n成功案例 — 分享同龄训练成果\n5\n总结 — 强化必要性和紧迫性\n6\n关单 — 自然引导，限时促单"}, {"num": 15, "title": "行动任务", "content": "本周完成1次体测解读练习\n1. 找一位同事模拟家长，完整演练体测解读6步法\n2. 录制自己的解读过程，对照话术模板复盘改进\n3. 本周完成至少1次真实体测邀约和执行\n追光小牛 · 让每个孩子追光奔跑"}];
const SLIDE_SCRIPTS = [{"num": 1, "title": "追光小牛", "script": "<div class=\"script-chapter\">追光小牛销售培训 · 话术手册</div>\n<div class=\"script-section\">第四课：体测 —— 你的第一把成交利器</div><div class=\"script-section\">追光小牛讲解要点</div><p>本页用于衔接课程节奏，讲解时请围绕课件信息展开，帮助学员明确这一页的重点。</p><ul><li>销售培训</li><li>第四课：体测 —— 你的第一把成交利器</li><li>体测销售实战 | FAB法则驱动成交</li></ul>"}, {"num": 2, "title": "课程目录", "script": "<div class=\"script-section\">课程目录讲解要点</div><p>本页用于衔接课程节奏，讲解时请围绕课件信息展开，帮助学员明确这一页的重点。</p><ul><li>体测销售实战 - 全流程掌握</li><li>体测的价值</li><li>体测是什么 / 两大场景</li><li>体测流程6步</li><li>邀约 &gt; 准备 &gt; 执行 &gt; 录入 &gt; 解读 &gt; 跟进</li><li>体测解读与关单</li></ul>"}, {"num": 3, "title": "体测的价值", "script": "<div class=\"script-section\">第一章 体测的价值</div>\n<div class=\"script-label\">1.1 体测是什么？</div>\n<p>**【原则】** 体测不是普通测试，是价值可视化节点</p>\n<p>**FAB解读：**</p>\n<ul>\n<li>**F 特性**：价值可视化节点</li>\n<li>**A 优势**：用数据说话建立信任</li>\n<li>**B 利益**：看到差距产生需求</li>\n</ul>\n<p>**【话术】** 体测价值介绍</p>\n<div class=\"script-quote\">\"体测是一套科学的身体素质评估体系，通过8大维度（身高、体重、柔韧、力量、灵敏、平衡、心肺、核心）全面评估孩子的身体发育状况，用客观数据呈现孩子的运动能力画像。告别'我觉得孩子需要锻炼'的主观推销，转而用专业体测数据说话。家长看到科学评估报告，自然建立对教练和机构的专业信任，降低销售阻力。当家长直观看到孩子与同龄标准的差距，以及体测报告中的风险提示时，购买需求从'可报可不报'转变为'必须马上行动'，大幅提升成交率。\"</div>\n<div class=\"script-label\">1.2 体测的两大场景</div>\n<ul>\n<li>**F 特性**：首次到店客户免费体验体测服务，建立第一印象</li>\n<li>**A 优势**：用专业数据替代销售话术，降低客户防备心理，建立专业形象</li>\n<li>**B 利益**：新客转化率提升至40%+，家长从\"随便看看\"变为\"我要报名\"</li>\n</ul>\n<ul>\n<li>**F 特性**：每季度定期体测，追踪孩子身体素质变化曲线</li>\n<li>**A 优势**：前后对比数据直观展示训练效果，让家长看到实实在在的进步</li>\n<li>**B 利益**：续费率提升至70%+，家长因\"看到了效果\"而主动续费</li>\n</ul>\n<div class=\"script-section\">第二章 体测流程6步</div>\n<div class=\"script-label\">Step 1：体测邀约</div>\n<p>**【原则】** 邀约成功是体测成交的第一步</p>\n<p>**FAB解读：**</p>\n<ul>\n<li>**F 特性**：标准化邀约流程</li>\n<li>**A 优势**：降低爽约率</li>\n<li>**B 利益**：到店率提升</li>\n</ul>\n<p>**【话术】** 体测邀约话术</p>\n<div class=\"script-quote\">\"XX妈妈您好，我是追光小牛的XX教练。我们近期为3-12岁的小朋友提供了一次免费的体能评估，通过8项专业测试全面了解孩子的身体发育状况，整个过程只需20-30分钟。测完之后我们会出一份详细的评估报告，帮您清楚了解孩子目前的身体素质水平。您看这周六上午方便吗？\"</div>\n<p>**邀约要点：**</p>\n<ul>\n<li>电话/微信邀约</li>\n<li>明确告知体测目的、时长（20-30分钟）</li>\n<li>注意事项（穿运动服）</li>\n<li>提前1-2天确认</li>\n</ul>\n<div class=\"script-label\">Step 2：体测准备</div>\n<p>**【原则】** 充分准备，专业呈现</p>\n<p>**场地准备：**</p>\n<ul>\n<li>体测区域干净整洁</li>\n<li>测试器材摆放有序</li>\n<li>温度适宜通风良好</li>\n<li>家长等候区舒适</li>\n</ul>\n<p>**设备准备：**</p>\n<ul>\n<li>身高体重秤校准</li>\n<li>柔韧测试垫就位</li>\n<li>秒表/计时器准备</li>\n<li>体测表格打印齐全</li>\n</ul>\n<p>**人员准备：**</p>\n<ul>\n<li>教练熟悉测试流程</li>\n<li>了解孩子基本信息</li>\n<li>准备解读话术</li>\n<li>着装专业整洁</li>\n</ul>\n<div class=\"script-label\">Step 3：体测执行（20-30分钟）</div>\n<p>**【原则】** 8大维度全面评估</p>\n<p>**FAB解读：**</p>\n<ul>\n<li>**F 特性**：8项标准化测试</li>\n<li>**A 优势**：科学评估体系</li>\n<li>**B 利益**：数据驱动成交</li>\n</ul>\n<p>**8项测试指标：**</p>\n<p>| 测试项 | 评估内容 |</p>\n<p>|--------|----------|</p>\n<p>| 身高体重 | BMI指数评估 |</p>\n<p>| 柔韧性 | 坐位体前屈 |</p>\n<p>| 力量 | 立定跳远/握力 |</p>\n<p>| 灵敏度 | 往返跑/折返 |</p>\n<p>| 平衡力 | 单脚站立测试 |</p>\n<p>| 心肺功能 | 折返跑/台阶 |</p>\n<p>| 核心力量 | 平板支撑/仰卧 |</p>\n<p>| 综合评级 | 雷达图总评 |</p>\n<div class=\"script-label\">Step 4：录入系统</div>\n<p>**【原则】** 体测完成后当天完成系统录入，确保数据新鲜度</p>\n<p>**录入4步：**</p>\n<p>1. **数据整理**：将8项测试数据整理到体测表格，确保每项数据准确无误</p>\n<p>2. **系统录入**：登录GYMGO系统，进入体测模块，逐项录入测试数据</p>\n<p>3. **生成报告**：系统自动生成雷达图、评分报告，一键导出PDF版本</p>\n<p>4. **发送家长**：通过微信/邮件发送报告给家长，预约解读时间</p>\n<div class=\"script-label\">Step 5：体测解读</div>\n<p>**【原则】** 新客24h内 / 会员48h内完成解读</p>\n<p>**FAB解读：**</p>\n<ul>\n<li>**F 特性**：6步标准化解读流程</li>\n<li>**A 优势**：逻辑清晰有说服力</li>\n<li>**B 利益**：解读即关单，转化率>=40%</li>\n</ul>\n<p>**解读6步法：**</p>\n<p>| 步骤 | 动作 | 说明 |</p>\n<p>|------|------|------|</p>\n<p>| 1 | 问询 | 了解家长对孩子身体情况的认知和担忧 |</p>\n<p>| 2 | 分析原因 | 结合体测数据，分析孩子身体素质现状成因 |</p>\n<p>| 3 | 给解决方案 | 针对性推荐课程方案，匹配孩子实际需求 |</p>\n<p>| 4 | 成功案例 | 分享同龄孩子的训练成果，增强家长信心 |</p>\n<p>| 5 | 总结 | 回顾核心发现，强化训练的必要性和紧迫性 |</p>\n<p>| 6 | 关单 | 自然引导报名，提供限时优惠促成交 |</p>\n<div class=\"script-label\">Step 6：跟进转化</div>\n<p>**【原则】** 解读后新客24h / 会员48h内跟进，锁定成交</p>\n<p>**关键数据：**</p>\n<ul>\n<li>解读后跟进窗口：24h</li>\n<li>体测转化率目标：>=40%</li>\n<li>未成交最多跟进次数：3次</li>\n</ul>\n<p>**跟进节奏：**</p>\n<p>| 时间节点 | 动作 |</p>\n<p>|----------|------|</p>\n<p>| 解读当天 | 发送体测报告PDF + 感谢微信，附上关键发现一句话总结 |</p>\n<p>| 解读后24h | 电话/微信跟进，了解家长想法，解答疑问，消除顾虑 |</p>\n<p>| 解读后3天 | 发送成功案例/活动信息，制造紧迫感，限时优惠 |</p>\n<p>| 解读后7天 | 最后一次跟进，邀请体验课，未成交则转入长期培育 |</p>\n<div class=\"script-section\">第三章 体测解读话术模板</div>\n<div class=\"script-label\">3.1 完整解读话术</div>\n<p>**【话术】** 开场白</p>\n<div class=\"script-quote\">\"妈妈您好，XX的体测报告出来了。整体来看，XX的身体素质在同龄孩子中处于中等水平，有几个亮点，也有一些需要关注的地方，我给您详细讲讲。\"</div>\n<p>**【话术】** 亮点先行</p>\n<div class=\"script-quote\">\"XX的平衡能力测试得分很高，说明孩子的协调性不错，这在同龄孩子中是优势。\"</div>\n<p>**【话术】** 问题揭示</p>\n<div class=\"script-quote\">\"不过我也注意到，XX的柔韧性和核心力量评分偏低。柔韧性不足可能影响运动表现，甚至增加运动受伤风险。核心力量弱的话，坐姿容易不端正，也影响专注力。\"</div>\n<p>**【话术】** 方案推荐</p>\n<div class=\"script-quote\">\"针对XX的情况，我建议报名我们的基础体能班，重点加强柔韧性和核心力量训练。像XX这样大的孩子，每周2-3次课，3个月就能看到明显改善。\"</div>\n<p>**【话术】** 关单引导</p>\n<div class=\"script-quote\">\"这个月刚好有体测专属优惠，报名可以额外赠送2节课。您看是给孩子报周中的课还是周末的课？\"</div>\n<div class=\"script-label\">3.2 体测单项分析要点</div>\n<p>**8项指标一句话解读：**</p>\n<p>| 指标 | 解读话术 |</p>\n<p>|------|----------|</p>\n<p>| 身高体重 | BMI偏离标准区间，影响骨骼发育和运动能力基础 |</p>\n<p>| 柔韧性 | 柔韧不足导致动作受限，增加运动损伤风险 |</p>\n<p>| 力量 | 力量不足影响运动表现，降低孩子运动自信心 |</p>\n<p>| 灵敏度 | 反应速度和变向能力弱，影响体育课表现和团队运动 |</p>\n<p>| 平衡力 | 平衡能力弱容易摔倒，影响协调性发展和精细动作 |</p>\n<p>| 心肺功能 | 心肺耐力不足，容易疲劳，影响专注力和学习效率 |</p>\n<p>| 核心力量 | 核心不稳导致坐姿不良，影响脊柱健康和课堂专注力 |</p>\n<p>| 综合评级 | 多项指标偏低说明系统训练不足，需要专业干预 |</p>\n<div class=\"script-section\">第四章 常见家长问题应答</div>\n<div class=\"script-label\">Q1：\"我家孩子不需要体测吧？\"</div>\n<p>**【话术】**</p>\n<div class=\"script-quote\">\"体测不是看病，是了解孩子身体发育状况的科学方式。就像定期检查视力和牙齿一样，身体素质也需要定期评估。很多家长在孩子出现体态问题或运动能力落后时才后悔没有早做评估。\"</div>\n<div class=\"script-label\">Q2：\"体测准吗？\"</div>\n<p>**【话术】**</p>"}, {"num": 4, "title": "体测的价值", "script": "<div class=\"script-quote\">\"我们的体测项目参照国家学生体质健康标准，使用专业器材，由持证教练操作。更重要的是，体测的价值不在于绝对精确，而在于建立基线数据，后续可以通过季度复测追踪变化趋势。\"</div>\n<div class=\"script-label\">Q3：\"和医院体检有什么区别？\"</div>\n<p>**【话术】**</p>\n<div class=\"script-quote\">\"医院体检侧重于身高体重、视力、血常规等健康指标；我们的体测侧重于柔韧、力量、灵敏、平衡、心肺、核心等运动素质指标。两者互补，体测更能发现孩子在运动能力方面的优势和短板。\"</div>\n<div class=\"script-section\">第五章 本课要点回顾</div>"}, {"num": 5, "title": "体测流程6步", "script": "<div class=\"script-label\">体测流程6步法</div>\n<p>1. Step 1 体测邀约</p>\n<p>2. Step 2 体测准备</p>\n<p>3. Step 3 体测执行（20-30分钟）</p>\n<p>4. Step 4 录入系统（GYMGO）</p>\n<p>5. Step 5 体测解读（新客24h / 会员48h内）</p>\n<p>6. Step 6 跟进转化（>=40%）</p>\n<div class=\"script-label\">解读逻辑6步法</div>\n<p>1. 问询 —— 了解家长认知和担忧</p>\n<p>2. 分析原因 —— 结合数据找根因</p>\n<p>3. 给解决方案 —— 针对性推荐课程</p>\n<p>4. 成功案例 —— 分享同龄训练成果</p>\n<p>5. 总结 —— 强化必要性和紧迫性</p>\n<p>6. 关单 —— 自然引导，限时促单</p>"}, {"num": 6, "title": "体测流程6步", "script": "<div class=\"script-section\">体测流程6步讲解要点</div><p>本页用于衔接课程节奏，讲解时请围绕课件信息展开，帮助学员明确这一页的重点。</p><ul><li>Step 2：体测准备</li><li>充分准备，专业呈现</li><li>场地</li><li>场地准备</li><li>体测区域干净整洁</li><li>测试器材摆放有序</li></ul>"}, {"num": 7, "title": "体测流程6步", "script": "<div class=\"script-section\">体测流程6步讲解要点</div><p>本页用于衔接课程节奏，讲解时请围绕课件信息展开，帮助学员明确这一页的重点。</p><ul><li>Step 3：体测执行（20-30分钟）</li><li>8大维度全面评估</li><li>F 特性：8项标准化测试  A 优势：科学评估体系  B 利益：数据驱动成交</li><li>身高体重</li><li>BMI指数评估</li><li>柔韧性</li></ul>"}, {"num": 8, "title": "体测流程6步", "script": "<div class=\"script-section\">体测流程6步讲解要点</div><p>本页用于衔接课程节奏，讲解时请围绕课件信息展开，帮助学员明确这一页的重点。</p><ul><li>Step 4：录入系统</li><li>GYMGO系统录入，生成专业报告</li><li>数据整理</li><li>将8项测试数据整理到体测表格，确保每项数据准确无误</li><li>系统录入</li><li>登录GYMGO系统，进入体测模块，逐项录入测试数据</li></ul>"}, {"num": 9, "title": "体测流程6步", "script": "<div class=\"script-section\">体测流程6步讲解要点</div><p>本页用于衔接课程节奏，讲解时请围绕课件信息展开，帮助学员明确这一页的重点。</p><ul><li>Step 5：体测解读（新客24h / 会员48h内）</li><li>核心解读逻辑6步法</li><li>F 特性：6步标准化解读流程  A 优势：逻辑清晰有说服力  B 利益：解读即关单，转化率&gt;=40%</li><li>问询</li><li>了解家长对孩子身体情况的认知和担忧</li><li>分析原因</li></ul>"}, {"num": 10, "title": "体测流程6步", "script": "<div class=\"script-section\">体测流程6步讲解要点</div><p>本页用于衔接课程节奏，讲解时请围绕课件信息展开，帮助学员明确这一页的重点。</p><ul><li>Step 6：跟进转化</li><li>解读后新客24h / 会员48h内跟进，锁定成交</li><li>24h</li><li>解读后跟进窗口</li><li>&gt;=40%</li><li>体测转化率目标</li></ul>"}, {"num": 11, "title": "体测解读与关单", "script": "<div class=\"script-section\">体测解读与关单讲解要点</div><p>本页用于衔接课程节奏，讲解时请围绕课件信息展开，帮助学员明确这一页 let currentSlide = 0;

function parseContent(text) {
  const lines = text.split('\n');
  let html = '';
  let inList = false;
  let listType = null;
  const flushList = () => {
    if (inList) {
      html += `</${listType}>`;
      inList = false;
      listType = null;
    }
  };

  for (let line of lines) {
    line = line.trim();
    if (!line) { flushList(); continue; }
    if (/^(\d{1,2}|[A-Z]|[♥☺↑★◆●▼→←<!~])$/.test(line)) continue;
    if (/^(\d{2}\s|STEP\s\d|F\d|F\s——)/.test(line)) { flushList(); html += `<h3 class="slide-h3">${line}</h3>`; continue; }
    if (line.startsWith('●') || line.startsWith('•') || line.startsWith('-') || line.startsWith('✓') || line.startsWith('✗')) {
      if (!inList || listType !== 'ul') { flushList(); html += '<ul class="slide-ul">'; inList = true; listType = 'ul'; }
      html += `<li>${line.substring(1).trim()}</li>`;
      continue;
    }
    if (/^\d+\./.test(line)) {
      if (!inList || listType !== 'ol') { flushList(); html += '<ol class="slide-ol">'; inList = true; listType = 'ol'; }
      html += `<li>${line.replace(/^\d+\.\s*/, '')}</li>`;
      continue;
    }
    if (line.startsWith('【') && line.includes('】')) { flushList(); html += `<div class="slide-label">${line}</div>`; continue; }
    if (line.includes('→') || line.includes('核心原则：') || line.includes('关键能力：')) { flushList(); html += `<div class="key-point">${line}</div>`; continue; }
    if (line.startsWith('"') && line.endsWith('"')) { flushList(); html += `<blockquote class="slide-quote">${line}</blockquote>`; continue; }
    flushList();
    if (line.includes('：') && !line.includes('"')) {
      const parts = line.split('：', 2);
      html += `<p><strong>${parts[0]}：</strong>${parts[1]}</p>`;
    } else {
      html += `<p>${line}</p>`;
    }
  }
  flushList();
  return html;
}

function renderSlideList() {
  const list = document.getElementById('slideList');
  list.innerHTML = SLIDES.map((s, i) => `
    <div class="slide-item ${i === currentSlide ? 'active' : ''}" onclick="goToSlide(${i})">
      <span class="num">${s.num}</span>
      <span class="title">${s.title}</span>
    </div>
  `).join('');
}

function renderSlide() {
  const s = SLIDES[currentSlide];
  document.getElementById('slideContent').innerHTML = `
    <div class="slide-header">
      <span class="slide-num">${s.num} / ${SLIDES.length}</span>
      <h1>${s.title}</h1>
    </div>
    <div class="slide-body">${parseContent(s.content)}</div>
  `;
  document.getElementById('prevBtn').disabled = currentSlide === 0;
  document.getElementById('nextBtn').disabled = currentSlide === SLIDES.length - 1;
  renderSlideList();
  updateScriptContent();
}

function updateScriptContent() {
  const slide = SLIDES[currentSlide];
  const data = SLIDE_SCRIPTS[currentSlide];
  document.getElementById('scriptSlideNum').textContent = `第 ${slide.num} 页 / 共 ${SLIDES.length} 页`;
  document.getElementById('scriptSlideTitle').textContent = slide.title;
  document.getElementById('scriptContent').innerHTML = data && data.script ? data.script : '<div class="script-empty">本页暂无独立逐字稿内容，请结合当前课件页讲解。</div>';
}

function goToSlide(index) { currentSlide = index; renderSlide(); }
function prevSlide() { if (currentSlide > 0) { currentSlide--; renderSlide(); } }
function nextSlide() { if (currentSlide < SLIDES.length - 1) { currentSlide++; renderSlide(); } }

function switchTab(tab) {
  document.querySelectorAll('.tab-bar button').forEach(button => button.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('ppt-panel').hidden = tab !== 'ppt';
  document.getElementById('script-panel').classList.toggle('active', tab === 'script');
  document.getElementById('exam-panel').hidden = tab !== 'exam';
  if (tab === 'exam' && !window.examRendered) {
    renderExam();
    window.examRendered = true;
  }
  updateScriptContent();
}
